<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>THE BISHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');
:root{--bg:#080808;--s1:#101010;--s2:#161616;--s3:#1c1c1c;--b1:#1e1e1e;--b2:#2a2a2a;--t0:#eeeeee;--t1:#cccccc;--t2:#888;--t3:#444;--gold:#c8922a;--gold2:#e8b84b;--gold3:#8a6420;--gold4:#2a1a06;--red:#c44;--red2:#6b1515;--green:#4a9a6a;--green2:#1a3a2a;--blue:#3a7aaa;--orange:#e88a3a;--purple:#7a4a9a;--teal:#3a9a8a;--teal2:#1a3a38;}
.light{--bg:#f2ede4;--s1:#e8e0d0;--s2:#ddd6c4;--b1:#c8bca4;--b2:#b8a888;--t0:#120e06;--t1:#2a1e0e;--t2:#5a4a2e;--t3:#9a8a6a;--gold:#7a4e0e;--gold2:#aa7820;--gold3:#5a3a08;--gold4:#f0e8d8;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t1);font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;line-height:1.75;min-height:100vh;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--b2);}
.scr{display:none;}.scr.on{display:block;}
.title-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);}
.t-eye{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.5em;color:var(--gold3);margin-bottom:28px;}
.t-main{font-size:clamp(60px,13vw,130px);font-weight:300;color:var(--t0);line-height:.82;letter-spacing:-.02em;margin-bottom:10px;}
.t-sub{font-style:italic;font-size:clamp(11px,1.6vw,15px);color:var(--gold);letter-spacing:.1em;margin-bottom:40px;}
.t-quote{font-style:italic;font-size:13px;color:var(--t3);max-width:340px;margin:0 auto 40px;line-height:1.7;}
.t-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.theme-btn{position:absolute;top:16px;right:16px;background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:8px;padding:6px 10px;cursor:pointer;}
.theme-btn:hover{border-color:var(--gold3);color:var(--gold);}
.setup-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);}
.setup-card{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--gold);padding:22px;max-width:460px;width:100%;margin-bottom:14px;}
.setup-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.3em;color:var(--gold3);margin-bottom:8px;}
.setup-txt{font-size:13px;color:var(--t3);line-height:1.65;margin-bottom:6px;}
.api-inp{width:100%;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:'Space Mono',monospace;font-size:11px;padding:10px;outline:none;border-radius:0;-webkit-appearance:none;margin:7px 0;}
.api-inp:focus{border-color:var(--gold3);}
.api-inp::placeholder{color:var(--t3);}
.co-inp{width:100%;background:#060606;border:2px solid var(--gold3);color:var(--gold2);font-family:'Cormorant Garamond',serif;font-size:20px;padding:12px;outline:none;border-radius:0;-webkit-appearance:none;margin:7px 0;letter-spacing:.05em;}
.co-inp::placeholder{color:var(--gold3);opacity:.4;}
.key-err{display:none;color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-bottom:7px;}
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:2px;margin-bottom:20px;}
.oc{background:var(--s1);border:1px solid var(--b1);padding:17px 15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.oc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:.3s;}
.oc:hover::before,.oc.sel::before{transform:scaleX(1);}
.oc:hover,.oc.sel{border-color:var(--gold3);background:var(--gold4);}
.oc-num{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.26em;color:var(--gold3);margin-bottom:8px;}
.oc-icon{font-size:24px;margin-bottom:6px;}
.oc-name{font-size:17px;color:var(--t0);margin-bottom:3px;}
.oc-tag{font-style:italic;font-size:11px;color:var(--gold);margin-bottom:7px;}
.oc-desc{font-size:12px;color:var(--t3);line-height:1.6;}
.oc-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--b1);}
.pill{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);padding:2px 5px;border:1px solid var(--b2);}
.diff-tag{position:absolute;top:9px;right:9px;font-family:'Space Mono',monospace;font-size:6px;padding:2px 5px;border:1px solid;}
.dh{color:var(--red);border-color:var(--red2);}.dm{color:var(--gold);border-color:var(--gold3);}
.game-wrap{display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:7px;}
.brand{font-size:13px;font-weight:300;color:var(--gold);}
.co-badge{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold3);padding:2px 7px;border:1px solid var(--gold3);background:var(--gold4);}
.topstats{display:flex;gap:12px;flex-wrap:wrap;}
.ts-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.2em;color:var(--t3);display:block;}
.ts-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold2);font-weight:700;}
.topacts{display:flex;gap:5px;flex-wrap:wrap;}
.game-tabs{display:flex;background:var(--s2);border-bottom:1px solid var(--b1);overflow-x:auto;}
.gtab{flex-shrink:0;padding:9px 10px;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--t3);background:transparent;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;}
.gtab.on{color:var(--gold);border-bottom-color:var(--gold);}
.tab-pane{display:none;}.tab-pane.on{display:block;}
.game-layout{display:flex;min-height:0;}
.status-col{width:185px;min-width:185px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;max-height:calc(100vh - 130px);}
@media(max-width:660px){.status-col{display:none;}}
.ps{padding:10px;border-bottom:1px solid var(--b1);}
.pl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.3em;color:var(--t3);text-transform:uppercase;margin-bottom:7px;}
.pav{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold3);display:flex;align-items:center;justify-content:center;font-size:17px;background:linear-gradient(135deg,#1a1208,#261a0c);}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cap-box{background:var(--s2);border:1px solid var(--b1);padding:5px 7px;}
.cap-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-bottom:1px;}
.cap-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);font-weight:700;}
.cap-val.dirty{color:var(--red);}
.mr{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.mn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);width:52px;flex-shrink:0;}
.mt{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;transition:width .8s;}
.mgr{background:var(--green);}.mb{background:var(--blue);}.mo{background:var(--orange);}.mrd{background:var(--red);}.mg{background:var(--gold);}.mt2{background:var(--teal);}
.mv{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);width:18px;text-align:right;}
.ci{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--s3);cursor:pointer;}
.ci:hover{padding-left:3px;}
.ci:last-child{border-bottom:none;}
.ca{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.cn{font-size:10px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.cr{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.dg{background:var(--green);}.dy{background:var(--gold);}.dr{background:var(--red);}
.narr-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.narrative{flex:1;overflow-y:auto;padding:18px 20px;-webkit-overflow-scrolling:touch;max-height:calc(100vh - 230px);}
@media(max-width:480px){.narrative{padding:10px;max-height:calc(100vh - 220px);}}
.scene{margin-bottom:20px;}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1);}
.sloc{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--gold3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px;}
.sdiv{flex:1;height:1px;background:var(--b1);}
.ssess{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);}
.sbody{font-size:14px;color:var(--t1);line-height:1.85;}
.sbody p{margin-bottom:8px;}
.chblk{display:flex;margin:10px 0;background:var(--s1);border:1px solid var(--b1);overflow:hidden;position:relative;}
.chblk::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--gold3);}
.ch-left{display:flex;flex-direction:column;align-items:center;padding:12px 9px;background:var(--s2);border-right:1px solid var(--b1);min-width:62px;flex-shrink:0;}
.chavat{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--b2);margin-bottom:5px;}
.chpn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);text-align:center;line-height:1.3;}
.ch-right{flex:1;padding:11px 13px;min-width:0;}
.chhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:4px;flex-wrap:wrap;}
.chname{font-size:13px;color:var(--t0);}
.chstat{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold3);padding:1px 4px;border:1px solid var(--gold4);}
.chspeech{font-style:italic;font-size:13px;color:var(--t0);line-height:1.75;padding-left:10px;border-left:2px solid var(--gold3);margin-bottom:5px;}
.chsub{font-size:11px;color:var(--t3);font-style:italic;line-height:1.5;margin-bottom:5px;}
.hear-btn{display:inline-flex;align-items:center;gap:5px;background:var(--s3);border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:7px;padding:3px 7px;cursor:pointer;}
.hear-btn:hover{border-color:var(--gold3);color:var(--gold);}
.pact{display:flex;gap:8px;padding:7px 10px;background:var(--s3);border:1px solid var(--b1);border-left:3px solid var(--gold);margin:7px 0;}
.palbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold);flex-shrink:0;margin-top:1px;}
.patxt{font-style:italic;color:var(--t1);font-size:12px;line-height:1.6;}
.sflag{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--green2);background:var(--s3);padding:3px 8px;margin:3px 2px;cursor:pointer;font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}
.ibox{background:var(--s1);border:1px solid var(--b1);border-left:3px solid #1a3a5a;padding:7px 10px;margin:7px 0;cursor:pointer;}
.ilbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--blue);margin-bottom:2px;}
.itxt{font-size:11px;color:var(--t3);line-height:1.6;}
.mctag{display:inline-flex;font-family:'Space Mono',monospace;font-size:7px;padding:2px 5px;border-radius:2px;margin:2px;}
.mcp{color:var(--green);background:var(--green2);border:1px solid #1a3a1a;}
.mcn{color:var(--red);background:#150808;border:1px solid #3a1515;}
.input-area{border-top:1px solid var(--b1);background:var(--s1);padding:9px 12px;flex-shrink:0;}
.choice-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.cbtn{background:var(--s2);border:1px solid var(--b2);padding:7px 10px;cursor:pointer;text-align:left;transition:all .2s;font-family:'Cormorant Garamond',serif;display:flex;align-items:flex-start;gap:6px;flex:1;min-width:130px;min-height:44px;}
.cbtn:hover{border-color:var(--gold3);background:var(--gold4);}
.cnum{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold3);flex-shrink:0;margin-top:2px;}
.ctxt{font-size:12px;color:var(--t2);line-height:1.5;flex:1;}
.ctag{font-family:'Space Mono',monospace;font-size:6px;padding:2px 4px;border:1px solid;flex-shrink:0;margin-top:2px;}
.tc{color:var(--green);border-color:var(--green2);}.tg{color:var(--gold);border-color:var(--gold3);}.td{color:var(--red);border-color:var(--red2);}
.free-row{display:flex;gap:5px;}
.finput{flex:1;background:var(--s3);border:1px solid var(--b2);color:var(--t1);font-family:'Cormorant Garamond',serif;font-size:14px;padding:9px 10px;outline:none;min-height:44px;border-radius:0;-webkit-appearance:none;}
.finput:focus{border-color:var(--gold3);}
.finput::placeholder{color:var(--t3);font-style:italic;}
.movebtn{background:var(--gold);border:none;color:#000;font-family:'Space Mono',monospace;font-size:8px;padding:9px 13px;cursor:pointer;text-transform:uppercase;min-height:44px;}
.movebtn:hover{background:var(--gold2);}
.movebtn:disabled{opacity:.4;cursor:not-allowed;}
.errmsg{color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-top:5px;display:none;line-height:1.5;word-break:break-all;}
.audio-bar{display:flex;align-items:center;gap:7px;padding:6px 12px;background:var(--s2);border-bottom:1px solid var(--b1);flex-wrap:wrap;}
.audio-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);}
.atog{background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:7px;padding:3px 8px;cursor:pointer;}
.atog.on{border-color:var(--green);color:var(--green);}
.atog:hover{border-color:var(--gold3);color:var(--gold);}
.speaking{display:none;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}
.speaking.on{display:flex;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--green);}
.wrap{padding:14px;}
.sec-title{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.24em;color:var(--gold3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1);}
.sec-title.teal{color:var(--teal);}
.sec-title.purple{color:var(--purple);}
.sec-title.orange{color:var(--orange);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-bottom:14px;}
.card{background:var(--s1);border:1px solid var(--b1);padding:12px;cursor:pointer;transition:border-color .2s;}
.card:hover{border-color:var(--gold3);}
.card.owned{border-left:3px solid var(--green);}
.card.player-biz{border-left:3px solid var(--gold);}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;gap:6px;}
.card-name{font-size:12px;color:var(--t0);}
.card-sub{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:1px;}
.badge{font-family:'Space Mono',monospace;font-size:7px;padding:2px 5px;border:1px solid;white-space:nowrap;flex-shrink:0;}
.b-g{color:var(--green);border-color:var(--green2);}
.b-y{color:var(--gold);border-color:var(--gold3);}
.b-r{color:var(--red);border-color:var(--red2);}
.b-t{color:var(--t3);border-color:var(--b2);}
.b-teal{color:var(--teal);border-color:var(--teal2);}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px;}
.stats.s2{grid-template-columns:repeat(2,1fr);}
.stat{background:var(--s2);padding:4px 6px;}
.stat-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);}
.stat-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);}
.card-desc{font-size:10px;color:var(--t3);line-height:1.5;margin-top:5px;}
.tier-badge{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.08em;}
.tier-M{color:#cc4444;}.tier-I{color:var(--gold);}.tier-S{color:var(--green);}
.mbar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.mbar-lbl{font-size:10px;width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mbar-track{flex:1;height:9px;background:var(--b2);border-radius:2px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:2px;transition:width .8s;}
.mbar-pct{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);width:30px;text-align:right;flex-shrink:0;}
.tree-node{padding:9px 12px;margin-bottom:3px;cursor:pointer;transition:border-color .2s;}
.tree-node:hover{border-color:var(--gold3)!important;}
.tree-root{background:var(--s1);border:1px solid var(--gold3);border-left:4px solid var(--gold);}
.tree-sector{background:var(--s2);border:1px solid var(--b1);border-left:3px solid var(--green);margin-left:16px;}
.tree-biz{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--blue);margin-left:32px;}
.tn-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.tn-name{font-size:12px;color:var(--t0);flex:1;}
.tn-rev{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);}
.tn-meta{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:2px;}
.info-bar{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--gold3);padding:10px;margin-bottom:12px;font-size:12px;color:var(--t3);line-height:1.65;}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:12px;}
.svg-wrap{position:relative;width:100%;padding-bottom:50%;background:var(--s2);}
.svg-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;}
.theater-card{background:var(--s1);border:1px solid var(--b1);}
.theater-hdr{padding:8px 11px;border-bottom:1px solid var(--b1);}
.th-name{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--gold3);}
.th-sub{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:2px;}
.zone-list{padding:3px 0;}
.zrow{display:flex;align-items:center;justify-content:space-between;padding:4px 11px;border-bottom:1px solid var(--s3);cursor:pointer;transition:all .18s;}
.zrow:hover{background:var(--s2);padding-left:15px;}
.zrow:last-child{border-bottom:none;}
.zname{font-size:11px;color:var(--t1);}
.lock-card{background:var(--s1);border:1px solid var(--b1);opacity:.55;cursor:pointer;}
.lock-card:hover{opacity:.8;}
.charts-wrap{padding:14px;}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-bottom:12px;}
.chart-card{background:var(--s1);border:1px solid var(--b1);padding:13px;}
.chart-title{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.22em;color:var(--gold3);margin-bottom:9px;}
.bars{display:flex;align-items:flex-end;gap:3px;height:80px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bar-fill{width:100%;border-radius:2px 2px 0 0;min-height:3px;transition:height .8s;}
.bar-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);}
.bar-num{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold2);}
.mc-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.mc-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);width:68px;flex-shrink:0;}
.mc-bar{flex:1;height:10px;background:var(--b2);border-radius:2px;overflow:hidden;}

.mc-num{font-family:'Space Mono',monospace;font-size:7px;color:rgba(0,0,0,.7);font-weight:700;}
.ftable{width:100%;border-collapse:collapse;font-size:11px;}

.ftable td{padding:5px 6px;border-bottom:1px solid var(--s3);color:var(--t1);}
.ftable tr:hover td{background:var(--s2);}
.fdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;}
.thr{font-family:'Space Mono',monospace;font-size:7px;}
.t-lo{color:var(--green);}.t-me{color:var(--gold);}.t-hi{color:var(--red);}
.inf-bar-track{height:4px;background:var(--b2);border-radius:2px;margin-top:5px;}
.inf-bar-fill{height:100%;border-radius:2px;background:var(--gold);}
.comm-bar-fill{height:100%;border-radius:2px;background:var(--teal);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.modal{background:var(--s1);border:1px solid var(--b2);width:100%;max-width:500px;padding:22px 20px;position:relative;margin:auto;}
.modal-x{position:absolute;top:9px;right:9px;background:none;border:none;color:var(--t3);font-size:17px;cursor:pointer;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;}
.modal-x:hover{color:var(--t1);}
.modal-pre{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.26em;color:var(--gold3);margin-bottom:5px;}
.modal-title{font-size:clamp(16px,3.5vw,21px);font-weight:300;color:var(--t0);margin-bottom:10px;}
.modal-body{font-size:13px;color:var(--t3);line-height:1.85;}
.modal-body p{margin-bottom:8px;}
.modal-body strong{color:var(--t1);}
.savedisp{background:#050505;border:1px solid var(--b1);padding:9px;font-family:monospace;font-size:8px;color:var(--t3);line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:150px;overflow-y:auto;margin-bottom:9px;}
.loybar{margin:8px 0;}.lylbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);margin-bottom:3px;}.lytrk{height:3px;background:var(--b2);}.lyfil{height:100%;background:var(--gold);}
.rtags{display:flex;flex-wrap:wrap;gap:3px;margin:7px 0;}.rtag{font-family:'Space Mono',monospace;font-size:6px;padding:2px 5px;border:1px solid var(--b2);color:var(--t3);}
.notif{position:fixed;bottom:14px;right:14px;background:var(--s1);border:1px solid var(--b2);border-left:3px solid var(--gold);padding:8px 12px;max-width:240px;z-index:300;pointer-events:none;}
.nt{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold);margin-bottom:2px;}
.nb{font-size:11px;color:var(--t3);line-height:1.5;}

.ldd{width:5px;height:5px;background:var(--gold);border-radius:50%;}
.btn-g{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:#000;background:var(--gold);border:none;padding:11px 22px;cursor:pointer;min-height:44px;}

.btn-o{font-family:'Space Mono',monospace;font-size:8px;color:var(--t3);background:transparent;border:1px solid var(--b2);padding:8px 13px;cursor:pointer;min-height:36px;}

@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}

.sdot{animation:sdot .8s ease infinite;}

const A={
  on:false,elKey:'',speaking:false,sy:window.speechSynthesis,
  async speak(text,cn){
    if(!this.on)return;this.stop();this.speaking=true;this.upd();
    if(this.elKey){try{await this.el(text);return;}catch(e){}}
    if(!this.sy){this.speaking=false;this.upd();return;}
    const u=new SpeechSynthesisUtterance(text);
    const vs=this.sy.getVoices();
    u.voice=vs.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||(v.lang.includes('en-GB')&&v.name.toLowerCase().includes('female')))||vs.find(v=>v.lang.includes('en-GB'))||vs.find(v=>v.lang.includes('en'))||vs[0];
    u.rate=G.rate||1.0;u.pitch=cn==='The Patriarch'?0.75:cn==='D'?0.85:1.0;u.volume=0.92;
    u.onend=()=>{this.speaking=false;this.upd();};u.onerror=()=>{this.speaking=false;this.upd();};
    this.sy.speak(u);
  },
  async el(text){
    const r=await fetch('https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL',{method:'POST',headers:{'xi-api-key':this.elKey,'Content-Type':'application/json'},body:JSON.stringify({text,model_id:'eleven_monolingual_v1',voice_settings:{stability:.5,similarity_boost:.8}})});
    if(!r.ok)throw new Error('EL failed');
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const audio=new Audio(url);audio.onended=()=>{this.speaking=false;this.upd();URL.revokeObjectURL(url);};audio.onerror=()=>{this.speaking=false;this.upd();};
    await audio.play();
  },
  stop(){this.sy&&this.sy.cancel();this.speaking=false;this.upd();},
  tog(){this.on=!this.on;if(!this.on)this.stop();render();},
  upd(){document.querySelectorAll('.speaking').forEach(el=>el.classList.toggle('on',this.speaking));}
};

function render(){
  document.body.classList.toggle('light',G.lightMode);
  const root=document.getElementById('root');
  if(G.screen==='title')root.innerHTML=rTitle();
  else if(G.screen==='setup')root.innerHTML=rSetup();
  else if(G.screen==='company')root.innerHTML=rCompany();
  else if(G.screen==='origin')root.innerHTML=rOrigin();
  else if(G.screen==='game')root.innerHTML=rGame();
  if(G.loading)root.innerHTML+=`<div class="loading"><div class="ld-txt">The board is moving</div><div style="display:flex;gap:6px;"><div class="ldd"></div><div class="ldd"></div><div class="ldd"></div></div></div>`;
  if(G.modal)root.innerHTML+=rModal(G.modal);
  if(G.notif)root.innerHTML+=`<div class="notif"><div class="nt">${G.notif.t}</div><div class="nb">${G.notif.b}</div></div>`;
  attach();
  if(G.screen==='game')scrollN();
}

function rTitle(){
  const sv=loadSaved();
  return `<div class="scr on"><div class="title-bg" style="position:relative;">
    <button class="theme-btn" onclick="G.lightMode=!G.lightMode;render()">${G.lightMode?'DARK':'LIGHT'}</button>
    <div class="t-eye">A Life Strategy Simulation</div>
    <div class="t-main">THE<br>BISHOP</div>
    <div class="t-sub">Move diagonally. See everything. Own the board.</div>
    <div class="t-quote">"The quiet ones are the dangerous ones — not because they hide what they are, but because they already know what you are."</div>
    <div class="t-btns">
      <button class="btn-g" onclick="G.screen='setup';render()">BEGIN</button>
      ${sv&&sv.session>1?`<button class="btn-o" onclick="resumeAuto()">RESUME — SESSION ${String(sv.session).padStart(2,'0')}</button>`:''}
      <button class="btn-o" onclick="showLoad()">LOAD</button>
    </div>
  </div></div>`;
}

function rSetup(){
  return `<div class="scr on"><div class="setup-bg">
    <div style="text-align:center;margin-bottom:22px;">
      <div class="t-eye" style="margin-bottom:9px;">Before You Begin</div>
      <div style="font-size:clamp(26px,7vw,52px);font-weight:300;color:var(--t0);line-height:.9;margin-bottom:8px;">API KEY<br>REQUIRED</div>
    </div>
    <div class="setup-card">
      <div class="setup-label">ANTHROPIC KEY — REQUIRED</div>
      <div class="setup-txt">Powers the AI. Free at <span style="color:var(--gold);">console.anthropic.com</span></div>
      <input id="ak" type="password" class="api-inp" placeholder="sk-ant-api03-..." onkeypress="if(event.key==='Enter')doKey()">
      <div id="ak-err" class="key-err"></div>
    </div>
    <div class="setup-card" style="border-left-color:var(--b1);">
      <div class="setup-label">ELEVENLABS KEY — OPTIONAL</div>
      <input id="el" type="password" class="api-inp" placeholder="Leave blank to skip...">
    </div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn-g" onclick="doKey()">CONTINUE</button>
      <button class="btn-o" onclick="G.screen='title';render()">← BACK</button>
    </div>
  </div></div>`;
}

function doKey(){
  const ak=document.getElementById('ak'),el=document.getElementById('el'),err=document.getElementById('ak-err');
  if(!ak)return;const v=ak.value.trim();
  if(!v){err.textContent='Please paste your Anthropic API key.';err.style.display='block';return;}
  if(!v.startsWith('sk-ant-')){err.textContent='Invalid format. Should start with sk-ant-';err.style.display='block';return;}
  G.apiKey=v;
  if(el&&el.value.trim()){G.el_key=el.value.trim();A.elKey=G.el_key;}
  G.screen='company';render();
}

function rCompany(){
  return `<div class="scr on"><div class="setup-bg">
    <div style="text-align:center;margin-bottom:28px;">
      <div class="t-eye" style="margin-bottom:10px;">Name Your Empire</div>
      <div style="font-size:clamp(22px,6vw,44px);font-weight:300;color:var(--t0);line-height:.92;margin-bottom:8px;">YOUR<br>HOLDING<br>COMPANY</div>
      <div style="font-style:italic;font-size:13px;color:var(--t3);margin-top:10px;max-width:380px;">The umbrella under which everything you build will sit. Named after your family, a concept, a place — whatever reflects what you're building.</div>
    </div>
    <div class="setup-card">
      <div class="setup-label">HOLDING COMPANY NAME</div>
      <input id="co" class="co-inp" type="text" placeholder="e.g. Kutor Holdings LLC" maxlength="50" onkeypress="if(event.key==='Enter')doCompany()">
      <div style="font-size:11px;color:var(--t3);margin-top:4px;">This will appear throughout the game. Everything you acquire goes under this name.</div>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn-g" onclick="doCompany()">FOUND THE COMPANY</button>
      <button class="btn-o" onclick="G.screen='setup';render()">← BACK</button>
    </div>
  </div></div>`;
}

function doCompany(){
  const inp=document.getElementById('co');
  G.coName=inp&&inp.value.trim()?inp.value.trim():'Kutor Holdings LLC';
  G.screen='origin';render();
}

function rOrigin(){
  const cards=ORIGINS.map(o=>`
    <div class="oc ${G.selOrigin===o.id?'sel':''}" onclick="G.selOrigin='${o.id}';render()">

      <div class="oc-num">ORIGIN / ${o.num}</div>
      <div class="oc-icon">${o.icon}</div>
      <div class="oc-name">${o.name}</div>
      <div class="oc-tag">${o.tag}</div>
      <div class="oc-desc">${o.desc}</div>
      <div class="oc-pills">${o.pills.map(p=>`<span class="pill">${p}</span>`).join('')}</div>

  return `<div class="scr on"><div style="max-width:1080px;margin:0 auto;padding:36px 18px 60px;">
    <div style="margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--b1);"><div style="font-size:clamp(22px,4.5vw,34px);font-weight:300;color:var(--t0);margin-bottom:5px;">Who are you when<br>no one is watching?</div><div style="font-style:italic;color:var(--t3);font-size:13px;">Your origin sets your starting position. Not your ceiling.</div></div>

      <button class="btn-o" onclick="G.screen='company';render()">← BACK</button>

}

function rGame(){
  const orig=ORIGINS.find(o=>o.id===G.origin);
  const ctcs=Object.entries(G.contacts).map(([id,c])=>{
    const dot=c.loyalty>=75?'dg':c.loyalty>=50?'dy':'dr';
    return `<div class="ci" onclick="viewCtc('${id}')"><div class="ca" style="background:${c.bg};">${c.emoji}</div><div style="flex:1;min-width:0;"><div class="cn">${c.name}</div><div class="cr">${c.basis}</div></div><div class="cdot ${dot}"></div></div>`;
  }).join('');
  const choices=G.choices.map((c,i)=>{
    const tc=c.type==='CLEAN'?'tc':c.type==='GRAY'?'tg':'td';
    const st=c.text.replace(/'/g,"\\'");
    return `<button class="cbtn" onclick="move('[${c.type}] ${st}')"><div class="cnum">0${i+1}</div><div class="ctxt">${c.text}</div><div class="ctag ${tc}">${c.type}</div></button>`;
  }).join('');
  const mon=totalMonthly();
  const co=G.coName||'Kutor Holdings';
  return `<div class="scr on"><div class="game-wrap">
    <div class="topbar">
      <div style="display:flex;flex-direction:column;gap:2px;"><div class="brand">THE BISHOP — MR. KUTOR</div><div class="co-badge">${co.toUpperCase().substring(0,22)}</div></div>
      <div class="topstats">
        <div><span class="ts-lbl">LIQUID</span><span class="ts-val">$${(G.clean+G.dirty).toLocaleString()}</span></div>
        <div><span class="ts-lbl">MONTHLY</span><span class="ts-val">$${mon.toLocaleString()}</span></div>
        <div><span class="ts-lbl">AGE</span><span class="ts-val">${G.age}</span></div>
        <div><span class="ts-lbl">SESSION</span><span class="ts-val">${String(G.session).padStart(2,'0')}</span></div>
        <div><span class="ts-lbl">PHASE</span><span class="ts-val">${G.phase}</span></div>
      </div>
      <div class="topacts">
        <button class="btn-o" onclick="showSave()">SAVE</button>
        <button class="btn-o" onclick="G.lightMode=!G.lightMode;render()">${G.lightMode?'🌙':'☀️'}</button>
        <button class="btn-o" onclick="doRestart()">RESTART</button>
        <button class="btn-o" onclick="G.screen='title';render()">EXIT</button>
      </div>
    </div>
    <div class="audio-bar">
      <div class="audio-lbl">AUDIO</div>
      <button class="atog ${A.on?'on':''}" onclick="A.tog()">${A.on?'🔊 ON':'🔇 OFF'}</button>
      ${A.on?`<div class="speaking"><div class="sdot"></div><span style="font-family:Space Mono,monospace;font-size:7px;margin-left:4px;">SPEAKING</span></div>
        <button class="atog" onclick="A.stop()" style="margin-left:5px;">STOP</button>
        <div style="display:flex;align-items:center;gap:4px;margin-left:8px;"><span style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">SPEED</span>
          <button class="atog ${G.rate<=0.7?'on':''}" onclick="G.rate=0.65;render()" style="padding:2px 6px;">0.6x</button>
          <button class="atog ${G.rate>0.7&&G.rate<=0.95?'on':''}" onclick="G.rate=0.85;render()" style="padding:2px 6px;">0.85x</button>
          <button class="atog ${G.rate>0.95&&G.rate<=1.15?'on':''}" onclick="G.rate=1.0;render()" style="padding:2px 6px;">1x</button>
          <button class="atog ${G.rate>1.15?'on':''}" onclick="G.rate=1.35;render()" style="padding:2px 6px;">1.35x</button>
        </div>`:''}
    </div>
    <div class="game-tabs">
      <button class="gtab ${G.tab==='narrative'?'on':''}" onclick="G.tab='narrative';render()">NARRATIVE</button>
      <button class="gtab ${G.tab==='map'?'on':''}" onclick="G.tab='map';render()">MAP</button>

      <button class="gtab ${G.tab==='influence'?'on':''}" onclick="G.tab='influence';render()">INFLUENCE${G.govOwned.length?` <span style="color:var(--green);">${G.govOwned.length}</span>`:''}</button>
      <button class="gtab ${G.tab==='community'?'on':''}" onclick="G.tab='community';render()">COMMUNITY</button>
      <button class="gtab ${G.tab==='team'?'on':''}" onclick="G.tab='team';render()">TEAM</button>
      <button class="gtab ${G.tab==='legacy'?'on':''}" onclick="G.tab='legacy';render()">LEGACY</button>
      <button class="gtab ${G.tab==='intel'?'on':''}" onclick="G.tab='intel';render()">INTEL</button>
    </div>
    <div class="tab-pane ${G.tab==='narrative'?'on':''}">
      <div class="game-layout">
        <div class="status-col">
          <div class="ps"><div class="pl">Mr. Kutor</div>
            <div style="display:flex;align-items:center;gap:8px;"><div class="pav">${orig?orig.icon:'♟'}</div>
              <div><div style="font-size:11px;color:var(--t0);">Mr. Kutor</div><div style="font-family:Space Mono,monospace;font-size:6px;color:var(--gold3);margin-top:1px;">${G.phase}</div><div style="font-family:Space Mono,monospace;font-size:6px;color:var(--t3);">AGE ${G.age}</div></div>
            </div>
          </div>
          <div class="ps"><div class="pl">Capital</div>

              <div class="cap-box"><div class="cap-lbl">CLEAN</div><div class="cap-val">$${G.clean.toLocaleString()}</div></div>
              <div class="cap-box"><div class="cap-lbl">DIRTY</div><div class="cap-val dirty">$${G.dirty.toLocaleString()}</div></div>
            </div>
            <div style="margin-top:4px;padding:4px 7px;background:var(--s2);border:1px solid var(--b1);">
              <div class="cap-lbl">MONTHLY PASSIVE</div>

            </div>
          </div>
          <div class="ps"><div class="pl">Status</div>
            ${mR('integrity','INTEG.','mgr')}${mR('street','STREET','mo')}${mR('inst','INST.','mb')}${mR('influence','INFLNC','mg')}${mR('exposure','EXPOS.','mrd')}${mR('loyalty','LOYALT','mgr')}${mR('community','COMMTY','mt2')}
          </div>
          <div class="ps"><div class="pl">Contacts</div>${ctcs}</div>
          ${G.bizOwned.length?`<div class="ps"><div class="pl" style="color:var(--gold3);">BUSINESSES (${G.bizOwned.length})</div>${G.bizOwned.slice(0,4).map(id=>{const b=BIZ.find(x=>x.id===id);return b?`<div style="font-size:9px;color:var(--t2);padding:2px 0;border-bottom:1px solid var(--s3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${b.n}</div>`:''}).join('')}${G.bizOwned.length>4?`<div style="font-family:Space Mono,monospace;font-size:6px;color:var(--t3);padding-top:3px;">+${G.bizOwned.length-4} more</div>`:''}</div>`:''}
          ${G.govOwned.length?`<div class="ps"><div class="pl" style="color:var(--gold3);">OFFICIALS (${G.govOwned.length})</div>${G.govOwned.slice(0,3).map(id=>{const o=GOV.find(x=>x.id===id);return o?`<div style="font-size:9px;color:var(--t2);padding:2px 0;">${o.e} ${o.n.split(' ').slice(-1)[0]}</div>`:''}).join('')}</div>`:''}
        </div>
        <div class="narr-col">
          <div class="narrative" id="narrative">${G.narrativeHTML}</div>
          <div class="input-area">
            <div class="choice-row">${choices}</div>
            <div class="free-row">
              <input class="finput" id="finput" placeholder="Mr. Kutor's next move...">
              <button class="movebtn" id="movebtn" onclick="sendFree()" ${G.loading?'disabled':''}>MOVE</button>
            </div>
            <div class="errmsg" id="errmsg" style="${G.error?'display:block':'display:none'}">${G.error||''}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="tab-pane ${G.tab==='map'?'on':''}">${rMap()}</div>
    <div class="tab-pane ${G.tab==='market'?'on':''}">${rMarket()}</div>
    <div class="tab-pane ${G.tab==='acquire'?'on':''}">${rAcquire()}</div>
    <div class="tab-pane ${G.tab==='influence'?'on':''}">${rInfluence()}</div>
    <div class="tab-pane ${G.tab==='community'?'on':''}">${rCommunity()}</div>
    <div class="tab-pane ${G.tab==='team'?'on':''}">${rTeam()}</div>
    <div class="tab-pane ${G.tab==='legacy'?'on':''}">${rLegacy()}</div>
    <div class="tab-pane ${G.tab==='intel'?'on':''}">${rIntel()}</div>
  </div></div>`;
}
function mR(k,l,c){const v=G.M[k]||0;return `<div class="mr"><div class="mn">${l}</div><div class="mt"><div class="mf ${c}" style="width:${v}%"></div></div><div class="mv">${v}</div></div>`;}
// ── MAP ──
function rMap(){
  const active=Object.entries(TH).filter(([tid])=>G.thUnlocked.includes(tid));
  const locked=Object.entries(TH).filter(([tid])=>!G.thUnlocked.includes(tid));
  const maps=active.map(([tid,th])=>{
    const svg=buildSVG(th,tid);
    const zones=th.zones.map(z=>{
      const ctrl=G.zones[z.id]||z.ctrl;
      const fac=F[ctrl]||F.player;
      return `<div class="zrow" onclick="openZone('${z.id}','${tid}')">
        <div class="zname">${z.n}</div>
        <div style="font-family:Space Mono,monospace;font-size:7px;color:${FC[ctrl]||'#aaa'};">${ctrl==='player'?'KUTOR':fac.short}</div>
        <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">${z.rev>0?'$'+(z.rev/1000000).toFixed(1)+'M':'—'}</div>
      </div>`;
    }).join('');
    return `<div class="theater-card"><div class="theater-hdr"><div class="th-name">${th.f} ${th.n}</div><div class="th-sub">${th.sub}</div></div><div class="svg-wrap">${svg}</div><div class="zone-list">${zones}</div></div>`;
  }).join('');
  const lockCards=locked.map(([tid,th])=>`
    <div class="lock-card" onclick="doUnlock('${tid}')">
      <div class="theater-hdr"><div class="th-name">${th.f} ${th.n}</div><div class="th-sub">${th.sub}</div></div>
      <div style="padding:16px;text-align:center;background:var(--s2);">
        <div style="font-family:Space Mono,monospace;font-size:9px;color:var(--t3);">EXPAND HERE — $${(th.cost/1000).toFixed(0)}K</div>
        <button class="btn-o" style="margin-top:8px;font-size:8px;">UNLOCK THEATER</button>
      </div>
    </div>`).join('');
  const leg=[{c:'#c8922a',l:'YOU'},{c:'#c44444',l:'KHALIL'},{c:'#3a7aaa',l:'CHEN'},{c:'#cc4444',l:'CARDINAL'},{c:'#4a9a6a',l:'PENINSULA'},{c:'#333',l:'NEUTRAL'}];
  return `<div class="wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
      <div style="font-family:Space Mono,monospace;font-size:8px;letter-spacing:.26em;color:var(--gold3);">WORLD MAP — ${Object.keys(TH).length} THEATERS (${G.thUnlocked.length} ACTIVE)</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${leg.map(l=>`<div style="display:flex;align-items:center;gap:4px;font-family:Space Mono,monospace;font-size:6px;color:var(--t2);"><div style="width:7px;height:7px;border-radius:50%;background:${l.c};"></div>${l.l}</div>`).join('')}</div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr));">${maps}</div>
    ${locked.length?`<div style="margin-top:14px;"><div style="font-family:Space Mono,monospace;font-size:8px;letter-spacing:.24em;color:var(--t3);margin-bottom:10px;">LOCKED THEATERS</div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr));">${lockCards}</div></div>`:''}
  </div>`;
}
function buildSVG(th,tid){
  const rects=th.zones.map(z=>{
    const ctrl=G.zones[z.id]||z.ctrl;
    return `<g onclick="openZone('${z.id}','${tid}')" style="cursor:pointer;">
      <rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" fill="${FILLS[ctrl]||'#141414'}" stroke="${FC[ctrl]||'#2a2a2a'}" stroke-width="1.2" rx="3"/>
      <text x="${z.x+z.w/2}" y="${z.y+z.h/2-3}" fill="${FC[ctrl]||'#888'}" font-size="7.5" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-family="monospace">${z.lbl}</text>
      ${z.rev>0?`<text x="${z.x+z.w/2}" y="${z.y+z.h/2+8}" fill="${FC[ctrl]||'#888'}" font-size="5.5" text-anchor="middle" font-family="monospace" opacity=".8">$${(z.rev/1000000).toFixed(1)}M</text>`:''}
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 400 175" style="position:absolute;top:0;left:0;width:100%;height:100%;background:var(--s2);">${rects}</svg>`;
}
function openZone(zid,tid){
  const th=TH[tid];if(!th)return;const z=th.zones.find(v=>v.id===zid);if(!z)return;
  const ctrl=G.zones[zid]||z.ctrl;const fac=F[ctrl]||{n:'Unknown',color:'#666'};const isP=ctrl==='player';
  const bizHere=BIZ.filter(b=>b.th===tid&&G.bizOwned.includes(b.id));
  G.modal={pre:tid.toUpperCase()+' — ZONE',title:z.n,body:`
    <p><strong>Controller:</strong> <span style="color:${FC[ctrl]||'#aaa'};">${fac.n||ctrl}</span></p>
    <p><strong>Monthly:</strong> $${z.rev.toLocaleString()} | <strong>Annual:</strong> $${(z.rev*12).toLocaleString()}</p>
    ${fac.desc?`<p style="font-style:italic;color:var(--t3);margin-top:6px;">${fac.desc}</p>`:''}
    ${bizHere.length?`<p style="color:var(--gold);margin-top:6px;">✓ ${bizHere.length} business(es) owned here</p>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
      ${isP?`<p style="color:var(--green);">✓ Kutor controls this zone.</p>`:`
        <button class="btn-g" style="font-size:8px;padding:8px 14px;" onclick="G.modal=null;G.tab='narrative';move('[CLEAN] I want to establish presence in ${z.n.replace(/'/g,"\\'")} — what is the legitimate path in?')">MOVE ON ZONE</button>
        <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;G.tab='narrative';move('[DARK] Disrupt ${(fac.n||'').replace(/'/g,"\\'")} control of ${z.n.replace(/'/g,"\\'")}.')">DISRUPT</button>`}
    </div>`};render();
}
function doUnlock(tid){
  const th=TH[tid];if(!th)return;
  if(G.clean<th.cost){notif('Insufficient','Need $'+(th.cost/1000).toFixed(0)+'K clean capital.');return;}
  G.clean-=th.cost;G.thUnlocked.push(tid);
  G.txns.push({desc:'Theater: '+th.n,amt:-th.cost,sess:G.session});
  G.modal=null;notif('Expanded',th.f+' '+th.n+' unlocked');save();render();
  setTimeout(()=>{G.tab='narrative';move('[CLEAN] I just expanded into '+th.n+'. Who is already there and what do I need to know immediately?');},500);
}

// ── MARKET ──
function rMarket(){
  const secs=[...new Set(BIZ.map(b=>b.sec))];
  const co=G.coName||'Your Holding Company';
  const secCards=secs.map(sec=>{
    const bizIn=BIZ.filter(b=>b.sec===sec);
    const total=bizIn.reduce((s,b)=>s+b.rev,0);
    if(!total)return'';
    const shares={};
    bizIn.forEach(b=>{const ow=G.bizOwned.includes(b.id)?'player':b.own;shares[ow]=(shares[ow]||0)+b.rev;});
    const sorted=Object.entries(shares).sort((a,b)=>b[1]-a[1]);
    const myShare=shares['player']||0;

    :`<div style="font-style:italic;color:var(--t3);font-size:13px;padding:10px 0;">No businesses acquired yet. Visit the ACQUIRE tab.</div>`;

  return `<div class="wrap">
    <div style="margin-bottom:18px;">

      <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;G.tab='narrative';move('[GRAY] I want a silent partner stake in ${b.n.replace(/'/g,"\\'")} — minimal capital, equity position.')">SILENT PARTNER</button>
      <button class="btn-o" style="font-size:8px;color:var(--red);border-color:var(--red2);" onclick="G.modal=null;G.tab='narrative';move('[DARK] Hostile takeover of ${b.n.replace(/'/g,"\\'")} — force out ${(fac.n||'').replace(/'/g,"\\'")} below market.')">HOSTILE TAKEOVER</button>

function doBuy(id,capType){
  const b=BIZ.find(x=>x.id===id);if(!b)return;
  if(capType==='clean'){if(G.clean<b.cost){notif('Insufficient','Need more clean capital.');return;}G.clean-=b.cost;}
  else{if(G.dirty<b.cost){notif('Insufficient','Need more dirty capital.');return;}G.dirty-=b.cost;}
  G.bizOwned.push(id);b.own='player';
  G.txns.push({desc:'Acquired: '+b.n,amt:-b.cost,sess:G.session});
  G.M.influence=Math.min(100,G.M.influence+2);
  G.modal=null;notif('Acquired',b.n+' — $'+b.rev.toLocaleString()+'/mo');save();render();
  setTimeout(()=>{G.tab='narrative';move('[CLEAN] I just acquired '+b.n+' for $'+b.cost.toLocaleString()+'. Walk through what this means and what moves next.');},500);
}
function openMerge(fromId){
  const fb=BIZ.find(b=>b.id===fromId);if(!fb)return;
  const eligible=G.bizOwned.filter(oid=>{const ob=BIZ.find(x=>x.id===oid);return ob&&ob.sec===fb.sec&&oid!==fromId;});
  if(!eligible.length){G.modal=null;notif('No eligible businesses','Need another owned business in the same sector.');return;}
  const opts=eligible.map(oid=>{const ob=BIZ.find(x=>x.id===oid);return ob?`<button class="btn-o" style="margin:4px;font-size:8px;" onclick="doMerge('${fromId}','${oid}')">Merge into ${ob.n.replace(/'/g,"\\'")} (+$${(fb.rev/1000).toFixed(0)}K/mo)</button>`:''}).join('');
  G.modal={pre:'MERGER',title:'Merge '+fb.n,body:`<p>Consolidates operations, increases market share. The merged business disappears as separate entity — revenue folds into the surviving company at 85% retention.</p><div style="margin-top:12px;">${opts}</div>`};render();
}
function doMerge(fromId,intoId){
  const fb=BIZ.find(b=>b.id===fromId),ib=BIZ.find(b=>b.id===intoId);if(!fb||!ib)return;
  G.bizOwned=G.bizOwned.filter(id=>id!==fromId);
  G.bizMerged.push({from:fromId,into:intoId,sess:G.session});
  ib.rev+=Math.round(fb.rev*0.85);
  G.modal=null;notif('Merged',fb.n+' → '+ib.n);save();render();
  setTimeout(()=>{G.tab='narrative';move('[CLEAN] I just merged '+fb.n+' into '+ib.n+'. How does the market react and what does the combined operation look like?');},500);
}
function sellBiz(id){
  const b=BIZ.find(x=>x.id===id);if(!b)return;
  const sale=Math.round(b.cost*1.12);
  G.bizOwned=G.bizOwned.filter(x=>x!==id);b.own='neutral';
  G.clean+=sale;G.txns.push({desc:'Sold: '+b.n,amt:sale,sess:G.session});
  G.modal=null;notif('Sold',b.n+' — $'+sale.toLocaleString());save();render();
}
function openBizModal(id){
  const b=BIZ.find(x=>x.id===id);if(!b)return;

// ── API CALL — EXACT PROVEN PATTERN ──
async function callAPI(playerAction){
  G.loading=true;G.error=null;render();
  const ctx=buildCtx();
  // Correct message structure: history first (alternating user/assistant), then new user message last
  // G.msgs = [user, assistant, user, assistant, ...] - keep last 4 messages (2 pairs)
  const history=G.msgs.slice(-4);
  const newMsg={role:"user",content:ctx+"\n\nSession "+G.session+". Move: "+playerAction};
  // If no history, just send the one message. If history exists, append new message at end.
  const msgs=history.length===0?[newMsg]:[...history,newMsg];
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":G.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:msgs})
    });
    const data=await resp.json();
    let text='';
    if(data.content&&Array.isArray(data.content)){for(const b of data.content){if(b.type==='text'&&b.text){text=b.text;break;}}}
    if(!text){
      if(data.error){throw new Error(data.error.message);}
      if(data.content&&Array.isArray(data.content)&&data.content.length===0){
        // Empty content — strip history and retry once
        if(G.msgs.length>0){G.msgs=[];return callAPI(playerAction);}
        throw new Error('API returned empty response. Check your key at console.anthropic.com');
      }
      throw new Error('Unexpected API response — try again');
    }
    G.msgs.push({role:'user',content:playerAction});
    G.msgs.push({role:'assistant',content:text});
    G.session++;
    G.revH=[...G.revH.slice(1),G.clean+G.dirty];
    G.infH=[...G.infH.slice(1),G.M.influence];
    if(G.session%10===0){G.age++;notif('Time Passes','Mr. Kutor is now '+G.age+'.');}
    save();processResp(text);
  }catch(err){
    G.loading=false;G.error=err.message||'Connection error. Check your API key and try again.';render();
  }
}

// ── PROCESS RESPONSE ──
function processResp(text){
  const mM=text.match(/---METERS---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const cM=text.match(/---CHOICES---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const sM=text.match(/---STRATEGY---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const iM=text.match(/---INTEL---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);

  for(const m of text.matchAll(/ZONE_CONTROL:\s*(\w+)\s*->\s*(\w+)/g)){
    G.zones[m[1]]=m[2];
    const zn=Object.values(TH).flatMap(t=>t.zones).find(z=>z.id===m[1])?.n||m[1];
    notif('Territory',zn+' → '+(m[2]==='player'?'KUTOR':m[2]));
  }
  for(const m of text.matchAll(/FAMILY_UPDATE:\s*(\{[\s\S]*?\})/g)){
    try{
      const u=JSON.parse(m[1]);
      if(u.type==='partner'&&!G.family.partner){G.family.partner={...u.data,loyalty:60,relationship:'DEVELOPING'};notif('Family','Partner relationship established.');}
      else if(u.type==='child'){G.family.children.push({id:'c'+G.family.children.length,...u.data});notif('Family','New family member.');}
      else if(u.type==='heir'&&u.data.id){G.family.heirId=u.data.id;notif('Legacy','Heir designated.');}
      else if(u.type==='land'){G.family.landOwned=true;notif('Legacy','Family land acquired.');}
      else if(u.type==='trust'){G.family.trust=true;notif('Legacy','Family trust established.');}
    }catch(e){}
  }

  let narr=text
    .replace(/---METERS---[\s\S]*?(?=---[A-Z]|$)/g,'').replace(/---CHOICES---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---STRATEGY---[\s\S]*?(?=---[A-Z]|$)/g,'').replace(/---INTEL---[\s\S]*/g,'')
    .replace(/ZONE_CONTROL:.*\n?/g,'').replace(/FAMILY_UPDATE:[\s\S]*?\}/g,'').replace(/---[A-Z]+---/g,'').trim();

  let html=`<div class="scene"><div class="shdr"><div class="sloc">${G.loc.split(' ')[0].toUpperCase()}</div><div class="sdiv"></div><div class="ssess">SESSION ${String(G.session).padStart(2,'0')} — AGE ${G.age}</div></div><div class="sbody">${parseChar(narr)}</div></div>`;

  if(sM){const pm=sM[1].match(/PRINCIPLE:(.*?)(?:\||$)/);if(pm){const bm=sM[1].match(/BOOK:(.*?)(?:\||$)/);const nm=sM[1].match(/NOTE:(.*?)(?:\||$)/);const note=(nm?nm[1].trim():'')+(bm?' — '+bm[1].trim():'');html+=`<span class="sflag" onclick="G.modal={pre:'Strategy',title:'${pm[1].trim().replace(/'/g,"\\'").replace(/"/g,"&quot;")}',body:'<p>${note.replace(/'/g,"\\'").replace(/"/g,"&quot;")}</p>'};render()">♟ ${pm[1].trim()}</span>`;}}
  if(iM){const fm=iM[1].match(/FACT:(.*?)(?:\||$)/);if(fm){html+=`<div class="ibox" onclick="G.modal={pre:'Intel',title:'Context',body:'<p>${fm[1].trim().replace(/'/g,"\\'").replace(/"/g,"&quot;")}</p>'};render()"><div class="ilbl">◉ INTEL</div><div class="itxt">${fm[1].trim().substring(0,90)}...</div></div>`;}}

  G.narrativeHTML+=html;
  if(mM)applyM(mM[1]);
  if(cM){const lines=cM[1].trim().split(/\r?\n/).filter(l=>l.trim());const choices=lines.map(l=>{const m=l.match(/\[(CLEAN|GRAY|DARK)\]\s*(.*)/);return m?{type:m[1],text:m[2].trim()}:null;}).filter(Boolean);G.choices=choices.length?choices:defChoices();}
  else G.choices=defChoices();
  G.loading=false;G.error=null;render();scrollN();
}

function parseChar(text){
  return text.replace(/\[CHARACTER:(.*?)\]([\s\S]*?)\[\/CHARACTER\]/g,(m,hdr,body)=>{
    const p=hdr.split('|');const name=p[0]||'Unknown',emoji=p[1]||'👤',bg=p[2]||'#111';
    const speech=body.replace(/^[\s"]+|[\s"]+$/g,'');
    const pts=name.split(' ');const ss=speech.replace(/'/g,"\\'").replace(/"/g,'&quot;');const sn=name.replace(/'/g,"\\'");
    return `<div class="chblk"><div class="ch-left"><div class="chavat" style="background:${bg};">${emoji}</div><div class="chpn">${pts[0]}<br>${pts.slice(1).join(' ')}</div></div><div class="ch-right"><div class="chhdr"><div class="chname">${name}</div><div class="chstat">SPEAKING</div></div><div class="chspeech">"${speech}"</div><button class="hear-btn" onclick="A.speak('${ss}','${sn}');event.stopPropagation();">🔊 HEAR</button></div></div>`;
  }).split(/\n\n+/).filter(p=>p.trim()).map(p=>p.includes('chblk')?p:`<p>${p.trim()}</p>`).join('');
}

function applyM(text){
  const keys=[{k:'integrity',ls:['INTEGRITY']},{k:'street',ls:['STREET']},{k:'inst',ls:['INST']},{k:'influence',ls:['INFLUENCE']},{k:'exposure',ls:['EXPOSURE']},{k:'loyalty',ls:['LOYALTY']},{k:'community',ls:['COMMUNITY']}];
  const ch=[];
  keys.forEach(({k,ls})=>ls.forEach(l=>{const m=text.match(new RegExp(l+':\\s*([+-]?\\d+)','i'));if(m&&parseInt(m[1])!==0){const d=parseInt(m[1]);G.M[k]=Math.max(0,Math.min(100,G.M[k]+d));if(Math.abs(d)>=3)ch.push({l:k.toUpperCase(),d});}}));
  const cm=text.match(/CLEAN_CAP:\s*([+-]?\d+)/i);const dm=text.match(/DIRTY_CAP:\s*([+-]?\d+)/i);
  if(cm&&parseInt(cm[1])!==0){G.clean=Math.max(0,G.clean+parseInt(cm[1]));}
  if(dm&&parseInt(dm[1])!==0)G.dirty=Math.max(0,G.dirty+parseInt(dm[1]));
  if(ch.length){const tags=ch.map(c=>`<span class="mctag ${c.d>0?'mcp':'mcn'}">${c.l} ${c.d>0?'+':''}${c.d}</span>`).join('');G.narrativeHTML+=`<div style="margin:3px 0;">${tags}</div>`;}
}

function move(text){
  G.narrativeHTML+=`<div class="pact"><div class="palbl">KUTOR</div><div class="patxt">${text.replace(/^\[.*?\]\s*/,'')}</div></div>`;
  G.tab='narrative';render();scrollN();callAPI(text);
}
function sendFree(){const inp=document.getElementById('finput');if(!inp)return;const v=inp.value.trim();if(!v)return;inp.value='';move(v);}
function defChoices(){return [{type:'CLEAN',text:'Proceed carefully — gather more information.'},{type:'GRAY',text:'Move now with what you have.'},{type:'DARK',text:'Take the aggressive path.'}];}

function renderOpening(){
  const o=OPENINGS[G.origin];if(!o)return;
  G.loc=o.loc;
  const ch=G.contacts[o.char]||CTACTS[o.char]||{name:'Unknown',emoji:'👤',bg:'#111'};
  const pts=ch.name.split(' ');const ss=(o.speech||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');const sn=ch.name.replace(/'/g,"\\'");
  let html=`<div class="scene"><div class="shdr"><div class="sloc">${o.loc}</div><div class="sdiv"></div><div class="ssess">SESSION 01 — AGE ${G.age}</div></div><div style="font-size:clamp(15px,2.8vw,20px);font-weight:300;color:var(--t0);margin-bottom:8px;">${o.title}</div><div class="sbody">${o.body}</div></div>`;
  html+=`<div class="chblk"><div class="ch-left"><div class="chavat" style="background:${ch.bg};">${ch.emoji}</div><div class="chpn">${pts[0]}<br>${pts.slice(1).join(' ')}</div></div><div class="ch-right"><div class="chhdr"><div class="chname">${ch.name}</div><div class="chstat">SPEAKING</div></div><div class="chspeech">"${o.speech}"</div>${o.sub?`<div class="chsub">${o.sub}</div>`:''}<button class="hear-btn" onclick="A.speak('${ss}','${sn}');event.stopPropagation();">🔊 HEAR</button></div></div>`;
  html+=`<div class="ibox" onclick="G.modal={pre:'Context',title:'World Intel',body:'<p>${o.intel.replace(/'/g,"\\'").replace(/"/g,"&quot;")}</p>'};render()"><div class="ilbl">◉ WORLD CONTEXT</div><div class="itxt">${o.intel.substring(0,90)}...</div></div>`;
  G.narrativeHTML=html;G.choices=o.choices;G.error=null;render();
}

function viewCtc(id){
  const c=G.contacts[id];if(!c)return;
  G.modal={pre:'Contact Profile',title:c.name,body:`<div style="display:flex;align-items:center;gap:11px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--b1);">
    <div style="width:44px;height:44px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:21px;border:2px solid var(--b2);flex-shrink:0;">${c.emoji}</div>
    <div><div style="font-size:15px;color:var(--t0);margin-bottom:1px;">${c.name}</div><div style="font-family:Space Mono,monospace;font-size:6px;color:var(--gold3);">${c.basis} / ${c.disposition}${c.age>0?' | AGE '+c.age:''}</div></div></div>
    <div class="loybar"><div class="lylbl">LOYALTY — ${c.loyalty}/100</div><div class="lytrk"><div class="lyfil" style="width:${c.loyalty}%"></div></div></div>
    <div class="rtags">${c.tags.map(t=>`<div class="rtag">${t}</div>`).join('')}</div>
    <p><strong>Profile:</strong> ${c.role}</p><p><strong>Notes:</strong> <em>${c.notes}</em></p>`};render();
}

function rModal(m){return `<div class="modal-bg" onclick="if(event.target===this){G.modal=null;render();}"><div class="modal"><button class="modal-x" onclick="G.modal=null;render()">✕</button><div class="modal-pre">${m.pre||''}</div><div class="modal-title">${m.title||''}</div><div class="modal-body">${m.body||''}</div></div></div>`;}

function showSave(){
  const st=JSON.stringify({...G,loading:false,modal:null,notif:null,apiKey:'[HIDDEN]',el_key:'[HIDDEN]'},null,2);
  window._ss=JSON.stringify({...G,msgs:G.msgs.slice(-8),loading:false,modal:null,notif:null});
  G.modal={pre:'Save Session',title:'Copy Your Progress',body:`<div class="savedisp">${st}</div><button class="btn-g" onclick="navigator.clipboard.writeText(window._ss).then(()=>{G.notif={t:'Saved',b:'Copied to clipboard.'};G.modal=null;render();setTimeout(()=>{G.notif=null;render();},3500)})">COPY STATE</button>`};render();
}
function showLoad(){G.modal={pre:'Load Session',title:'Resume Your Story',body:`<textarea id="lta" style="width:100%;height:120px;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:monospace;font-size:8px;padding:9px;resize:vertical;" placeholder="Paste JSON..."></textarea><button class="btn-g" style="margin-top:9px;" onclick="doLoad()">LOAD</button>`};render();}
function doLoad(){const ta=document.getElementById('lta');if(!ta)return;try{const ld=JSON.parse(ta.value);Object.assign(G,ld,{loading:false,modal:null,notif:null});if(!G.apiKey)G.screen='setup';render();scrollN();notif('Loaded','Session '+G.session+' restored.');}catch(e){alert('Invalid session state.');}}
function resumeAuto(){const sv=loadSaved();if(!sv)return;Object.assign(G,sv,{loading:false,modal:null,notif:null});G.screen='setup';render();}
function doRestart(){
  if(confirm('Restart? All progress lost.')){
    const key=G.apiKey,el=G.el_key,lm=G.lightMode,rt=G.rate;
    G={screen:'company',apiKey:key,el_key:el,coName:'',origin:null,session:1,phase:'FOUNDATION',loc:'DMV',age:29,clean:12000,dirty:0,M:{integrity:80,street:20,inst:35,influence:10,exposure:5,loyalty:70,community:0},contacts:{},zones:{},bizOwned:[],bizMerged:[],brothFund:47000,team:[],txns:[],govOwned:[],commInvested:[],commData:{},family:{partner:null,children:[],heirId:null,landOwned:false,trust:false},thUnlocked:['salone','dmv','trinidade'],msgs:[],narrativeHTML:'',choices:[],error:null,tab:'narrative',lightMode:lm,rate:rt,past:null,loading:false,modal:null,notif:null,selOrigin:null,revH:[0,0,0,0,0,0,0,0],infH:[10,10,10,10,10,10,10,10]};
    localStorage.removeItem('bishop_v12');render();
  }
}
function scrollN(){setTimeout(()=>{const n=document.getElementById('narrative');if(n)n.scrollTop=n.scrollHeight;},80);}
function notif(t,b){G.notif={t,b};render();setTimeout(()=>{G.notif=null;render();},3500);}
function attach(){const fi=document.getElementById('finput');if(fi)fi.onkeypress=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFree();}};}

function startGame(){
  const o=ORIGINS.find(x=>x.id===G.selOrigin);if(!o)return;
  G.origin=o.id;G.clean=o.clean;G.dirty=o.dirty||0;G.M={...o.M};G.past=o.past||null;
  G.contacts={};G.zones={};G.bizOwned=[];G.bizMerged=[];G.txns=[];G.govOwned=[];G.commInvested=[];G.commData={};G.team=[];
  G.family={partner:null,children:[],heirId:null,landOwned:false,trust:false};
  G.thUnlocked=['salone','dmv','trinidade'];
  o.contacts.forEach(cid=>{if(CTACTS[cid])G.contacts[cid]={...CTACTS[cid],memory:[]};});
  G.msgs=[];G.session=1;G.narrativeHTML='';G.choices=[];
  if(!G.coName)G.coName='Kutor Holdings LLC';
  G.screen='game';G.tab='narrative';render();renderOpening();
}

render();
</script>
</body>
</html>
