<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>THE BISHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1c1c1c;
  --b1:#1e1e1e;--b2:#2a2a2a;--b3:#333;
  --t0:#eeeeee;--t1:#cccccc;--t2:#888;--t3:#444;--t4:#2a2a2a;
  --gold:#c8922a;--gold2:#e8b84b;--gold3:#8a6420;--gold4:#3a1e08;
  --red:#c44;--red2:#6b1515;--green:#4a9a6a;--green2:#1a3a2a;
  --blue:#3a7aaa;--blue2:#1a3a5a;--orange:#e88a3a;--purple:#7a4a9a;
  --player:#c8922a;--khalil:#aa4444;--rival2:#4a7aaa;--rival3:#7aaa4a;
  --neutral:#333;--contested:#8a6420;
}

.light-mode {
  --bg:#f0ebe0;--s1:#e8e0d0;--s2:#ddd5c0;--s3:#d0c8b0;
  --b1:#c8bea8;--b2:#b8aa90;--b3:#a89878;
  --t0:#1a1208;--t1:#2a1e10;--t2:#4a3820;--t3:#8a7858;--t4:#c8bea8;
  --gold:#8a5a10;--gold2:#c8922a;--gold3:#6a4208;--gold4:#f0e8d8;
  --red:#8b2020;--red2:#c44;--green:#1a5a2a;--green2:#c8e8d0;
  --blue:#1a3a6a;--blue2:#c8d8f0;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--t1);font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;line-height:1.75;min-height:100vh;transition:background .3s,color .3s;}

::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--b2);}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── TITLE ── */
.title-wrap{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:48px 24px;
  background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);
  position:relative;
}
.light-mode .title-wrap{background:radial-gradient(ellipse at 45% 25%,#d8c8a0 0%,var(--bg) 65%);}
.title-wrap::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);}
.t-eye{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.5em;color:var(--gold3);margin-bottom:28px;}
.t-main{font-size:clamp(64px,14vw,140px);font-weight:300;color:var(--t0);line-height:.82;letter-spacing:-.02em;margin-bottom:10px;}
.t-sub{font-style:italic;font-size:clamp(11px,1.6vw,15px);color:var(--gold);letter-spacing:.1em;margin-bottom:44px;}
.t-quote{font-style:italic;font-size:13px;color:var(--t3);max-width:360px;margin:0 auto 44px;line-height:1.7;}
.t-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.theme-toggle{position:absolute;top:16px;right:16px;background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;padding:6px 12px;cursor:pointer;transition:all .2s;}
.theme-toggle:hover{border-color:var(--gold3);color:var(--gold);}

/* ── SETUP ── */
.setup-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);}
.setup-box{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--gold);padding:28px;max-width:480px;width:100%;margin-bottom:20px;}
.setup-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.34em;color:var(--gold3);margin-bottom:10px;}
.setup-text{font-size:13px;color:var(--t3);line-height:1.7;margin-bottom:8px;}
.setup-link{color:var(--gold);font-style:italic;}
.api-input{width:100%;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:'Space Mono',monospace;font-size:11px;padding:12px;outline:none;border-radius:0;-webkit-appearance:none;letter-spacing:.04em;margin:10px 0;}
.api-input:focus{border-color:var(--gold3);}
.api-input::placeholder{color:var(--t3);}
.key-err{display:none;color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-bottom:8px;}

/* ── ORIGIN ── */
.origin-wrap{max-width:1080px;margin:0 auto;padding:40px 20px 60px;}
.origin-header{margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--b1);}
.origin-title{font-size:clamp(24px,4.5vw,36px);font-weight:300;color:var(--t0);margin-bottom:6px;}
.origin-sub{font-style:italic;color:var(--t3);font-size:13px;}
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:2px;margin-bottom:24px;}
.oc{background:var(--s1);border:1px solid var(--b1);padding:20px 18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.oc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:.3s;}
.oc:hover::before,.oc.sel::before{transform:scaleX(1);}
.oc:hover,.oc.sel{border-color:var(--gold3);background:var(--gold4);}
.oc-num{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.28em;color:var(--gold3);margin-bottom:9px;}
.oc-icon{font-size:26px;margin-bottom:7px;}
.oc-name{font-size:18px;color:var(--t0);margin-bottom:4px;}
.oc-tag{font-style:italic;font-size:11px;color:var(--gold);margin-bottom:8px;}
.oc-desc{font-size:12px;color:var(--t3);line-height:1.6;}
.oc-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);}
.pill{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.1em;color:var(--t3);padding:2px 5px;border:1px solid var(--b2);}
.diff-tag{position:absolute;top:10px;right:10px;font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.1em;padding:2px 5px;border:1px solid;}
.dh{color:var(--red);border-color:var(--red2);}
.dm{color:var(--gold);border-color:var(--gold3);}

/* ── GAME LAYOUT ── */
.game-wrap{display:flex;flex-direction:column;min-height:100vh;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px;
}
.brand{font-size:13px;font-weight:300;color:var(--gold);letter-spacing:.12em;}
.topstats{display:flex;gap:16px;flex-wrap:wrap;}
.ts-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.24em;color:var(--t3);display:block;}
.ts-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold2);font-weight:700;}
.topacts{display:flex;gap:5px;flex-wrap:wrap;}

.game-tabs{display:flex;background:var(--s2);border-bottom:1px solid var(--b1);}
.gtab{flex:1;padding:10px 8px;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.15em;color:var(--t3);background:transparent;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;border-bottom:2px solid transparent;}
.gtab.active{color:var(--gold);border-bottom-color:var(--gold);}
.gtab:hover{color:var(--t1);}

.tab-content{display:none;}
.tab-content.active{display:flex;flex-direction:column;}

/* ── MAP TAB ── */
.map-container{padding:16px;background:var(--bg);}
.map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.map-title{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.3em;color:var(--gold3);}
.map-legend{display:flex;gap:12px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:7px;color:var(--t2);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

.theaters{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.theater{background:var(--s1);border:1px solid var(--b1);padding:16px;}
.theater-name{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.3em;color:var(--gold3);margin-bottom:12px;}
.theater-map{position:relative;width:100%;height:240px;background:var(--s2);border:1px solid var(--b1);overflow:hidden;}
.theater-map svg{width:100%;height:100%;}

/* District zones */
.district{cursor:pointer;transition:all .2s;stroke-width:1.5;}
.district:hover{stroke-width:3;filter:brightness(1.3);}
.district.player{fill:#3a2210;stroke:var(--gold);}
.district.khalil{fill:#2a1010;stroke:#c44;}
.district.rival2{fill:#101828;stroke:var(--blue);}
.district.rival3{fill:#102010;stroke:var(--green);}
.district.neutral{fill:var(--s3);stroke:var(--b2);}
.district.contested{fill:#1a1508;stroke:var(--gold3);}
.district-label{font-family:'Space Mono',monospace;font-size:7px;fill:var(--t2);pointer-events:none;text-anchor:middle;}

.zone-info{margin-top:10px;}
.zone-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--s3);cursor:pointer;transition:all .2s;}
.zone-item:hover{background:var(--s2);padding-left:12px;}
.zone-name{font-size:12px;color:var(--t1);}
.zone-controller{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;}
.zone-controller.player{color:var(--gold);}
.zone-controller.khalil{color:var(--red);}
.zone-controller.rival2{color:var(--blue);}
.zone-controller.neutral{color:var(--t3);}
.zone-controller.contested{color:var(--orange);}
.zone-income{font-family:'Space Mono',monospace;font-size:8px;color:var(--green);}

/* ── NARRATIVE TAB ── */
.narrative-container{display:flex;flex-direction:column;flex:1;}
.narrative-layout{display:flex;flex:1;min-height:0;}
.status-col{width:200px;min-width:200px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;}
@media(max-width:680px){.status-col{display:none;}}
.narrative-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.narrative{flex:1;overflow-y:auto;padding:20px 22px;-webkit-overflow-scrolling:touch;}
@media(max-width:500px){.narrative{padding:12px;}}

/* status panel */
.ps{padding:12px;border-bottom:1px solid var(--b1);}
.pl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.34em;color:var(--t3);text-transform:uppercase;margin-bottom:8px;}
.pav-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.pav{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold3);display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,#1a1208,#261a0c);flex-shrink:0;}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px;}
.cap-box{background:var(--s2);border:1px solid var(--b1);padding:6px 8px;}
.cap-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.12em;color:var(--t3);margin-bottom:2px;}
.cap-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);font-weight:700;}
.cap-val.dirty{color:var(--red);}
.mr{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.mn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);width:58px;flex-shrink:0;}
.mt{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;transition:width .8s ease;}
.mg{background:var(--gold);}.mgr{background:var(--green);}.mb{background:var(--blue);}.mo{background:var(--orange);}.mrd{background:var(--red);}
.mv{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);width:18px;text-align:right;flex-shrink:0;}
.ci{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--s3);cursor:pointer;transition:padding .15s;}
.ci:hover{padding-left:3px;}
.ci:last-child{border-bottom:none;}
.ca{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.cn{font-size:11px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cr{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:1px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.dg{background:var(--green);}.dy{background:var(--gold);}.dr{background:var(--red);}

/* scenes */
.scene{margin-bottom:26px;}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--b1);}
.sloc{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.22em;color:var(--gold3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.sdiv{flex:1;height:1px;background:var(--b1);}
.ssess{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);white-space:nowrap;}
.stitle{font-size:clamp(16px,3vw,22px);font-weight:300;color:var(--t0);margin-bottom:10px;line-height:1.2;}
.sbody{font-size:14px;color:var(--t1);line-height:1.9;}
.sbody p{margin-bottom:10px;}

/* character block */
.chblk{display:flex;gap:12px;margin:14px 0;padding:14px;background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--gold3);}
.chport{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;width:52px;}
.chavat{width:46px;height:46px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--b2);position:relative;}
.chpn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);text-align:center;line-height:1.3;}
.chcnt{flex:1;min-width:0;}
.chhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:3px;}
.chname{font-size:13px;color:var(--t0);}
.chstat{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold3);letter-spacing:.1em;}
.chspeech{font-style:italic;font-size:13px;color:var(--t0);line-height:1.78;border-left:2px solid var(--gold3);padding-left:10px;margin-bottom:6px;}
.chsub{font-size:11px;color:var(--t3);font-style:italic;line-height:1.5;}
.speak-btn{background:var(--gold4);border:1px solid var(--gold3);color:var(--gold);font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.12em;padding:3px 8px;cursor:pointer;margin-top:4px;transition:all .2s;}
.speak-btn:hover{background:var(--gold3);color:var(--t0);}

.pact{display:flex;gap:8px;padding:8px 11px;background:var(--s3);border:1px solid var(--b1);border-left:3px solid var(--gold);margin:8px 0;}
.palbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.18em;color:var(--gold);flex-shrink:0;margin-top:1px;white-space:nowrap;}
.patxt{font-style:italic;color:var(--t1);font-size:12px;line-height:1.6;}
.sflag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--green2);background:var(--s3);padding:4px 9px;margin:4px 2px;cursor:pointer;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.12em;color:var(--green);text-transform:uppercase;}
.ibox{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--blue2);padding:8px 11px;margin:9px 0;cursor:pointer;}
.ilbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--blue);margin-bottom:3px;}
.itxt{font-size:11px;color:var(--t3);line-height:1.6;}
.mctag{display:inline-flex;align-items:center;font-family:'Space Mono',monospace;font-size:7px;padding:2px 5px;border-radius:2px;margin:2px;}
.mcp{color:var(--green);background:var(--green2);border:1px solid #1a3a1a;}
.mcn{color:var(--red);background:#150808;border:1px solid #3a1515;}

/* input */
.input-area{border-top:1px solid var(--b1);background:var(--s1);padding:10px 14px;flex-shrink:0;}
.choice-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.cbtn{background:var(--s2);border:1px solid var(--b2);padding:7px 10px;cursor:pointer;text-align:left;transition:all .2s;font-family:'Cormorant Garamond',serif;display:flex;align-items:flex-start;gap:7px;flex:1;min-width:140px;min-height:44px;}
.cbtn:hover,.cbtn:active{border-color:var(--gold3);background:var(--gold4);}
.cnum{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold3);letter-spacing:.12em;flex-shrink:0;margin-top:2px;}
.ctxt{font-size:12px;color:var(--t2);line-height:1.5;flex:1;}
.ctag{font-family:'Space Mono',monospace;font-size:6px;padding:2px 4px;border:1px solid;flex-shrink:0;margin-top:2px;}
.tc{color:var(--green);border-color:var(--green2);}
.tg{color:var(--gold);border-color:var(--gold3);}
.td{color:var(--red);border-color:var(--red2);}
.free-row{display:flex;gap:6px;}
.finput{flex:1;background:var(--s3);border:1px solid var(--b2);color:var(--t1);font-family:'Cormorant Garamond',serif;font-size:14px;padding:9px 10px;outline:none;transition:border-color .2s;min-height:44px;border-radius:0;-webkit-appearance:none;}
.finput:focus{border-color:var(--gold3);}
.finput::placeholder{color:var(--t3);font-style:italic;}
.movebtn{background:var(--gold);border:none;color:#000;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.12em;padding:9px 14px;cursor:pointer;transition:background .2s;text-transform:uppercase;white-space:nowrap;min-height:44px;}
.movebtn:hover{background:var(--gold2);}
.movebtn:disabled{opacity:.4;cursor:not-allowed;}
.errmsg{color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:7px;border:1px solid var(--red2);margin-top:6px;display:none;line-height:1.5;word-break:break-all;}

/* ── CHARTS TAB ── */
.charts-wrap{padding:16px;background:var(--bg);}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:16px;}
.chart-card{background:var(--s1);border:1px solid var(--b1);padding:16px;}
.chart-title{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.28em;color:var(--gold3);margin-bottom:12px;}
.chart-area{height:120px;position:relative;display:flex;align-items:flex-end;gap:4px;padding:0 4px;}
.bar{flex:1;background:var(--gold3);border-radius:2px 2px 0 0;transition:height .8s ease;cursor:pointer;position:relative;min-height:4px;}
.bar:hover{background:var(--gold);}
.bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);white-space:nowrap;}
.bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:7px;color:var(--gold2);white-space:nowrap;}
.chart-x{display:flex;gap:4px;padding:18px 4px 4px;margin-top:4px;}
.meter-chart{margin-bottom:8px;}
.mc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mc-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--t2);width:80px;flex-shrink:0;}
.mc-bar{flex:1;height:12px;background:var(--b2);border-radius:2px;overflow:hidden;position:relative;}
.mc-fill{height:100%;border-radius:2px;transition:width .8s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:4px;}
.mc-num{font-family:'Space Mono',monospace;font-size:7px;color:rgba(0,0,0,.7);font-weight:700;}

/* faction table */
.faction-table{width:100%;border-collapse:collapse;font-size:12px;}
.faction-table th{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--t3);padding:6px 8px;text-align:left;border-bottom:1px solid var(--b1);}
.faction-table td{padding:7px 8px;border-bottom:1px solid var(--s3);color:var(--t1);}
.faction-table tr:hover td{background:var(--s2);}
.f-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
.threat-low{color:var(--green);}
.threat-med{color:var(--gold);}
.threat-high{color:var(--red);}

/* ── AUDIO ── */
.audio-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--s2);border-bottom:1px solid var(--b1);}
.audio-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--t3);}

  genuine:{loc:'SILVER SPRING, MD',title:'Tuesday. 6:47 AM.',body:`<p>The alarm doesn't go off. You were already awake.</p><p>Twenty minutes on the ceiling, running the same calculation. The Khalil Group's warehousing contract. Seven years of exclusivity at Freetown's main port terminal. A door that just closed — unless it didn't close all the way.</p><p>$12,000 in your account. $47K in the brotherhood fund. A Top Secret clearance. A name in Salone that carries weight in the right circles — your family's weight, not yours yet.</p><p>Your phone lights up. Raymond Kofi.</p>`,char:'raymond',speech:`You still sleeping? I have something. Not for the phone. Breakfast. The Ethiopian spot on Georgia Avenue. Seven-thirty. Come alone.`,sub:`He's already there. You can hear the restaurant behind his voice.`,choices:[{type:'CLEAN',text:"Go to breakfast. Raymond doesn't call early unless it's real."},{type:'GRAY',text:"Go — but research Freetown port activity first. Walk in informed."},{type:'DARK',text:"Have someone observe Raymond before you show your face."}],intel:`Lebanese merchant networks have been embedded in West African trade since the 1800s. Today the Khalil Group represents this pattern at its most sophisticated — multi-generational, politically connected, and deeply embedded in port access across Sierra Leone, Guinea, and Liberia.`},
  inheritance:{loc:"ATTORNEY'S OFFICE — DMV",title:'The Reading of the Will.',body:`<p>The office smells like old paper and careful money.</p><p>$340,000 in a trust you didn't know existed. Three properties in Salone. A 15% stake in a Freetown logistics operation held quietly for eleven years. Seven names with phone numbers. One works in the Ministry of Trade.</p><p>There are also two debts. One financial. One something else.</p>`,char:'raymond',speech:`The properties are yours. The relationships are not. Those you earn on your own. He didn't want you inheriting his reputation. He wanted you to build yours.`,sub:`Raymond was named voluntary advisor. He knew your uncle twenty years.`,choices:[{type:'CLEAN',text:"Meet Raymond. Understand everything before touching anything."},{type:'GRAY',text:"Contact the Ministry of Trade name directly. Establish yourself first."},{type:'DARK',text:"Investigate the second debt before anyone knows you know about it."}],intel:`Inheritance in frontier markets frequently carries undisclosed liabilities — land disputes, informal debt obligations, and political relationships maintained through the previous holder.`},
  employee:{loc:'TYSONS CORNER, VA',title:'Thursday. The Walkthrough.',body:`<p>Four months in. Long enough to know which partners actually know what they're doing.</p><p>You're in a walkthrough. Taking notes, which means invisible. The client's CIO mentions something off-books — a logistics play in West Africa. They need someone who understands both the cleared environment and the ground reality. Someone the community trusts.</p><p>You write nothing down. You don't need to.</p>`,char:'raymond',speech:`I heard about a young auditor at EY. Sierra Leonean name. Active clearance. That combination doesn't come around often. Breakfast?`,sub:`You don't know how Raymond heard about you this quickly.`,choices:[{type:'CLEAN',text:"Go. Find out how he knows about you before saying anything."},{type:'GRAY',text:"Research Raymond before the meeting. Know his position first."},{type:'DARK',text:"Look into the CIO's logistics mention before meeting anyone."}],intel:`The DMV federal contractor market pays significant premiums for cleared GRC professionals. TS clearance plus CISA can command $90K-$130K+ at firms like Booz Allen, Leidos, and Deloitte Federal.`},
  return:{loc:'DULLES INTERNATIONAL',title:'Back On American Ground.',body:`<p>Three weeks in Salone. A funeral, then a land dispute more complicated than anyone admitted when they called you.</p><p>You came back with something you didn't have before. The Khalil Group's operation mapped in your head. Minister Bangura met with a Chinese delegation twice while you were there — no announcement either time. Aminata Jalloh's number in your phone. She said: call when you're ready to be serious.</p>`,char:'raymond',speech:`You just landed. I know. Come see me before you unpack. Some things moved while you were gone. One concerns you directly.`,sub:`He knew your flight. He's been tracking something.`,choices:[{type:'CLEAN',text:"Go straight to Raymond. Find out what moved before anything else."},{type:'GRAY',text:"Call Aminata first. Lock that connection while it's fresh."},{type:'DARK',text:"Find out who told Raymond your flight details before meeting anyone."}],intel:`The AfCFTA is creating the world's largest free trade area by number of countries. Internal African trade projected to increase 50%+ in the next decade. A generational logistics opportunity. Source: au-afcfta.org`},
  operators_son:{loc:'PRIVATE DINING — WASHINGTON D.C.',title:'The Introduction.',body:`<p>Your father doesn't take you to restaurants. He takes you to rooms inside restaurants that don't appear on any reservation system.</p><p>Tonight there are four men at the table. Your father introduces you with nine words: "This is my son. He's ready to listen." Then he says nothing else for forty minutes.</p><p>You listen. A logistics deal. A Ministry connection in Salone that needs maintaining through someone new. You catch enough to know you're being evaluated in real time.</p>`,char:'father',speech:`Don't speak unless you have something worth saying. Don't ask questions that show you haven't been paying attention.`,sub:`He says this quietly, almost kindly. The men at the table are listening.`,choices:[{type:'CLEAN',text:"Stay silent. Observe. Map every person, interest, and subtext."},{type:'GRAY',text:"Ask one precise question that shows you understood what was being discussed."},{type:'DARK',text:"After dinner, have one of the three men looked into."}],intel:`In West African business culture, the introduction — who brings you into a room and how they describe you — carries disproportionate weight. Your sponsor's credibility transfers to you temporarily.`},

          text: text,
          model_id: 'eleven_monolingual_v1',
          voice_settings: { stability: 0.5, similarity_boost: 0.75 }
        })
      });
      if (!res.ok) throw new Error('EL failed ' + res.status);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      this.current = new window.Audio(url);
      this.current.onended = () => { this.setSpeaking(false); URL.revokeObjectURL(url); };
      this.current.onerror = () => { this.setSpeaking(false); this._speakBrowser(text, charName); };
      this.current.play();
    } catch(e) {
      console.warn('ElevenLabs fallback:', e.message);
      this._speakBrowser(text, charName);
    }
  },

  _speakBrowser(text, charName) {
    if (!window.speechSynthesis) return;
    const v = VOICES[charName] || VOICES.default;
    const synth = window.speechSynthesis;
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = v.rate; utt.pitch = v.pitch; utt.volume = 0.9;
    const voices = synth.getVoices().filter(x => x.lang.startsWith('en'));
    if (v.gender === 'f') {
      utt.voice = voices.find(x => /samantha|karen|victoria|zira|susan|female/i.test(x.name)) || voices[0];
    } else {
      utt.voice = voices.find(x => /daniel|david|alex|fred|male|google uk/i.test(x.name)) || voices[1] || voices[0];
    }
    this.setSpeaking(true);
    utt.onend = () => this.setSpeaking(false);
    utt.onerror = () => this.setSpeaking(false);
    synth.speak(utt);
  },

  narrateScene(html) {
    if (!this.enabled) return;
    const div = document.createElement('div');
    div.innerHTML = html;
    div.querySelectorAll('.chblk, .pact').forEach(el => el.remove());
    const text = div.textContent.replace(/\s+/g,' ').trim();
    if (text.length > 10) setTimeout(() => this.speak(text, 'narrator'), 300);
  }
};

if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

function render() {
  document.body.classList.toggle('light-mode', G.lightMode);
  const root = document.getElementById('root');

  if (G.screen === 'title') root.innerHTML = renderTitle();
  else if (G.screen === 'setup') root.innerHTML = renderSetup();
  else if (G.screen === 'origin') root.innerHTML = renderOrigin();
  else if (G.screen === 'game') root.innerHTML = renderGame();

  if (G.loading) root.innerHTML += `<div class="loading-overlay"><div class="ld-txt">The board is moving</div><div class="ldd-wrap" style="display:flex;gap:6px;"><div class="ldd"></div><div class="ldd"></div><div class="ldd"></div></div></div>`;

  if (G.notif) root.innerHTML += `<div class="notif"><div class="nt">${G.notif.t}</div><div class="nb">${G.notif.b}</div></div>`;

  attachEvents();
  if (G.screen === 'game') scrollNarr();
}

function renderMap() {
  const theaters = Object.entries(THEATERS).map(([tid, theater]) => {
    const zones = theater.zones.map(z => {
      const controller = G.zones[z.id] || z.controller;
      const faction = FACTIONS[controller] || FACTIONS.player;
      const isPlayer = controller === 'player';
      return `<div class="zone-item" onclick="openZone('${z.id}','${tid}')">
        <div class="zone-name">${z.name}</div>
        <div class="zone-controller ${controller}">${isPlayer ? 'YOU' : faction.short}</div>
        ${isPlayer ? `<div class="zone-income">+$${z.income.toLocaleString()}/mo</div>` : ''}
        <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);margin-left:4px;">▶</div>
      </div>`;
    }).join('');

    // Build SVG map for this theater
    const svgMap = buildTheaterSVG(theater, tid);

    return `<div class="theater">
      <div class="theater-name">${theater.name} — ${theater.subtitle}</div>
      <div class="theater-map">${svgMap}</div>
      <div class="zone-info">${zones}</div>
    </div>`;
  }).join('');

  const legendItems = [
    {color:'var(--player)',label:'YOUR CONTROL'},
    {color:FACTIONS.khalil.color,label:'KHALIL'},
    {color:FACTIONS.chen_logistics.color,label:'CHEN'},
    {color:FACTIONS.peninsula_group.color,label:'PENINSULA'},
    {color:FACTIONS.koroma_network.color,label:'KOROMA'},
    {color:'var(--neutral)',label:'NEUTRAL'},
  ];

  return `<div class="map-container">
    <div class="map-header">
      <div class="map-title">WORLD MAP — THEATER CONTROL</div>
      <div class="map-legend">
        ${legendItems.map(l=>`<div class="legend-item"><div class="legend-dot" style="background:${l.color};"></div>${l.label}</div>`).join('')}
      </div>
    </div>
    <div class="theaters">${theaters}</div>
  </div>`;
}

function buildTheaterSVG(theater, tid) {
  const zones = theater.zones;
  const total = zones.length;
  const cols = Math.ceil(Math.sqrt(total));
  const rows = Math.ceil(total / cols);
  const w = 100 / cols;
  const h = 100 / rows;

  const rects = zones.map((z, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = col * w;
    const y = row * h;
    const controller = G.zones[z.id] || z.controller;

    const colorMap = {
      player: '#3a2210',
      khalil: '#2a1010',
      chen_logistics: '#101828',
      peninsula_group: '#102010',
      koroma_network: '#14101a',
      street_syndicate: '#1a1208',
      neutral: '#1c1c1c',
      contested: '#1a1508'
    };

    const strokeMap = {
      player: '#c8922a',
      khalil: '#c44444',
      chen_logistics: '#3a7aaa',
      peninsula_group: '#4a9a6a',
      koroma_network: '#7a4a9a',
      street_syndicate: '#e88a3a',
      neutral: '#2a2a2a',
      contested: '#8a6420'
    };

    const fill = colorMap[controller] || '#1c1c1c';
    const stroke = strokeMap[controller] || '#2a2a2a';
    const shortName = z.name.split(' ').map(w=>w[0]).join('');

    return `<g onclick="openZone('${z.id}','${tid}')" style="cursor:pointer;">
      <rect x="${x+1}%" y="${y+1}%" width="${w-2}%" height="${h-2}%" fill="${fill}" stroke="${stroke}" stroke-width="1.5" rx="3">
        <title>${z.name}</title>
      </rect>
      <text x="${x+w/2}%" y="${y+h/2-2}%" class="district-label" font-size="7">${shortName}</text>
      <text x="${x+w/2}%" y="${y+h/2+6}%" class="district-label" font-size="5" fill="${stroke}">${controller==='player'?'YOU':controller.split('_')[0].toUpperCase()}</text>
    </g>`;
  }).join('');

  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none">${rects}</svg>`;
}

function openZone(zoneId, theaterId) {
  const theater = THEATERS[theaterId];
  if (!theater) return;
  const zone = theater.zones.find(z=>z.id===zoneId);
  if (!zone) return;
  const controller = G.zones[zoneId] || zone.controller;
  const faction = FACTIONS[controller] || {name:'Unknown',color:'#666'};
  const isPlayer = controller === 'player';

  const actions = isPlayer
    ? `<p style="color:var(--green);font-style:italic;margin-top:12px;">✓ You control this zone. Income: +$${zone.income.toLocaleString()}/month</p>`
    : `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
        <button class="btn-g" style="font-size:8px;padding:8px 16px;" onclick="G.modal=null;makeMove('[CLEAN] I want to establish a presence in ${zone.name.replace(/'/g,"\\'")} — find a legitimate entry point.')">MOVE ON THIS ZONE</button>
        <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;makeMove('[DARK] I want to disrupt ${controller} control of ${zone.name.replace(/'/g,"\\'")}.')">DISRUPT CONTROL</button>
      </div>`;

  G.modal = {
    pre: theaterId.toUpperCase() + ' — ZONE INTELLIGENCE',
    title: zone.name,
    body: `<p><strong>Current Controller:</strong> <span style="color:${faction.color};">${faction.name}</span></p>
      <p><strong>Description:</strong> ${zone.desc}</p>
      ${!isPlayer ? `<p><strong>Faction Profile:</strong> ${faction.desc||''}</p>` : ''}
      <p><strong>Monthly Value:</strong> $${zone.income.toLocaleString()}</p>
      ${actions}`
  };
  render();
}

// ══════════════════════════════════════
// API CALL
// ══════════════════════════════════════
async function callAPI(playerAction) {
  G.loading = true;
  G.error = null;
  render();

  const context = buildContext();
  
  // CORRECT message construction:
  // History goes FIRST (alternating user/assistant)
  // New context+action goes LAST as the current user turn
  // This way the model sees history then the new request - not the other way around
  const history = G.msgs.slice(-6); // last 3 exchanges max
  
  let messages;
  if (history.length === 0) {
    // First turn - just context + action
    messages = [{ 
      role: "user", 
      content: context + "\n\nBEGIN. Player first action: " + playerAction 
    }];
  } else {
    // Ongoing - history first, then fresh context + new action last
    messages = [
      ...history,
      { 
        role: "user", 
        content: "State: Int:" + G.meters.integrity + " St:" + G.meters.street + " Inf:" + G.meters.influence + " Exp:" + G.meters.exposure + " Cap:$" + G.cleanCap.toLocaleString() + " Sess:" + G.session + "\n\nAction: " + playerAction 
      }
    ];
  }

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": G.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        messages: messages
      })
    });

    const data = await response.json();
    let text = '';
    if (data.content && Array.isArray(data.content)) {
      for (const block of data.content) {
        if (block.type === 'text' && block.text) { text = block.text; break; }
      }
    }

    if (!text) throw new Error(data.error ? data.error.message : 'No text in response: ' + JSON.stringify(data).substring(0,150));

    G.msgs.push({ role: 'user', content: playerAction });
    G.msgs.push({ role: 'assistant', content: text });
    G.session++;

    // Update session tracking
    G.sessionRevenue = [...G.sessionRevenue.slice(1), G.cleanCap + G.dirtyCap];
    G.sessionInfluence = [...G.sessionInfluence.slice(1), G.meters.influence];

    processResponse(text);

  } catch (err) {
    G.loading = false;
    G.error = err.message || 'Connection error. Please try again.';
    render();
  }
}

function buildContext() {
  const m = G.meters;
  const pz = Object.values(THEATERS).flatMap(t=>t.zones).filter(z=>(G.zones[z.id]||z.controller)==='player').map(z=>z.name).join(', ') || 'None yet';
  return [
    "THE BISHOP — narrative engine. Write like a serious novelist. Atmospheric, precise, morally complex.",
    "PLAYER: 29yr Sierra Leonean-American. IT Auditor DMV. TS clearance. Brotherhood fund $47K. Quiet operator building logistics empire in Salone + Caribbean. Origin: " + G.origin + ".",
    G.past ? "SECRET: " + G.past : "",
    "FACTIONS: Khalil Group (port control, HIGH threat), Chen Logistics (infrastructure, MED), Koroma Network (political web, MED), Peninsula Group (Caribbean, LOW), Street Syndicate (informal, LOW).",
    "METERS: Int:" + m.integrity + " St:" + m.street + " Inst:" + m.inst + " Inf:" + m.influence + " Exp:" + m.exposure + " Loy:" + m.loyalty,
    "Capital: $" + G.cleanCap.toLocaleString() + " clean / $" + G.dirtyCap.toLocaleString() + " dirty. Session:" + G.session + ". Zones: " + pz,
    "Contacts: " + Object.values(G.contacts).map(c=>c.name).join(", "),
    "CHARACTER SPEECH: [CHARACTER:Name|emoji|#bg]words[/CHARACTER]",
    "ZONE UPDATES: ZONE_CONTROL: zone_id -> controller",
    "END EVERY RESPONSE WITH:",
    "---METERS---",
    "INTEGRITY:+0, STREET:+0, INST:+0, INFLUENCE:+0, EXPOSURE:+0, LOYALTY:+0, CLEAN_CAP:+0, DIRTY_CAP:+0",
    "---CHOICES---",
    "[CLEAN] choice",
    "[GRAY] choice",
    "[DARK] choice",
    "---STRATEGY---",
    "PRINCIPLE: name | BOOK: source | NOTE: sentence",
    "---INTEL---",
    "FACT: context | SOURCE: resource",
    "RULES: Literary noir. No right answers. Decisions cascade. Real consequences. Characters remember everything."
  ].filter(Boolean).join("\n");
}

// ══════════════════════════════════════
// PROCESS RESPONSE
// ══════════════════════════════════════
function processResponse(text) {
  const metersM  = text.match(/---METERS---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const choicesM = text.match(/---CHOICES---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const stratM   = text.match(/---STRATEGY---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const intelM   = text.match(/---INTEL---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);

  // Check for zone control updates
  const zoneMatches = text.matchAll(/ZONE_CONTROL:\s*(\w+)\s*->\s*(\w+)/g);
  for (const match of zoneMatches) {
    G.zones[match[1]] = match[2];
    const zoneName = Object.values(THEATERS).flatMap(t=>t.zones).find(z=>z.id===match[1])?.name || match[1];
    const newController = match[2] === 'player' ? 'YOU' : match[2];
    showNotif('Territory Update', `${zoneName} → ${newController}`);
  }

  let narrative = text
    .replace(/---METERS---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---CHOICES---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---STRATEGY---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---INTEL---[\s\S]*/g,'')
    .replace(/ZONE_CONTROL:.*\n?/g,'')
    .replace(/---[A-Z]+---/g,'').trim();

  let html = `<div class="scene">
    <div class="shdr"><div class="sloc">${G.location.toUpperCase()}</div><div class="sdiv"></div><div class="ssess">SESSION ${String(G.session).padStart(2,'0')}</div></div>
    <div class="sbody">${parseCharBlocks(narrative)}</div>
  </div>`;

  // Strategy flag
  if (stratM) {
    const pm = stratM[1].match(/PRINCIPLE:(.*?)(?:\||$)/);
    if (pm) {
      const bm = stratM[1].match(/BOOK:(.*?)(?:\||$)/);
      const nm = stratM[1].match(/NOTE:(.*?)(?:\||$)/);
      const note = (nm?nm[1].trim():'') + (bm?' — '+bm[1].trim():'');
      const safePrinc = pm[1].trim().replace(/'/g,"\\'").replace(/"/g,'&quot;');
      html += `<span class="sflag" onclick="G.modal={pre:'Strategy',title:'${safePrinc}',body:'<p>${note.replace(/'/g,"\\'").replace(/"/g,'&quot;')}</p>'};render()">♟ ${pm[1].trim()}</span>`;
    }
  }

  // Intel box
  if (intelM) {
    const fm = intelM[1].match(/FACT:(.*?)(?:\||$)/);
    if (fm) {
      const sm = intelM[1].match(/SOURCE:(.*?)(?:\||$)/);
      const safeF = fm[1].trim().replace(/'/g,"\\'").replace(/"/g,'&quot;');
      html += `<div class="ibox" onclick="G.modal={pre:'World Intel',title:'Educational Context',body:'<p>${safeF}</p>'};render()">
        <div class="ilbl">◉ INTEL — click to read</div>
        <div class="itxt">${fm[1].trim().substring(0,90)}...</div>
      </div>`;
    }
  }

  G.narrativeHTML += html;
  if (metersM) applyMeters(metersM[1]);

  if (choicesM) {
    const lines = choicesM[1].trim().split(/\r?\n/).filter(l=>l.trim());
    const choices = lines.map(l=>{const m=l.match(/\[(CLEAN|GRAY|DARK)\]\s*(.*)/);return m?{type:m[1],text:m[2].trim()}:null;}).filter(Boolean);
    G.choices = choices.length ? choices : defaultChoices();
  } else {
    G.choices = defaultChoices();
  }

  G.loading = false;
  G.error = null;
  render();
  scrollNarr();
  // Auto-narrate new scene if audio enabled
  if (Audio.enabled) {
    setTimeout(() => Audio.narrateScene(html), 400);
  }
}

// ══════════════════════════════════════
// PARSE CHARACTER BLOCKS
// ══════════════════════════════════════
function parseCharBlocks(text) {
  let r = text.replace(/\[CHARACTER:(.*?)\]([\s\S]*?)\[\/CHARACTER\]/g, (m,hdr,body) => {
    const p = hdr.split('|');
    const name = p[0]||'Unknown';
    const emoji = p[1]||'👤';
    const bg = p[2]||'#111';
    const speech = body.replace(/^[\s"]+|[\s"]+$/g,'');
    return buildChar(name, emoji, bg, speech);
  });
  return r.split(/\n\n+/).filter(p=>p.trim()).map(p=>p.includes('chblk')?p:`<p>${p.trim()}</p>`).join('');
}

function buildChar(name, emoji, bg, speech, sub) {
  const parts = name.split(' ');
  const speakBtn = `<button class="speak-btn" onclick="Audio.speak('${speech.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${name.replace(/'/g,"\\'")}');event.stopPropagation();">🔊 HEAR</button>`;
  return `<div class="chblk">
    <div class="chport">
      <div class="chavat" style="background:${bg};">${emoji}</div>
      <div class="chpn">${parts[0]}<br>${parts.slice(1).join(' ')}</div>
    </div>
    <div class="chcnt">
      <div class="chhdr"><div class="chname">${name}</div><div class="chstat">SPEAKING</div></div>
      <div class="chspeech">"${speech}"</div>
      ${sub?`<div class="chsub">${sub}</div>`:''}
      ${speakBtn}
    </div>
  </div>`;
}

// ══════════════════════════════════════
// APPLY METERS
// ══════════════════════════════════════
function applyMeters(text) {
  const meterKeys = [
    {k:'integrity',ls:['INTEGRITY']},{k:'street',ls:['STREET','STREET_REP']},
    {k:'inst',ls:['INST','INST_REP']},{k:'influence',ls:['INFLUENCE']},
    {k:'exposure',ls:['EXPOSURE']},{k:'loyalty',ls:['LOYALTY']}
  ];
  const changes = [];
  meterKeys.forEach(({k,ls})=>{
    ls.forEach(l=>{
      const m = text.match(new RegExp(l+':\\s*([+-]?\\d+)','i'));
      if(m&&parseInt(m[1])!==0){
        const d=parseInt(m[1]);
        G.meters[k]=Math.max(0,Math.min(100,G.meters[k]+d));
        if(Math.abs(d)>=3) changes.push({label:k.toUpperCase(),delta:d});
      }
    });
  });
  const cm=text.match(/CLEAN_CAP:\s*([+-]?\d+)/i);
  const dm=text.match(/DIRTY_CAP:\s*([+-]?\d+)/i);
  if(cm&&parseInt(cm[1])!==0) G.cleanCap=Math.max(0,G.cleanCap+parseInt(cm[1]));
  if(dm&&parseInt(dm[1])!==0) G.dirtyCap=Math.max(0,G.dirtyCap+parseInt(dm[1]));
  if(changes.length){
    const tags=changes.map(c=>`<span class="mctag ${c.delta>0?'mcp':'mcn'}">${c.label} ${c.delta>0?'+':''}${c.delta}</span>`).join('');
    G.narrativeHTML+=`<div style="margin:4px 0;">${tags}</div>`;
  }
}

// ══════════════════════════════════════
// GAME ACTIONS
// ══════════════════════════════════════
function makeMove(text) {
  G.narrativeHTML += `<div class="pact"><div class="palbl">YOUR MOVE</div><div class="patxt">${text.replace(/^\[.*?\]\s*/,'')}</div></div>`;
  G.activeTab = 'narrative';
  render();
  scrollNarr();
  callAPI(text);
}

function sendFree() {
  const inp = document.getElementById('finput');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) return;
  inp.value = '';
  makeMove(val);
}

function defaultChoices() {
  return [
    {type:'CLEAN', text:'Proceed carefully — gather more information first.'},
    {type:'GRAY',  text:'Move with what you have — accept the uncertainty.'},
    {type:'DARK',  text:'Take the aggressive path — force the outcome.'}
  ];
}

function switchTab(tab) {
  G.activeTab = tab;
  render();
}

// ══════════════════════════════════════
// OPENING SCENE
// ══════════════════════════════════════
function renderOpening() {
  const o = OPENINGS[G.origin];
  if (!o) return;
  G.location = o.loc.split(' ')[0];
  const charData = G.contacts[o.char] || CONTACTS[o.char] || {name:'Unknown',emoji:'👤',bg:'#111'};
  let html = `<div class="scene">
    <div class="shdr"><div class="sloc">${o.loc}</div><div class="sdiv"></div><div class="ssess">SESSION 01 — ORIGIN</div></div>
    <div class="stitle">${o.title}</div>
    <div class="sbody">${o.body}</div>
  </div>`;
  html += buildChar(charData.name, charData.emoji, charData.bg, o.speech, o.sub);
  html += `<div class="ibox" onclick="G.modal={pre:'World Context',title:'Historical Background',body:'<p>${o.intel.replace(/'/g,"\\'").replace(/"/g,'&quot;')}</p>'};render()">
    <div class="ilbl">◉ WORLD CONTEXT — click to read</div>
    <div class="itxt">${o.intel.substring(0,90)}...</div>
  </div>`;
  G.narrativeHTML = html;
  G.choices = o.choices;
  G.error = null;
  render();
}

    body: `<div class="cphdr">
      <div class="cpav" style="background:${c.bg};">${c.emoji}</div>
      <div><div class="cpname">${c.name}</div><div class="cprole">${c.basis} / ${c.disposition}</div></div>
    </div>

    <div class="reltags">${c.tags.map(t=>`<div class="rtag">${t}</div>`).join('')}</div>
    <p><strong>Profile:</strong> ${c.role}</p>

    ${c.memory&&c.memory.length?`<p><strong>History:</strong> ${c.memory.join('. ')}</p>`:'<p style="color:var(--t3);font-style:italic;">No significant interactions yet.</p>'}`

}

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function renderModal(m) {
  return `<div class="modal-overlay" onclick="if(event.target===this){G.modal=null;render();}">
    <div class="modal">
      <button class="modal-x" onclick="G.modal=null;render()">✕</button>
      <div class="modal-pre">${m.pre||''}</div>
      <div class="modal-title">${m.title||''}</div>
      <div class="modal-body">${m.body||''}</div>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// SAVE / LOAD / RESTART
// ══════════════════════════════════════
function showSave() {
  const state = JSON.stringify({...G, msgs:G.msgs.slice(-8), loading:false, modal:null, notif:null, apiKey:'[HIDDEN]'}, null, 2);
  window._ss = JSON.stringify({...G, msgs:G.msgs.slice(-8), loading:false, modal:null, notif:null});
  G.modal = {
    pre: 'Save Session', title: 'Copy Your Progress',
    body: `<p style="color:var(--t3);font-size:12px;margin-bottom:10px;">Copy this state. Paste it at the start of your next session.</p>
      <div class="savedisp">${state}</div>
      <button class="btn-g" onclick="navigator.clipboard.writeText(window._ss).then(()=>{G.notif={t:'Saved',b:'Copied to clipboard.'};G.modal=null;render();setTimeout(()=>{G.notif=null;render();},3500)})">COPY STATE</button>`
  };
  render();
}

function showLoad() {
  G.modal = {
    pre: 'Load Session', title: 'Resume Your Story',
    body: `<p style="color:var(--t3);font-size:12px;margin-bottom:10px;">Paste your saved session state below.</p>
      <textarea id="load-ta" style="width:100%;height:140px;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:monospace;font-size:8px;padding:10px;resize:vertical;" placeholder="Paste JSON here..."></textarea>
      <button class="btn-g" style="margin-top:10px;" onclick="loadSession()">LOAD</button>`
  };
  render();
}

function loadSession() {
  const ta = document.getElementById('load-ta');
  if (!ta) return;
  try {
    const loaded = JSON.parse(ta.value);
    Object.assign(G, loaded, {loading:false,modal:null,notif:null});
    if (!G.apiKey) { G.screen='setup'; }
    render();
    scrollNarr();
    showNotif('Loaded', 'Resuming at Session ' + G.session + '.');
  } catch(e) { alert('Invalid session state.'); }
}

function confirmRestart() {
  if (confirm('Restart? Current progress will be lost.')) {
    const key = G.apiKey;
    G = {screen:'origin',apiKey:key,origin:null,session:1,phase:'FOUNDATION',location:'DMV',cleanCap:12000,dirtyCap:0,meters:{integrity:80,street:20,inst:35,influence:10,exposure:5,loyalty:70},contacts:{},zones:{},history:[],msgs:[],past:null,loading:false,modal:null,notif:null,selectedOrigin:null,narrativeHTML:'',choices:[],error:null,activeTab:'narrative',audioEnabled:false,lightMode:G.lightMode,sessionRevenue:[0,0,0,0,0,0,0,0],sessionInfluence:[10,10,10,10,10,10,10,10]};
    render();
  }
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function selectOrigin(id) { G.selectedOrigin=id; render(); }
function scrollNarr() { setTimeout(()=>{ const n=document.getElementById('narrative'); if(n) n.scrollTop=n.scrollHeight; },80); }
function showNotif(t,b) { G.notif={t,b}; render(); setTimeout(()=>{G.notif=null;render();},3500); }
function attachEvents() {
  const fi=document.getElementById('finput');
  if(fi) fi.onkeypress=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFree();}};
}

function startGame() {
  const o = ORIGINS.find(x=>x.id===G.selectedOrigin);
  if (!o) return;
  G.origin=o.id; G.cleanCap=o.clean; G.dirtyCap=o.dirty||0;
  G.meters={...o.meters}; G.past=o.past||null;
  G.contacts={}; G.zones={};
  o.contacts.forEach(cid=>{ if(CONTACTS[cid]) G.contacts[cid]={...CONTACTS[cid],memory:[]}; });
  G.msgs=[]; G.session=1; G.narrativeHTML=''; G.choices=[];
  G.screen='game'; G.activeTab='narrative';
  render();
  renderOpening();
}

// ══════════════════════════════════════

render();
</script>
