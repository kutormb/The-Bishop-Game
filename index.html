<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>THE BISHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');
:root{
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1c1c1c;--b1:#1e1e1e;--b2:#2a2a2a;
  --t0:#eeeeee;--t1:#cccccc;--t2:#888;--t3:#444;
  --gold:#c8922a;--gold2:#e8b84b;--gold3:#8a6420;--gold4:#2a1a06;
  --red:#c44;--red2:#6b1515;--green:#4a9a6a;--green2:#1a3a2a;
  --blue:#3a7aaa;--blue2:#1a3a5a;--orange:#e88a3a;--purple:#7a4a9a;
  --teal:#3a9a8a;--teal2:#1a3a38;--heat0:#4a9a6a;--heat1:#c8922a;--heat2:#c44;
}
.light{--bg:#f2ede4;--s1:#e8e0d0;--s2:#ddd6c4;--b1:#c8bca4;--b2:#b8a888;--t0:#120e06;--t1:#2a1e0e;--t2:#5a4a2e;--t3:#9a8a6a;--gold:#7a4e0e;--gold2:#aa7820;--gold3:#5a3a08;--gold4:#f0e8d8;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t1);font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;line-height:1.75;min-height:100vh;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:var(--b2);}
.scr{display:none;}.scr.on{display:block;}

/* TITLE */
.title-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);position:relative;}
.t-eye{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.5em;color:var(--gold3);margin-bottom:28px;}
.t-main{font-size:clamp(60px,13vw,130px);font-weight:300;color:var(--t0);line-height:.82;letter-spacing:-.02em;margin-bottom:10px;}
.t-sub{font-style:italic;font-size:clamp(11px,1.6vw,15px);color:var(--gold);letter-spacing:.1em;margin-bottom:40px;}
.t-quote{font-style:italic;font-size:13px;color:var(--t3);max-width:340px;margin:0 auto 40px;line-height:1.7;}
.t-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.theme-btn{position:absolute;top:16px;right:16px;background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:8px;padding:6px 10px;cursor:pointer;}

/* SETUP + COMPANY */
.setup-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);}
.setup-card{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--gold);padding:22px;max-width:460px;width:100%;margin-bottom:14px;}
.setup-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.3em;color:var(--gold3);margin-bottom:8px;}
.setup-txt{font-size:13px;color:var(--t3);line-height:1.65;margin-bottom:6px;}
.api-inp{width:100%;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:'Space Mono',monospace;font-size:11px;padding:10px;outline:none;border-radius:0;margin:7px 0;}
.api-inp:focus{border-color:var(--gold3);}
.api-inp::placeholder{color:var(--t3);}
.co-inp{width:100%;background:#060606;border:2px solid var(--gold3);color:var(--gold2);font-family:'Cormorant Garamond',serif;font-size:20px;padding:12px;outline:none;border-radius:0;margin:7px 0;letter-spacing:.05em;}
.co-inp::placeholder{color:var(--gold3);opacity:.4;}
.key-err{display:none;color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-bottom:7px;}

/* ORIGIN */
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:2px;margin-bottom:20px;}
.oc{background:var(--s1);border:1px solid var(--b1);padding:17px 15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.oc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:.3s;}
.oc:hover::before,.oc.sel::before{transform:scaleX(1);}
.oc:hover,.oc.sel{border-color:var(--gold3);background:var(--gold4);}
.oc-num{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.26em;color:var(--gold3);margin-bottom:8px;}
.oc-icon{font-size:24px;margin-bottom:6px;}
.oc-name{font-size:17px;color:var(--t0);margin-bottom:3px;}
.oc-tag{font-style:italic;font-size:11px;color:var(--gold);margin-bottom:7px;}
.oc-desc{font-size:12px;color:var(--t3);line-height:1.6;}
.oc-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--b1);}
.pill{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);padding:2px 5px;border:1px solid var(--b2);}
.diff-tag{position:absolute;top:9px;right:9px;font-family:'Space Mono',monospace;font-size:6px;padding:2px 5px;border:1px solid;}
.dh{color:var(--red);border-color:var(--red2);}.dm{color:var(--gold);border-color:var(--gold3);}

/* NEWS TICKER */
.ticker-wrap{background:#050505;border-bottom:1px solid var(--b1);overflow:hidden;height:22px;display:flex;align-items:center;flex-shrink:0;}
.ticker-label{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.2em;color:var(--gold3);padding:0 10px;white-space:nowrap;border-right:1px solid var(--b1);flex-shrink:0;}
.ticker-scroll{flex:1;overflow:hidden;white-space:nowrap;}
.ticker-inner{display:inline-block;animation:ticker 40s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
.ticker-item{display:inline-block;font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);padding:0 20px;}
.ticker-item.hot{color:var(--red);}
.ticker-item.gold{color:var(--gold);}
.ticker-item.green{color:var(--green);}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:6px 14px;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;flex-wrap:wrap;gap:4px;min-height:44px;}
.brand{font-size:12px;font-weight:300;color:var(--gold);}
.co-badge{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold3);padding:2px 6px;border:1px solid var(--gold3);background:var(--gold4);}
.topstats{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.ts-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.18em;color:var(--t3);display:block;}
.ts-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold2);font-weight:700;}

/* HEAT BADGE */
.heat-badge{display:flex;align-items:center;gap:5px;padding:3px 8px;border:1px solid;border-radius:2px;}
.heat-badge.ghost{color:var(--green);border-color:var(--green2);background:#0a1a0a;}
.heat-badge.whisper{color:var(--gold);border-color:var(--gold3);background:var(--gold4);}
.heat-badge.watched{color:var(--orange);border-color:#3a2010;background:#1a1008;}
.heat-badge.hot{color:var(--red);border-color:var(--red2);background:#150808;}
.heat-badge.burned{color:#fff;border-color:var(--red);background:var(--red2);animation:pulse-heat 1s infinite;}
.heat-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.12em;}
.heat-num{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;}
@keyframes pulse-heat{0%,100%{opacity:1;}50%{opacity:.6;}}

.topacts{display:flex;gap:4px;flex-wrap:wrap;}
.loc-badge{font-family:'Space Mono',monospace;font-size:7px;color:var(--teal);padding:2px 7px;border:1px solid var(--teal2);background:var(--teal2);}

/* TABS */
.game-tabs{display:flex;background:var(--s2);border-bottom:1px solid var(--b1);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.gtab{flex-shrink:0;padding:8px 10px;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.08em;color:var(--t3);background:transparent;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;}
.gtab.on{color:var(--gold);border-bottom-color:var(--gold);}
.gtab:hover{color:var(--t1);}
.tab-pane{display:none;}.tab-pane.on{display:block;}

/* STATUS PANEL */
.game-layout{display:flex;height:100%;width:100%;min-height:0;}
.status-col{width:182px;min-width:182px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;max-height:calc(100vh - 140px);}
@media(max-width:660px){.status-col{display:none;}}
.ps{padding:9px;border-bottom:1px solid var(--b1);}
.pl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.28em;color:var(--t3);text-transform:uppercase;margin-bottom:6px;}
.pav{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold3);display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(135deg,#1a1208,#261a0c);}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.cap-box{background:var(--s2);border:1px solid var(--b1);padding:4px 6px;}
.cap-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-bottom:1px;}
.cap-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);font-weight:700;}
.cap-val.dirty{color:var(--red);}
.cap-val.green{color:var(--green);}
.mr{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.mn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);width:50px;flex-shrink:0;}
.mt{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;transition:width .8s;}
.mgr{background:var(--green);}.mb{background:var(--blue);}.mo{background:var(--orange);}.mrd{background:var(--red);}.mg{background:var(--gold);}.mt2{background:var(--teal);}.mpu{background:var(--purple);}
.mv{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);width:18px;text-align:right;flex-shrink:0;}
.ci{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--s3);cursor:pointer;}
.ci:hover{padding-left:3px;}
.ci:last-child{border-bottom:none;}
.ca{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.cn{font-size:10px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.dg{background:var(--green);}.dy{background:var(--gold);}.dr{background:var(--red);}

/* SKILL BARS */
.skill-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.sk-name{font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);width:48px;flex-shrink:0;}
.sk-pips{display:flex;gap:2px;}
.sk-pip{width:8px;height:8px;border-radius:1px;border:1px solid var(--b2);}
.sk-pip.filled{background:var(--gold3);border-color:var(--gold);}
.sk-lvl{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold3);width:14px;text-align:right;}

/* NARRATIVE */
.narr-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.narrative{flex:1;overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch;max-height:calc(100vh - 250px);}
@media(max-width:480px){.narrative{padding:10px;max-height:calc(100vh - 240px);}}
.scene{margin-bottom:18px;}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--b1);}
.sloc{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.18em;color:var(--gold3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;}
.sdiv{flex:1;height:1px;background:var(--b1);}
.ssess{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);white-space:nowrap;}
.sbody{font-size:14px;color:var(--t1);line-height:1.85;}
.sbody p{margin-bottom:8px;}
.chblk{display:flex;margin:10px 0;background:var(--s1);border:1px solid var(--b1);overflow:hidden;position:relative;}
.chblk::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--gold3);}
.ch-left{display:flex;flex-direction:column;align-items:center;padding:10px 8px;background:var(--s2);border-right:1px solid var(--b1);min-width:58px;flex-shrink:0;}
.chavat{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid var(--b2);margin-bottom:4px;}
.chpn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);text-align:center;line-height:1.3;}
.ch-right{flex:1;padding:10px 12px;min-width:0;}
.chhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:4px;flex-wrap:wrap;}
.chname{font-size:13px;color:var(--t0);}
.chstat{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold3);padding:1px 4px;border:1px solid var(--gold4);}
.chspeech{font-style:italic;font-size:13px;color:var(--t0);line-height:1.75;padding-left:10px;border-left:2px solid var(--gold3);margin-bottom:4px;}
.chsub{font-size:11px;color:var(--t3);font-style:italic;line-height:1.5;margin-bottom:4px;}
.hear-btn{display:inline-flex;align-items:center;gap:4px;background:var(--s3);border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:7px;padding:3px 7px;cursor:pointer;}
.hear-btn:hover{border-color:var(--gold3);color:var(--gold);}
.pact{display:flex;gap:8px;padding:6px 10px;background:var(--s3);border:1px solid var(--b1);border-left:3px solid var(--gold);margin:6px 0;}
.palbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold);flex-shrink:0;margin-top:1px;}
.patxt{font-style:italic;color:var(--t1);font-size:12px;line-height:1.6;flex:1;}
.sflag{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--green2);background:var(--s3);padding:2px 7px;margin:2px;cursor:pointer;font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}
.ibox{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--blue2);padding:6px 10px;margin:6px 0;cursor:pointer;}
.ilbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--blue);margin-bottom:2px;}
.itxt{font-size:11px;color:var(--t3);line-height:1.6;}
.hfig{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--purple);padding:6px 10px;margin:6px 0;cursor:pointer;}
.hfig-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--purple);margin-bottom:2px;}
.hfig-txt{font-size:11px;color:var(--t3);line-height:1.6;}
.mctag{display:inline-flex;font-family:'Space Mono',monospace;font-size:7px;padding:2px 4px;border-radius:2px;margin:2px;}
.mcp{color:var(--green);background:var(--green2);border:1px solid #1a3a1a;}
.mcn{color:var(--red);background:#150808;border:1px solid #3a1515;}
.edu-tag{display:inline-flex;align-items:center;gap:4px;background:var(--blue2);border:1px solid var(--blue);padding:2px 6px;margin:2px;font-family:'Space Mono',monospace;font-size:7px;color:var(--blue);cursor:pointer;}
.heat-alert{background:#150808;border:1px solid var(--red2);border-left:3px solid var(--red);padding:8px 12px;margin:8px 0;}
.heat-alert-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--red);letter-spacing:.2em;margin-bottom:3px;}
.heat-alert-txt{font-size:12px;color:var(--t3);line-height:1.6;}

/* INPUT */
.input-area{border-top:1px solid var(--b1);background:var(--s1);padding:8px 12px;flex-shrink:0;}
.choice-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.cbtn{background:var(--s2);border:1px solid var(--b2);padding:7px 10px;cursor:pointer;text-align:left;transition:all .2s;font-family:'Cormorant Garamond',serif;display:flex;align-items:flex-start;gap:6px;flex:1;min-width:130px;min-height:44px;}
.cbtn:hover{border-color:var(--gold3);background:var(--gold4);}
.cnum{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold3);flex-shrink:0;margin-top:2px;}
.ctxt{font-size:12px;color:var(--t2);line-height:1.5;flex:1;}
.ctag{font-family:'Space Mono',monospace;font-size:6px;padding:2px 4px;border:1px solid;flex-shrink:0;margin-top:2px;}
.tc{color:var(--green);border-color:var(--green2);}.tg{color:var(--gold);border-color:var(--gold3);}.td{color:var(--red);border-color:var(--red2);}
.free-row{display:flex;gap:5px;}
.finput{flex:1;background:var(--s3);border:1px solid var(--b2);color:var(--t1);font-family:'Cormorant Garamond',serif;font-size:14px;padding:8px 10px;outline:none;min-height:44px;border-radius:0;-webkit-appearance:none;}
.finput:focus{border-color:var(--gold3);}
.finput::placeholder{color:var(--t3);font-style:italic;}
.movebtn{background:var(--gold);border:none;color:#000;font-family:'Space Mono',monospace;font-size:8px;padding:8px 13px;cursor:pointer;text-transform:uppercase;min-height:44px;}
.movebtn:hover{background:var(--gold2);}
.movebtn:disabled{opacity:.4;cursor:not-allowed;}
.errmsg{color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-top:5px;display:none;line-height:1.5;word-break:break-all;}

/* AUDIO */
.audio-bar{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--s2);border-bottom:1px solid var(--b1);flex-wrap:wrap;}
.audio-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);}
.atog{background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:7px;padding:3px 7px;cursor:pointer;}
.atog.on{border-color:var(--green);color:var(--green);}
.atog:hover{border-color:var(--gold3);color:var(--gold);}
.speaking{display:none;align-items:center;gap:3px;font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}
.speaking.on{display:flex;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--green);}

/* TABS CONTENT - shared */
.wrap{padding:13px;}
.sec-title{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.22em;color:var(--gold3);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--b1);}
.sec-title.teal{color:var(--teal);}
.sec-title.purple{color:var(--purple);}
.sec-title.orange{color:var(--orange);}
.sec-title.green{color:var(--green);}
.sec-title.red{color:var(--red);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:8px;margin-bottom:12px;}
.card{background:var(--s1);border:1px solid var(--b1);padding:11px;cursor:pointer;transition:border-color .2s;}
.card:hover{border-color:var(--gold3);}
.card.owned{border-left:3px solid var(--green);}
.card.player-biz{border-left:3px solid var(--gold);}
.card.brotherhood{border:1px solid var(--purple);background:#0a0514;}
.card-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;gap:5px;}
.card-name{font-size:12px;color:var(--t0);}
.card-sub{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:1px;}
.badge{font-family:'Space Mono',monospace;font-size:7px;padding:2px 5px;border:1px solid;white-space:nowrap;flex-shrink:0;}
.b-g{color:var(--green);border-color:var(--green2);}
.b-y{color:var(--gold);border-color:var(--gold3);}
.b-r{color:var(--red);border-color:var(--red2);}
.b-t{color:var(--t3);border-color:var(--b2);}
.b-teal{color:var(--teal);border-color:var(--teal2);}
.b-pu{color:var(--purple);border-color:#3a1a5a;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:5px;}
.stats.s2{grid-template-columns:repeat(2,1fr);}
.stats.s4{grid-template-columns:repeat(4,1fr);}
.stat{background:var(--s2);padding:4px 5px;}
.stat-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);}
.stat-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}

.ticker-inner{font-family:Space Mono,monospace;font-size:8px;color:var(--t3);padding:0 20px;white-space:nowrap;animation:ticker 40s linear infinite;}
@keyframes ticker{0%{transform:translateX(100vw);}100%{transform:translateX(-200%)}}
.tab-content{flex:1;overflow-y:auto;min-height:0;position:relative;}
.game-layout{display:flex;height:100%;width:100%;min-height:0;}
.status-col{width:155px;min-width:155px;max-width:155px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;padding:8px;}
.narr-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.narrative{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column-reverse;}
.narrative-inner{display:flex;flex-direction:column;gap:16px;}
.input-area{flex-shrink:0;padding:8px 12px;border-top:1px solid var(--b1);background:var(--s1);}
.wrap{padding:12px 16px;width:100%;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;}
/* Cinematic narrative */
.scene-block{border-left:2px solid var(--b2);padding:0 0 0 14px;margin-bottom:4px;}
.scene-hdr{font-family:Space Mono,monospace;font-size:7px;color:var(--gold3);letter-spacing:.15em;margin-bottom:8px;display:flex;justify-content:space-between;}
.scene-action{font-family:Space Mono,monospace;font-size:9px;color:var(--t3);padding:5px 8px;border-left:2px solid var(--gold3);margin-bottom:10px;background:var(--s2);}
.char-line{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.char-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--b2);}
.char-bubble{flex:1;background:var(--s2);border:1px solid var(--b1);padding:8px 11px;font-size:13px;line-height:1.75;color:var(--t1);}
.char-name{font-family:Space Mono,monospace;font-size:7px;color:var(--gold3);margin-bottom:4px;}
.narrator-line{background:transparent;padding:8px 0;font-size:13px;line-height:1.85;color:var(--t2);font-style:italic;}
/* Brotherhood stages */
.bhood-stage{background:var(--s2);border:1px solid var(--b1);border-left:3px solid;padding:12px;margin-bottom:8px;}
.stage-locked{opacity:.4;border-left-color:var(--b2);}
.stage-active{border-left-color:var(--teal);}
.stage-future{border-left-color:var(--b2);}
/* Market chart */
.market-sector{background:var(--s2);border:1px solid var(--b1);padding:10px;margin-bottom:6px;}
.market-sector summary{cursor:pointer;font-family:Space Mono,monospace;font-size:9px;color:var(--t1);letter-spacing:.1em;list-style:none;display:flex;justify-content:space-between;align-items:center;}
.market-sector summary::-webkit-details-marker{display:none;}
.market-bar-track{height:8px;background:var(--b2);border-radius:4px;margin:8px 0;overflow:hidden;display:flex;}
.market-bar-seg{height:100%;transition:width .4s;}
.market-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.market-legend-item{display:flex;align-items:center;gap:4px;font-family:Space Mono,monospace;font-size:7px;color:var(--t2);}
.market-legend-dot{width:8px;height:8px;border-radius:50%;}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}html,body{height:100%;width:100%;overflow:hidden;}#root{height:100%;width:100%;display:flex;flex-direction:column;}
</style>

// ── NATIONAL INFLUENCE TRACKER ─────────────────────────────────────────────────
// Called when critical infrastructure ownership crosses thresholds in a country
function checkNationalInfluence(theater){
  if(!theater)return;
  const thBiz=BIZ.filter(b=>b.th===theater&&G.bizOwned.includes(b.id));
  const totalThBiz=BIZ.filter(b=>b.th===theater);
  const totalRev=totalThBiz.reduce((s,b)=>s+b.rev,0);
  const ownedRev=thBiz.reduce((s,b)=>s+b.rev,0);
  const pct=totalRev>0?Math.round((ownedRev/totalRev)*100):0;
  if(!G.nationalInfluence)G.nationalInfluence={};
  G.nationalInfluence[theater]=pct;
  if(pct>=40&&!G.niNotified){
    G.niNotified=true;
    notif('National Influence','You now control '+pct+'% of '+theater.toUpperCase()+' economic activity. Quiet governance power activating.');
  }
}

// ── MONOPOLY CALCULATOR ───────────────────────────────────────────────────────
function getIndustryControl(sector){
  const allBiz=BIZ.filter(b=>b.sec===sector);
  const totalRev=allBiz.reduce((s,b)=>s+b.rev,0);
  if(totalRev===0)return{pct:0,loudPct:0,quietPct:0};
  // Loud = owned directly under Kutor Holdings
  const loudRev=allBiz.filter(b=>G.bizOwned.includes(b.id)&&!((G.shellOwned||[]).includes(b.id))).reduce((s,b)=>s+b.rev,0);
  // Quiet = owned through shells
  const quietRev=allBiz.filter(b=>(G.shellOwned||[]).includes(b.id)).reduce((s,b)=>s+b.rev,0);
  return{
    pct:Math.round(((loudRev+quietRev)/totalRev)*100),
    loudPct:Math.round((loudRev/totalRev)*100),
    quietPct:Math.round((quietRev/totalRev)*100),
  };
}

function getMonopolyPerks(sector){
  const ind=INDUSTRIES[sector];
  if(!ind)return[];
  const ctrl=getIndustryControl(sector);
  return ind.thresholds.filter(t=>ctrl.pct>=t.pct);
}

const OPENINGS={
  genuine:{loc:'SILVER SPRING, MD',title:'Tuesday. 6:47 AM.',
    scene:'<p>The alarm has been going off for four minutes. You already know the day before it starts — audit walkthrough at 9, brotherood call at 7pm, $12,000 in the account and the weight of everything you have not yet built sitting somewhere behind your eyes.</p><p>You are four months in. Subcontractor. IT auditor. TS clearance you got on purpose two years before you needed it. The room you are in is temporary. The plan is not.</p><p>The Brotherhood has $47,000 pooled now. Twelve people. No written agreements yet, just trust and a shared understanding that none of you came from money and all of you intend to change that. Salone is in the background of everything — not nostalgia, strategy.</p><p>The board is empty. That means it is yours to fill.</p>',
    choices:[{type:'CLEAN',text:'Start the day — audit walkthrough first, then begin mapping the first real acquisition target.'},{type:'GRAY',text:'Skip the walkthrough prep. Use the morning to research who owns what in the Freetown port ecosystem.'},{type:'CLEAN',text:'Call Raymond. The Brotherhood needs its first formal meeting. Set the structure before the capital moves.'}]},
  inheritance:{loc:"ATTORNEY'S OFFICE — BETHESDA, MD",title:'The Reading of the Will.',
    scene:'<p>The attorney slides a folder across the table. He has been doing this for thirty years and his face gives nothing. The number inside is $340,000 liquid, plus a partial stake in a logistics company in Salone you have only heard of, plus two debts attached to properties your father held — amounts he never told you about.</p><p>Your cousin watches from the other side of the table. He expected more. You did not expect this. Neither of you says anything for a moment.</p><p>The inheritance is real but it is also a test. Capital means nothing without judgment. The stake in the logistics company is either a foothold or a liability — you will not know which until you are on the ground. The debts need to be resolved before anything else moves.</p><p>You have a table. The question is what you build on it.</p>',
    choices:[{type:'CLEAN',text:'Clear the debts first. Start clean. Then evaluate the Salone logistics stake with fresh eyes.'},{type:'GRAY',text:'Use the capital to immediately acquire a second business — let the Salone stake compound while you build the DMV layer.'},{type:'CLEAN',text:'Fly to Salone within the month. Inspect the logistics asset personally before making any decision.'}]},
  employee:{loc:'TYSONS CORNER, VA',title:'Thursday. The Walkthrough.',
    scene:'<p>You are four months into the engagement and you have already mapped three things your clients do not know they have told you. The control gap in their vendor management process. The name of the contractor who handles their data center lease. The fact that the senior partner on this account is thinking about leaving.</p><p>You are not stealing anything. You are just paying attention in a way most people in this building do not. The clearance gets you into rooms. The job gets you into conversations. The question is what you do with both.</p><p>The salary is $68,000. The Brotherhood is growing. You are watching people in this building manage hundreds of millions in federal contracts and you are beginning to understand the architecture — not the outcome, the architecture. How the relationships are structured. Where the leverage lives.</p><p>You are inside the house. That has value. The question is how long you stay and what you carry out.</p>',
    choices:[{type:'CLEAN',text:'Document everything you are observing systematically. Build a private intelligence file on how these systems actually work.'},{type:'GRAY',text:'Identify one senior person in this building worth cultivating — someone whose network you want access to.'},{type:'CLEAN',text:'Begin the CISA study track tonight. Credentials open the next door.'}]},
  return:{loc:'DULLES INTERNATIONAL — ARRIVALS',title:'Back On American Ground.',
    scene:'<p>Three weeks in Freetown. You went to visit family and you came back with a notebook full of observations you did not expect to make.</p><p>Aminata met you on day four — she runs a small logistics operation out of the eastern port district and she talks about the gaps in the infrastructure the way you think about systems. What is missing. What could move through here if the conditions were right. You have her number. She has yours. Neither of you made a formal proposal.</p><p>What you saw: the port is inefficient in ways that are expensive for everyone. The electricity situation is worse than the news reports. There are three or four families that control more of the commercial real estate than anyone publicly acknowledges. And the diaspora money coming in is being managed by people who do not fully understand what they have.</p><p>You are back in the DMV now. The gap between what you saw and what exists is either a problem or an opportunity. You have $18,000 and a very clear picture of the terrain.</p>',
    choices:[{type:'CLEAN',text:'Call Aminata. Start with information exchange — what does she need, what can you offer from this side.'},{type:'CLEAN',text:'Write up the full map of what you observed. Turn three weeks of observation into a structured investment thesis.'},{type:'GRAY',text:'Research who holds the port concessions and what the ownership structure actually looks like below the surface.'}]},
  operators_son:{loc:'PRIVATE DINING — WASHINGTON D.C.',title:'The Introduction.',
    scene:'<p>Your father has been making this dinner happen for six months. He does not say that. He just tells you the time and the dress code and that you should listen more than you talk.</p><p>There are four people at the table. You know two of them by name from conversations in the house growing up. The other two are newer — one runs a regional bank, one has a title you cannot quite place but everyone at the table treats him carefully. Your father tells a story about a deal in 1998. Everyone laughs. You watch who laughs loudest.</p><p>This is the inheritance that does not show up in any document. The rooms. The introductions. The access that was earned before you were old enough to understand what it cost.</p><p>You have $85,000, a name that opens certain doors, and the complicated awareness that visibility arrived before you earned it. The question is whether you use what you have been given to build something real or something that looks real.</p>',
    choices:[{type:'CLEAN',text:'Follow up with the banker at the table. There is a real conversation there and you want to have it properly.'},{type:'GRAY',text:'Ask your father directly — what does he actually want you to do with this? Get the real answer.'},{type:'CLEAN',text:'Use this moment as a baseline and nothing more. Build your own record before leveraging any of this further.'}]},
  from_bottom:{loc:'SOUTHEAST D.C.',title:'The Space Between.',
    scene:'<p>Three years since the thing you do not name out loud. You have $34,000 legitimate — job, discipline, Brotherhood contributions — and $22,000 that came from a period you are finished with but have not fully closed the door on. One person knows the details. You trust him because you have to.</p><p>The transition was real but incomplete. The record exists. Not public, not accessible in any way that has surfaced yet, but it exists, and you carry that the way you carry everything — quietly, without letting it show in your face or your decisions.</p><p>What you have that most people at your starting point do not: you understand how money actually moves in informal systems. You understand leverage in its most basic form. You understand that most institutions are operated by people making decisions under incomplete information, and that this creates gaps a patient person can move through.</p><p>The Brotherhood is the clean structure. The question is whether you can build fast enough in legitimate channels before the past becomes a liability rather than a teacher.</p>',
    choices:[{type:'CLEAN',text:'Focus entirely on the Brotherhood and the legitimate stack. Speed and discipline. The past stays past.'},{type:'GRAY',text:'Use the $22K carefully — one strategic move that converts it into something cleaner without drawing attention.'},{type:'DARK',text:'Reach back out to one contact from before. Not to go back — to get a piece of information you need.'}]},
  fixer:{loc:'CONFERENCE ROOM B — FEDERAL BUILDING',title:'Fourteen Minutes.',
    scene:'<p>You were brought in to solve a problem that three other people could not. You had fourteen minutes with the contracting officer and you walked out with a handshake that is worth $180,000 if you execute. No firm. No overhead. Just your name, your clearance, and the ability to make complicated things simple in rooms where most people become complicated.</p><p>You have been doing this for two years — moving between agencies, between contractors, between the spaces where things need to get done and no one wants their name on the process. You are not dirty. You are not clean. You are useful, which in this city is its own kind of currency.</p><p>The Brotherhood thinks you are a consultant. You are. The question is whether you build something real with what this access creates or keep selling the access itself until it runs out.</p>',
    choices:[{type:'GRAY',text:'Execute the contract cleanly and use the $180K as the foundation for the first real acquisition.'},{type:'CLEAN',text:'Start building a legitimate firm around the work you have been doing solo. Structure it properly this time.'},{type:'GRAY',text:'Identify who else in that building needs what you provide. Map the full opportunity before taking the next step.'}]},
  diaspora:{loc:'FREETOWN INTERNATIONAL AIRPORT — ARRIVALS HALL',title:'First Time Back in Eleven Years.',
    scene:'<p>You were eight when you left. Your mother held your hand through the terminal and you did not fully understand that you were not coming back, not for a long time, not until you were different.</p><p>You are different now. You have $95,000 saved from seven years of working in the US, a business administration degree, and a clarity about Salone that comes from having grown up watching it from the outside. You know what it looks like to someone who has resources and distance. You also know what it feels like to belong to a place without being fully of it anymore.</p><p>Your uncle met you at arrivals. He has a car now. He seems proud of you in a way that carries weight. On the drive into the city you count four unfinished buildings, two fuel queues, and one new Chinese-built road that was not there in any photograph you have seen.</p><p>You came back with capital, a foreign perspective, and no existing network inside the country. Everything you build here, you build from scratch. That is either the hardest version of this or the cleanest one.</p>',
    choices:[{type:'CLEAN',text:'Spend the first two weeks observing only. No commitments. Map the real landscape before anything else.'},{type:'CLEAN',text:'Contact Aminata through the diaspora network. She was recommended by three separate people who do not know each other.'},{type:'GRAY',text:'Identify which sector has the worst infrastructure gap and the most government appetite for outside capital. Start there.'}]},

function totalStockRev(){return Object.entries(G.stockPositions||{}).reduce((s,[id,pos])=>{const st=STOCKS.find(x=>x.id===id);if(!st||!pos||!pos.shares)return s;return s+Math.round(pos.shares*st.price*0.04);},0);}

const A={
  on:false,elKey:'',speaking:false,sy:window.speechSynthesis,autoStart:false,
  async speak(text,cn){
    if(!this.on)return;this.stop();this.speaking=true;this.upd();
    if(this.elKey){try{await this.el(text);return;}catch(e){}}
    if(!this.sy){this.speaking=false;this.upd();return;}
    const u=new SpeechSynthesisUtterance(text);
    const vs=this.sy.getVoices();
    u.voice=vs.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||(v.lang.includes('en-GB')&&v.name.toLowerCase().includes('female')))||vs.find(v=>v.lang.includes('en-GB'))||vs.find(v=>v.lang.includes('en'))||vs[0];
    u.rate=G.rate||1.0;u.pitch=cn==='The Patriarch'?0.75:cn==='D'?0.85:1.0;u.volume=0.9;
    u.onend=()=>{this.speaking=false;this.upd();};u.onerror=()=>{this.speaking=false;this.upd();};
    this.sy.speak(u);
  },
  async el(text){
    const r=await fetch('https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL',{method:'POST',headers:{'xi-api-key':this.elKey,'Content-Type':'application/json'},body:JSON.stringify({text,model_id:'eleven_monolingual_v1',voice_settings:{stability:.5,similarity_boost:.8}})});
    if(!r.ok)throw new Error('EL failed');
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const audio=new Audio(url);audio.onended=()=>{this.speaking=false;this.upd();URL.revokeObjectURL(url);};audio.onerror=()=>{this.speaking=false;this.upd();};await audio.play();
  },
  stop(){this.sy&&this.sy.cancel();this.speaking=false;this.upd();},
  tog(){this.on=!this.on;if(!this.on)this.stop();render();},
  upd(){document.querySelectorAll('.speaking').forEach(el=>el.classList.toggle('on',this.speaking));}
};

function rGame(){

    else if(G.tab==='map')tabContent=rMap();
    else if(G.tab==='finance')tabContent=rFinance();
    else if(G.tab==='market')tabContent=rMarket();
    else if(G.tab==='acquire')tabContent=rAcquire();
    else if(G.tab==='influence')tabContent=rInfluence();
    else if(G.tab==='community')tabContent=rCommunity();
    else if(G.tab==='brotherhood')tabContent=rBrotherhood();
    else if(G.tab==='team')tabContent=rTeam();
    else if(G.tab==='legacy')tabContent=rLegacy();
    else if(G.tab==='intel')tabContent=rIntel();
    else if(G.tab==='grayzone')tabContent=rGrayZone();

  G.bankStakes[bk.id]=type;
  G.txns.push({desc:`Bank ${type}: ${bk.n}`,amt:-cost,sess:G.session});
  G.M.priv=Math.min(100,G.M.priv+8);

function buyStock(id,n){
  const st=(typeof STOCKS!=='undefined'?STOCKS:[]).concat(typeof STOCKS_EXTRA!=='undefined'?STOCKS_EXTRA:[]).find(x=>x.id===id)||STOCKS.find(x=>x.id===id);
  if(!st){notif('Error','Stock not found');return;}
  const cost=n*st.price;
  if((G.clean||0)<cost){notif('Insufficient','Need $'+(cost/1000).toFixed(1)+'K clean capital.');return;}
  G.clean-=cost;
  G.stockPositions=G.stockPositions||{};
  const prev=G.stockPositions[id]||{shares:0,avgCost:st.price};
  const newShares=prev.shares+n;
  const newAvg=(prev.shares*prev.avgCost+n*st.price)/newShares;
  G.stockPositions[id]={shares:newShares,avgCost:newAvg};
  
  // Ownership milestones
  const allShares=10000; // approximate float
  const pct=Math.round((newShares/allShares)*100);
  if(pct>=5&&(prev.shares/allShares*100)<5)
    notif('📈 '+st.ticker+' — Notable Position','You now hold ~5% of '+st.n+'. A significant stake.');
  else if(pct>=10&&(prev.shares/allShares*100)<10)
    notif('📈 '+st.ticker+' — Minority Stake','~10% holding in '+st.n+'. Minority shareholder rights activated.');
  else if(pct>=25&&(prev.shares/allShares*100)<25)
    notif('📈 '+st.ticker+' — Blocking Minority','~25% in '+st.n+'. You can block major resolutions.');
  else if(pct>=51&&(prev.shares/allShares*100)<51)
    notif('👑 '+st.ticker+' — MAJORITY OWNER','You now control '+st.n+'. Board influence. Strategic direction yours.');
  else if(pct>=75&&(prev.shares/allShares*100)<75)
    notif('♟ '+st.ticker+' — DOMINANT OWNER','75%+ of '+st.n+'. Full operational control. Consider a squeeze-out.');
  else
    notif('Bought '+n+' shares',''+st.n+' — $'+cost.toLocaleString()+' · Now holding '+newShares+' shares');
  
  save();render();
}

      ${z.rev>0?`<div style="font-family:Space Mono,monospace;font-size:7px;color:var(--green);margin-top:2px;">$${(z.rev/1000000).toFixed(1)}M/mo</div>`:''}

  // Businesses in this theater
  const thBiz=BIZ.filter(b=>b.th===curTh);
  const ownedHere=thBiz.filter(b=>(G.bizOwned||[]).includes(b.id));
  const bizSummary=thBiz.length?`<div style="font-family:Space Mono,monospace;font-size:8px;color:var(--t3);margin-top:14px;margin-bottom:8px;">${ownedHere.length}/${thBiz.length} BUSINESSES ACQUIRED HERE</div>`:'';

  const lockedHtml=lockedTheaters.length?`
  G.tab='narrative';move('[CLEAN] Expand this business: grow capacity and increase monthly revenue.');
    <div class="grid">${lockedTheaters.map(([id,th])=>`<div class="card"><div style="font-size:16px;margin-bottom:4px;">${th.f}</div><div style="font-size:13px;color:var(--t0);">${th.n}</div><div style="font-size:11px;color:var(--t3);margin:4px 0;">${th.sub}</div><div style="font-family:Space Mono,monospace;font-size:7px;color:var(--gold3);">UNLOCK: $${((th.cost||200000)/1000).toFixed(0)}K</div><button class="btn-o" style="font-size:7px;margin-top:8px;" onclick="doUnlock('${id}')">UNLOCK</button></div>`).join('')}</div>
  `:'';

  return`<div style="padding:12px 16px;width:100%;">
    <div style="font-family:Space Mono,monospace;font-size:7px;letter-spacing:.2em;color:var(--t3);margin-bottom:10px;">WORLD MAP — ${activeTheaters.length} THEATERS ACTIVE</div>
    <div style="margin-bottom:12px;display:flex;flex-wrap:wrap;">${thTabs}</div>
    <div style="margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:20px;">${th.f}</span>
        <div>
          <div style="font-size:16px;color:var(--t0);">${th.n}</div>
          <div style="font-size:11px;color:var(--t3);">${th.sub}</div>

    ${lockedHtml}

}
function buildSVG(th,tid){
  const rects=th.zones.map(z=>{const ctrl=G.zones[z.id]||z.ctrl;
    return `<g onclick="openZone('${z.id}','${tid}')" style="cursor:pointer;">
      <rect x="${z.x}" y="${z.y}" width="${z.w}" height="${z.h}" fill="${FILLS[ctrl]||'#141414'}" stroke="${FC[ctrl]||'#2a2a2a'}" stroke-width="1.2" rx="3"/>
      <text x="${z.x+z.w/2}" y="${z.y+z.h/2-3}" fill="${FC[ctrl]||'#888'}" font-size="7.5" text-anchor="middle" dominant-baseline="middle" font-weight="bold" font-family="monospace">${z.lbl}</text>
      ${z.rev>0?`<text x="${z.x+z.w/2}" y="${z.y+z.h/2+8}" fill="${FC[ctrl]||'#888'}" font-size="5.5" text-anchor="middle" font-family="monospace" opacity=".8">$${(z.rev/1000000).toFixed(1)}M</text>`:''}
    </g>`;}).join('');
  return `<svg viewBox="0 0 400 175" style="position:absolute;top:0;left:0;width:100%;height:100%;background:var(--s2);">${rects}</svg>`;
}
function openZone(zid,tid){
  const th=TH[tid];if(!th)return;const z=th.zones.find(v=>v.id===zid);if(!z)return;
  const ctrl=G.zones[zid]||z.ctrl;const fac=F[ctrl]||{n:'Unknown',color:'#666'};const isP=ctrl==='player';
  G.modal={pre:tid.toUpperCase()+' — ZONE',title:z.n,body:`
    <p><strong>Controller:</strong> <span style="color:${FC[ctrl]||'#aaa'};">${fac.n||ctrl}</span></p>
    <p><strong>Monthly Revenue:</strong> $${z.rev.toLocaleString()}</p>
    ${fac.str&&G.factionIntel[ctrl]?.knownStr?`<p style="margin-top:6px;color:var(--green);">Strength: ${fac.str}</p>`:''}
    ${fac.wk&&G.factionIntel[ctrl]?.knownWk?`<p style="color:var(--red);">Weakness: ${fac.wk}</p>`:''}
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;">
      ${isP?`<p style="color:var(--green);">✓ Kutor controls this zone.</p>`:`
        <button class="btn-g" style="font-size:8px;padding:8px 13px;" onclick="G.modal=null;G.tab='narrative';move('[CLEAN] I want to establish legitimate presence in ${z.n.replace(/'/g,"\\'")}.')">ESTABLISH PRESENCE</button>
        <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;G.tab='narrative';move('[GRAY] Use my relationships to quietly gain access in ${z.n.replace(/'/g,"\\'")} without direct confrontation.')">QUIET ACCESS</button>
        <button class="btn-o" style="font-size:8px;color:var(--red);border-color:var(--red2);" onclick="G.modal=null;G.tab='narrative';move('[DARK] Disrupt ${(fac.n||'').replace(/'/g,"\\'")} operations in ${z.n.replace(/'/g,"\\'")}.')">DISRUPT</button>`}
    </div>`};render();
}
function doUnlock(tid){
  const th=TH[tid];if(!th)return;
  if(G.clean<th.cost){notif('Insufficient','Need $'+(th.cost/1000).toFixed(0)+'K clean capital.');return;}
  G.clean-=th.cost;G.thUnlocked.push(tid);
  G.txns.push({desc:'Theater: '+th.n,amt:-th.cost,sess:G.session});
  G.modal=null;notif('Expanded',th.f+' '+th.n+' unlocked');save();render();
  setTimeout(()=>{G.tab='narrative';move('[CLEAN] I just expanded into '+th.n+'. Who controls what here and what should my first move be?');},500);
}

// ─── MARKET ───

function rMarket(){
  // ── Faction Rankings ───────────────────────────────────────────────────────
  const allFactions=Object.entries(F).filter(([k])=>k!=='player'&&k!=='brotherhood').map(([id,f])=>{
    const rev=BIZ.filter(b=>b.own===id&&!G.bizOwned.includes(b.id)&&!(G.shellOwned||[]).includes(b.id)).reduce((s,b)=>s+b.rev,0);
    const biz=BIZ.filter(b=>b.own===id&&!G.bizOwned.includes(b.id)).length;
    return{id,n:f.n,short:f.short||id,color:f.color||'#666',tier:f.tier,rev,biz};
  });
  const playerLoudRev=BIZ.filter(b=>G.bizOwned.includes(b.id)&&!(G.shellOwned||[]).includes(b.id)).reduce((s,b)=>s+b.rev,0);
  const playerQuietRev=BIZ.filter(b=>(G.shellOwned||[]).includes(b.id)).reduce((s,b)=>s+b.rev,0);
  allFactions.push({id:'player',n:G.coName||'Kutor Holdings',short:'KUTOR',color:'#c8922a',tier:'M',rev:playerLoudRev+playerQuietRev,biz:G.bizOwned.length});
  allFactions.sort((a,b)=>b.rev-a.rev);
  const maxRev=allFactions[0]?allFactions[0].rev:1;

  const factionRows=allFactions.map((f,i)=>{
    const pct=maxRev>0?Math.round((f.rev/maxRev)*100):0;
    const isPlayer=f.id==='player';
    const tierLabel=f.tier==='M'?'MAJOR':f.tier==='I'?'MID':'SMALL';
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:${isPlayer?'var(--gold4)':'var(--s2)'};border:1px solid ${isPlayer?'var(--gold3)':'var(--b1)'};border-left:3px solid ${f.color};margin-bottom:3px;">
      <div style="font-family:Space Mono,monospace;font-size:10px;color:var(--t3);width:22px;">#${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <span style="font-size:12px;color:${isPlayer?'var(--gold)':'var(--t0)'};">${f.n}</span>
          <span style="font-family:Space Mono,monospace;font-size:6px;padding:1px 4px;background:var(--s3);color:var(--t3);">${tierLabel}</span>
          ${isPlayer?'<span style="font-family:Space Mono,monospace;font-size:6px;padding:1px 4px;background:var(--gold4);color:var(--gold);">YOU</span>':''}
        </div>
        <div style="height:5px;background:var(--s3);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${f.color};border-radius:3px;transition:width 1.2s ease-out;"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-family:Space Mono,monospace;font-size:9px;color:${isPlayer?'var(--gold)':'var(--green)'};">$${(f.rev/1000000).toFixed(1)}M</div>
        <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">${f.biz} cos</div>
      </div>
    </div>`;
  }).join('');

  // ── Monopoly Tracker ────────────────────────────────────────────────────────
  const monopolyRows=(typeof INDUSTRIES!=="undefined"?Object.entries(INDUSTRIES):[]).map(([sec,ind])=>{
    const ctrl=typeof getIndustryControl==="function"?getIndustryControl(sec):{pct:0,loudPct:0,quietPct:0};
    const activeThresh=ind.thresholds.filter(t=>ctrl.pct>=t.pct);
    const nextThresh=ind.thresholds.find(t=>ctrl.pct<t.pct);
    const topPerk=activeThresh.length?activeThresh[activeThresh.length-1]:null;
    const statusColor=ctrl.pct>=75?'var(--gold)':ctrl.pct>=51?'var(--teal)':ctrl.pct>=25?'var(--blue)':'var(--t3)';
    const statusLabel=ctrl.pct>=75?'MONOPOLIZED':ctrl.pct>=51?'DOMINANT':ctrl.pct>=25?'INFLUENTIAL':'PARTICIPANT';
    return`<div style="background:var(--s2);border:1px solid var(--b1);padding:10px 12px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;">${ind.icon}</span>
          <div>
            <div style="font-size:12px;color:var(--t0);">${ind.name}</div>
            <div style="font-family:Space Mono,monospace;font-size:7px;color:${statusColor};">${statusLabel}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:Space Mono,monospace;font-size:11px;color:${statusColor};">${ctrl.pct}%</div>
          <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">
            ${ctrl.loudPct>0?`<span style="color:var(--t1);">🔊${ctrl.loudPct}%</span> `:''}
            ${ctrl.quietPct>0?`<span style="color:var(--teal);">🔇${ctrl.quietPct}%</span>`:''}
          </div>
        </div>
      </div>
      <div style="position:relative;height:6px;background:var(--s3);border-radius:3px;margin-bottom:6px;">
        ${ctrl.loudPct>0?`<div style="position:absolute;left:0;height:100%;width:${ctrl.loudPct}%;background:var(--gold);border-radius:3px;transition:width .8s;"></div>`:''}
        ${ctrl.quietPct>0?`<div style="position:absolute;left:${ctrl.loudPct}%;height:100%;width:${ctrl.quietPct}%;background:var(--teal);border-radius:3px;transition:width .8s;"></div>`:''}
        ${[25,51,75].map(t=>`<div style="position:absolute;left:${t}%;top:-2px;width:1px;height:10px;background:var(--b2);"></div>`).join('')}
      </div>
      ${topPerk?`<div style="font-size:10px;color:var(--green);line-height:1.5;">◆ ${topPerk.perk}</div>`:''}
      ${nextThresh?`<div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);margin-top:3px;">Next: ${nextThresh.label} at ${nextThresh.pct}% — ${nextThresh.pct-ctrl.pct}% to go</div>`:''}
      <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">
        <button class="btn-o" style="font-size:7px;" onclick="acquireQuietSector('${sec}')">ACQUIRE QUIETLY</button>
        <button class="btn-o" style="font-size:7px;" onclick="acquireLoudSector('${sec}')">ACQUIRE OPENLY</button>
      </div>
    </div>`;
  }).join('');

  // ── National Influence ──────────────────────────────────────────────────────
  const niRows=Object.entries(G.nationalInfluence||{}).filter(([,pct])=>pct>0).map(([th,pct])=>{
    const theater=TH[th];
    const niLabel=pct>=75?'SOVEREIGN CONTROL':pct>=50?'DOMINANT INFLUENCE':pct>=25?'SIGNIFICANT PRESENCE':'MINOR FOOTPRINT';
    const niColor=pct>=75?'var(--gold)':pct>=50?'var(--teal)':pct>=25?'var(--blue)':'var(--t3)';
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s2);border:1px solid var(--b1);border-left:3px solid ${niColor};margin-bottom:4px;">
      <span style="font-size:18px;">${theater?theater.f:'🌍'}</span>
      <div style="flex:1;">
        <div style="font-size:12px;color:var(--t0);">${theater?theater.n:th.toUpperCase()}</div>
        <div style="font-family:Space Mono,monospace;font-size:7px;color:${niColor};">${niLabel}</div>
      </div>
      <div style="font-family:Space Mono,monospace;font-size:12px;color:${niColor};">${pct}%</div>
    </div>`;
  }).join('');

  return`<div style="padding:12px 16px;width:100%;">
    <div style="font-family:Space Mono,monospace;font-size:7px;letter-spacing:.2em;color:var(--t3);margin-bottom:10px;">FACTION POWER RANKINGS</div>
    <div style="margin-bottom:20px;">${factionRows}</div>

    <div style="font-family:Space Mono,monospace;font-size:7px;letter-spacing:.2em;color:var(--gold3);margin-bottom:10px;">◆ MONOPOLY TRACKER — INDUSTRY CONTROL</div>
    <div style="font-size:10px;color:var(--t3);margin-bottom:10px;line-height:1.6;">🔊 Loud = public ownership under Kutor Holdings · 🔇 Quiet = through shells/intermediaries · Threshold markers at 25% / 51% / 75%</div>
    <div style="margin-bottom:20px;">${monopolyRows}</div>

    ${niRows?`<div style="font-family:Space Mono,monospace;font-size:7px;letter-spacing:.2em;color:var(--gold);margin-bottom:10px;">◆ NATIONAL INFLUENCE</div>
    <div style="margin-bottom:16px;">${niRows}</div>`:''}
  </div>`;
}

  G.tab='narrative';
  move('[GRAY] Identify the most strategically valuable '+sec+' business in my active theaters and begin a quiet acquisition — through shells or intermediaries. No public announcement. Kutor Holdings name kept off the paperwork.');
}

  G.tab='narrative';
  move('[CLEAN] Identify the most strategically valuable '+sec+' business in my active theaters and make an open acquisition offer under Kutor Holdings. Public, visible, legitimate.');

  // Theater filter tabs

        ${canBuy&&needsPermit?`<button class="btn-o" style="font-size:7px;" onclick="acquireLoud('${b.id}')">ACQUIRE (LOUD)</button>`:''},

        ${(G.bizOwned||[]).length>0?`<button class="btn-o" style="font-size:7px;" onclick="openMerge('${b.id}')">HOSTILE TAKEOVER</button>`:''}
        ${!canBuy?`<div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">Need $${((b.cost-(G.clean||0))/1000).toFixed(0)}K more</div>`:''}
      </div>
    </div>`;
  }).join('');

  const ownedCards=myBiz.map(b=>`
    <div class="card" style="border-left:2px solid var(--gold);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">
        <div>
          <div style="font-size:13px;color:var(--gold);">◆ ${b.n}</div>
          <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">${b.sec} · ${b.th.toUpperCase()}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:Space Mono,monospace;font-size:9px;color:var(--green);">+$${(b.rev/1000).toFixed(0)}K/mo</div>
        </div>
      </div>

        <button class="btn-r" style="font-size:7px;" onclick="sellBiz('${b.id}')">SELL</button>

  return`<div style="padding:12px 16px;width:100%;">

function doComm(id){
  const c=COMM.find(x=>x.id===id);if(!c)return;
  if((G.clean+G.dirty)<c.cost)return;
  if(G.clean>=c.cost)G.clean-=c.cost;else{const r=c.cost-G.clean;G.clean=0;G.dirty-=r;}
  G.commData[id]={invested:true,loyalty:c.loy||20,level:1};
  G.M.pub=Math.min(100,G.M.pub+5);G.M.integrity=Math.min(100,G.M.integrity+3);
  G.txns.push({desc:'Community: '+c.n,amt:-c.cost,sess:G.session});
  G.modal=null;notif('Invested',c.n);save();render();
  setTimeout(()=>{G.tab='narrative';move(`[CLEAN] I just invested in ${c.n}. Play out how the community receives this investment and what doors it immediately opens.`);},500);
}
function deepenComm(id){
  const c=COMM.find(x=>x.id===id);if(!c)return;
  const cost=Math.round(c.cost*0.4);
  if((G.clean+G.dirty)<cost){notif('Insufficient','Need more capital.');return;}
  if(G.clean>=cost)G.clean-=cost;else{const r=cost-G.clean;G.clean=0;G.dirty-=r;}
  G.commData[id].loyalty=Math.min(100,(G.commData[id].loyalty||20)+15);G.commData[id].level=(G.commData[id].level||1)+1;
  G.modal=null;notif('Deepened','Loyalty +15 in '+c.n);save();render();
}

function cutContact(id){
  const c=CONTACTS.find(x=>x.id===id);

function doLoad(){
  const inp=document.getElementById('load-inp');
  if(!inp)return;
  const code=inp.value.trim().toUpperCase();
  const decoded=decodeState(code);
  if(!decoded){document.getElementById('load-err').style.display='block';return;}
  const apiKey=G.apiKey,el_key=G.el_key;
  Object.assign(G,decoded,{apiKey,el_key,loading:false,modal:null});
  notif('Restored','Game state loaded.');save();render();
}
function decodeState(code){
  try{
    const b64=code.replace(/-/g,'+').replace(/_/g,'/');
    const json=atob(b64);
    return JSON.parse(json);
  }catch(e){return null;}
}

async function callAPI(msgs){
  if(!G.apiKey){
    G.error='No API key. Go back to setup.';
    G.loading=false;
    render();
    return;
  }
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),45000);
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal:controller.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':G.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        messages:msgs
      })
    });
    clearTimeout(timeout);
    if(!resp.ok){
      const t=await resp.text();
      throw new Error('API '+resp.status+': '+t.substring(0,150));
    }
    const d=await resp.json();
    return d.content[0].text;
  }catch(e){
    clearTimeout(timeout);
    G.loading=false;
    G.error=e.name==='AbortError'?'Request timed out. Try again.':'Error: '+e.message;
    render();
  }
}

function processResp(raw,playerAction,userMsg){
  // Extract choices
  const choiceLines=raw.match(/^CHOICE:.+$/gm)||[];
  const rawChoices=choiceLines.map(l=>l.replace(/^CHOICE:\s*/,'').trim());
  const choices=rawChoices.map(t=>{const type=t.startsWith('[CLEAN]')?'CLEAN':t.startsWith('[DARK]')?'DARK':'GRAY';const text=t.replace(/^\[(CLEAN|GRAY|DARK)\]\s*/,'');return {type,text};});
  // Extract stat update
  const statMatch=raw.match(/STAT_UPDATE:([^\n]*)/);
  if(statMatch)applyM(statMatch[1]);
  // Extract family update
  const famMatch=raw.match(/FAMILY_UPDATE:([^\n]*)/);
  if(famMatch)parseChar(famMatch[1]);
  // Clean narrative (remove CHOICE/STAT/FAMILY lines)
  const narrative=raw.replace(/^(CHOICE:|STAT_UPDATE:|FAMILY_UPDATE:).+$/gm,'').replace(/\n{3,}/g,'\n\n').trim();
  // Update messages history
  const assistantMsg={role:'assistant',content:raw};
  G.msgs=[...G.msgs,userMsg,assistantMsg].slice(-8);
  // Build ticker from this session
  addTickerItem(playerAction,narrative);
  // Store narrative
  G.narrative=narrative;
  G.narrativeHTML=narrative;
  G.choices=choices.length?choices:defChoices();
  G.session++;
  if(G.session%10===0&&G.age<99)G.age=(G.age||29)+1;
  checkPresidential();
  G.loading=false;
  save();render();
  setTimeout(()=>{
    const nb=document.getElementById('narrative-body');
    if(nb)nb.scrollTop=0;
    renderTicker();
  },100);
}

function addTickerItem(action,narrative){
  const heat=G.M.heat;
  const who=heatName();
  // Generate a short ticker item based on action + heat level
  let item='';
  const a=action.toLowerCase();
  if(a.includes('acquire')||a.includes('buy'))item=heat<=20?`An unnamed investor acquires new holdings in the region.`:`${who} completes an acquisition.`;
  else if(a.includes('launch')||a.includes('ngo'))item=heat<=40?`A new community initiative launches in the region.`:`${who}'s foundation expands operations.`;
  else if(a.includes('gov')||a.includes('minister')||a.includes('official'))item=heat<=40?`Political circles report unusual movement.`:`Sources link ${who} to recent government meetings.`;
  else if(a.includes('bank'))item=heat<=40?`A quiet banking transaction draws brief attention.`:`${who} reportedly involved in banking sector moves.`;
  else if(a.includes('hostile')||a.includes('takeover')||a.includes('dark'))item=heat<=40?`Industry observers note an aggressive market move.`:`${who} executes a hostile maneuver.`;
  else if(a.includes('community')||a.includes('invest'))item=`Community investment recorded in the region.`;
  else item=heat<=20?`No significant public activity reported.`:`${who} continues quiet operations.`;
  G.tickerItems=[{text:item,col:heat<=20?'var(--t3)':heat<=60?'var(--t2)':'var(--gold)',...{ts:Date.now()}},...(G.tickerItems||[])].slice(0,12);
}

function applyM(statStr){
  // Parse: clean:5000 dirty:-2000 pub:2 heat:-1 factionRel:corp_elites:5 commLoy:freetown:3
  const parts=statStr.trim().split(/\s+/);
  parts.forEach(p=>{
    const kv=p.split(':');
    if(kv.length===2){
      const k=kv[0],v=parseInt(kv[1])||0;
      if(k==='clean')G.clean=Math.max(0,(G.clean||0)+v);
      else if(k==='dirty')G.dirty=Math.max(0,(G.dirty||0)+v);
      else if(k==='pub')G.M.pub=Math.min(100,Math.max(0,(G.M.pub||50)+(G.ghostMode?Math.round(v*0.5):v)));
      else if(k==='priv')G.M.priv=Math.min(100,Math.max(0,(G.M.priv||30)+v));
      else if(k==='heat')G.M.heat=Math.min(100,Math.max(0,(G.M.heat||5)+(G.ghostMode?Math.round(v*0.5):v)));
      else if(k==='inst')G.M.inst=Math.min(100,Math.max(0,(G.M.inst||20)+v));
      else if(k==='comp')G.M.comp=Math.min(100,Math.max(0,(G.M.comp||50)+v));
      else if(k==='street')G.M.street=Math.min(100,Math.max(0,(G.M.street||30)+v));
      else if(k==='govInf'){}// tracked through govOwned
    } else if(kv.length===3){
      const k=kv[0],id=kv[1],v=parseInt(kv[2])||0;
      if(k==='factionRel'){if(!G.factionRels)G.factionRels={};G.factionRels[id]=Math.min(100,Math.max(0,(G.factionRels[id]||50)+v));}
      if(k==='commLoy'){if(!G.commData[id])G.commData[id]={invested:false,loyalty:0};G.commData[id].loyalty=Math.min(100,Math.max(0,(G.commData[id].loyalty||0)+v));}
      if(k==='factionIntel'){if(!G.factionIntel)G.factionIntel={};G.factionIntel[id]=Math.min(5,Math.max(0,(G.factionIntel[id]||0)+v));}
    }
  });
}

function parseChar(famStr){
  // FAMILY_UPDATE: partner:Amara:28 or child:Ibrahim:0:👶🏿
  const parts=famStr.trim().split(/\s+/);
  parts.forEach(p=>{
    const kv=p.split(':');
    if(kv[0]==='partner'&&kv[1]){G.family=G.family||{partner:null,children:[],heirId:null};G.family.partner={name:kv[1],age:parseInt(kv[2])||28};}
    if(kv[0]==='child'&&kv[1]){G.family=G.family||{partner:null,children:[],heirId:null};const id='c'+Date.now();G.family.children.push({id,name:kv[1],age:parseInt(kv[2])||0,emoji:kv[3]||'👶🏿'});}
  });
}

function defChoices(){
  return [

// ── INPUT FUNCTIONS ───────────────────────────────────────────────────────────
function move(action){
  if(G.loading)return;
  G.tab='narrative';
  callAPI(action);
  render();
}
function pickChoice(i){
  const c=G.choices&&G.choices[i];
  if(c)move(typeof c==='object'?c.text:c);
}
function sendFree(){
  const inp=document.getElementById('free-input')||document.getElementById('finput');
  if(!inp)return;
  const val=inp.value.trim();
  if(!val)return;
  inp.value='';
  move(val);
}

// ── OPENING SCENE ─────────────────────────────────────────────────────────────
function renderOpening(){
  const op=OPENINGS[G.origin];
  if(!op)return;
  G.narrative=op.scene;
  G.narrativeHTML=op.scene;
  G.choices=(op.choices||[]).map(c=>typeof c==='string'?{type:'GRAY',text:c}:c);
  G.session=1;
  G.age=29;
  render();
}

// ── SCROLL + ATTACH ───────────────────────────────────────────────────────────
function scrollN(){
  setTimeout(()=>{const el=document.getElementById('narrative-body');if(el)el.scrollTop=el.scrollHeight;},80);
}
function attach(){
  try{
    const inp=document.getElementById('free-input')||document.getElementById('finput');
    if(inp&&inp.addEventListener&&!inp._bishopBound){
      inp._bishopBound=true;
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFree();}});
    }
    renderTicker();

}

function gatherIntel(fid,cost){
  if((G.clean+G.dirty)<cost){notif('Insufficient','Need $'+cost.toLocaleString()+' for intelligence operation.');return;}

  if(!G.factionIntel[fid])G.factionIntel[fid]={knowledgeLevel:0};
  G.factionIntel[fid].knowledgeLevel=Math.min(3,(G.factionIntel[fid].knowledgeLevel||0)+1);

  const f=F[fid];const unlocked=kl===1?'STRENGTH REVEALED':kl===2?'WEAKNESS REVEALED':'FULL NETWORK MAP';

}

    const ctx=buildCtx();
    const hist=(G.msgs||[]).slice(-4);
    const newMsg={role:'user',content:ctx+'\n\nSession '+G.session+'. Action: '+action};
    const msgs=hist.length===0?[newMsg]:[...hist,newMsg];
    const resp=await callAPI(msgs);
    if(!resp){
      // callAPI already set G.error and called render()
      return;
    }
    G.msgs=[...msgs,{role:'assistant',content:resp}].slice(-12);
    processResp(resp,action);
  }catch(e){
    G.error='Error: '+e.message;
    G.loading=false;
    render();
  }
}
function processResp(resp,action){
  G.loading=false; G.error=null; G.session++;
  if(G.session>=20)G.phase='POWER';
  else if(G.session>=12)G.phase='EXPANSION';
  else if(G.session>=6)G.phase='GROWTH';
  else G.phase='FOUNDATION';
  if(G.session%10===0&&G.age<99)G.age++;

  const lines=resp.split('\n');
  const choiceLines=lines.filter(l=>l.trim().startsWith('CHOICE:'));
  const statLine=lines.find(l=>l.trim().startsWith('STAT_UPDATE:'));
  const famLine=lines.find(l=>l.trim().startsWith('FAMILY_UPDATE:'));
  if(statLine)applyM(statLine.replace('STAT_UPDATE:','').trim());
  if(famLine)parseChar(famLine.replace('FAMILY_UPDATE:','').trim());

  // Parse choices - these should now be dialogue responses
  if(choiceLines.length>=2){
    G.choices=choiceLines.map(l=>{
      const raw=l.replace(/^CHOICE:\s*/,'').trim();
      const type=raw.startsWith('[CLEAN]')?'CLEAN':raw.startsWith('[DARK]')?'DARK':'GRAY';
      const text=raw.replace(/^\[(CLEAN|GRAY|DARK)\]\s*/,'').trim();
      return{type,text};
    });
  }else{G.choices=defChoices();}

  // Build iMessage-style scene
  const skipPfx=['CHOICE:','STAT_UPDATE:','FAMILY_UPDATE:'];
  const narLines=lines.filter(l=>!skipPfx.some(p=>l.trim().startsWith(p)));
  const narText=narLines.join('\n').trim();

  // Parse into conversation bubbles
  const paras=narText.split(/\n\n+/).filter(p=>p.trim());
  const bubbles=paras.map(p=>{
    const t=p.trim();
    if(!t)return'';

    // LOCATION HEADER
    const locH=t.match(/^\*\*([^*]+(?:—|--|–)[^*]*)\*\*$/);
    if(locH)return`<div style="text-align:center;padding:8px 0;font-family:Space Mono,monospace;font-size:7px;color:var(--t3);letter-spacing:.2em;">${locH[1].toUpperCase()}</div>`;

    // CHARACTER DIALOGUE → bubble
    const dlg=t.match(/^\*\*([^*:]+):\*\*\s*(.*)/s);
    if(dlg){
      const speaker=dlg[1].trim();
      const speech=dlg[2].replace(/^"/,'').replace(/"$/,'').trim();
      const isKutor=speaker.toLowerCase().includes('kutor');
      const avatar=isKutor?'♟':'👤';
      const bubbleBg=isKutor?'var(--gold4)':'var(--s2)';
      const bubbleBorder=isKutor?'var(--gold3)':'var(--b1)';
      const align=isKutor?'flex-end':'flex-start';
      const msgId='msg_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
      return`<div style="display:flex;flex-direction:column;align-items:${align};margin:6px 0;">
        <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);margin-bottom:3px;${isKutor?'text-align:right;':''}">
          ${isKutor?'KUTOR':speaker.toUpperCase()}
          ${!isKutor?`<button onclick="speakText('${msgId}')" style="background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:8px;margin-left:4px;" title="Read aloud">🔈</button>`:''}
        </div>
        <div id="${msgId}" style="max-width:75%;background:${bubbleBg};border:1px solid ${bubbleBorder};border-radius:${isKutor?'12px 12px 2px 12px':'12px 12px 12px 2px'};padding:10px 13px;font-size:13px;color:var(--t1);line-height:1.7;">${speech}</div>
      </div>`;
    }

    // INTEL/CONTEXT callout
    const callout=t.match(/^\*\*(INTEL|CONTEXT|HISTORICAL PARALLEL|OPPORTUNITY|WARNING)[*:]+(.*)/s);
    if(callout){
      const lbl=callout[1];
      const body=callout[2].replace(/^\*/,'').trim();
      const clr={INTEL:'var(--blue)',CONTEXT:'var(--teal)','HISTORICAL PARALLEL':'var(--purple)',OPPORTUNITY:'var(--green)',WARNING:'var(--red)'}[lbl]||'var(--t3)';
      return`<div style="background:var(--s3);border-left:2px solid ${clr};padding:7px 10px;margin:8px 0;border-radius:0 6px 6px 0;">
        <div style="font-family:Space Mono,monospace;font-size:7px;color:${clr};margin-bottom:3px;">${lbl}</div>
        <div style="font-size:11px;color:var(--t2);line-height:1.6;">${body}</div>
      </div>`;
    }

    // Narration (short, punchy)
    return`<div style="font-size:12px;color:var(--t3);line-height:1.7;margin:5px 0;padding:0 4px;font-style:italic;">${t}</div>`;
  }).join('');

  const sessNum=String(G.session-1).padStart(2,'0');
  const actionClean=action.replace(/^\[(CLEAN|GRAY|DARK)\]\s*/,'');
  const actionType=action.startsWith('[CLEAN]')?'CLEAN':action.startsWith('[DARK]')?'DARK':'GRAY';
  const actionColor=actionType==='CLEAN'?'var(--green)':actionType==='DARK'?'var(--red)':'var(--gold)';

  const sceneBlock=`<div style="border-bottom:1px solid var(--s3);padding:10px 0 14px;margin-bottom:2px;">
    <div style="display:flex;justify-content:space-between;padding:0 4px 8px;border-bottom:1px solid var(--s3);margin-bottom:8px;">
      <span style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">SESSION ${sessNum}</span>
      <span style="font-family:Space Mono,monospace;font-size:7px;color:${actionColor};">${actionType}</span>
    </div>
    <div style="font-size:11px;color:var(--t3);font-style:italic;padding:0 4px 8px;border-bottom:1px solid var(--s3);margin-bottom:8px;">&gt; ${actionClean}</div>
    ${bubbles}
  </div>`;

  G.narrativeHTML=sceneBlock+(G.narrativeHTML||'');

  // Faction dynamics + stock fluctuation
  if(G.factionDynamics&&G.session%3===0)runFactionDynamics();
  fluctuateStocks();

  // Auto-audio — speak first character line
  if(A&&A.on&&narText){
    const firstSpeech=paras.find(p=>p.match(/^\*\*[^*:]+:\*\*/));
    if(firstSpeech){
      const txt=firstSpeech.replace(/^\*\*[^*:]+:\*\*\s*/,'').replace(/^"|"$/g,'').substring(0,200);
      setTimeout(()=>A.speak(txt),300);
    }
  }

  addTickerItem(action,narText);
  checkPresidential();
  G.washOps=(G.washOps||[]).map(op=>{op.sessionsLeft--;if(op.sessionsLeft<=0){G.clean+=op.netAmount;notif('Legitimization Complete',op.name+' complete');}return op;}).filter(op=>op.sessionsLeft>0);
  save();render();
  setTimeout(()=>{const nb=document.getElementById('narrative-body');if(nb)nb.scrollTop=0;},150);
}

function runFactionDynamics(){
  if(!(G.factionDynamics))return;

  const picks=fkeys.sort(()=>Math.random()-.5).slice(0,2);
  picks.forEach(fk=>{
    const current=G.factionRels[fk]||50;
    const delta=Math.floor(Math.random()*10)-5; // -5 to +5
    G.factionRels[fk]=Math.max(0,Math.min(100,current+delta));
  });
  // Add to ticker
  if(Math.random()>.5){

    G.tickerItems=[{text:msg,col:'var(--t3)'},...(G.tickerItems||[])].slice(0,12);
  }
}

      <div style="background:var(--s2);border:1px solid var(--b1);padding:10px;text-align:center;"><div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">LAND</div><div style="font-size:18px;color:var(--green);">$${((byType.land||0)/1000).toFixed(0)}K</div></div>
      <div style="background:var(--s2);border:1px solid var(--b1);padding:10px;text-align:center;"><div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">PROPERTY</div><div style="font-size:18px;color:var(--blue);">$${(((byType.residence||0)+(byType.compound||0))/1000).toFixed(0)}K</div></div>
      <div style="background:var(--s2);border:1px solid var(--b1);padding:10px;text-align:center;"><div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">VEHICLES</div><div style="font-size:18px;color:var(--teal);">$${((byType.vehicle||0)/1000).toFixed(0)}K</div></div>
    </div>
    ${owned.length?`<div style="font-family:Space Mono,monospace;font-size:7px;letter-spacing:.2em;color:var(--gold3);margin-bottom:8px;">YOUR HOLDINGS</div><div class="grid" style="margin-bottom:14px;">${ownedCards}</div>`:''}
    <div style="font-family:Space Mono,monospace;font-size:7px;letter-spacing:.2em;color:var(--t3);margin-bottom:8px;">AVAILABLE TO ACQUIRE</div>
    <div class="grid">${availCards}</div>
  </div>`;
}

function buyAsset(id){
  const a=REAL_ASSETS.find(x=>x.id===id);
  if(!a)return;
  if((G.clean||0)<a.cost){notif('Insufficient','Need $'+(a.cost/1000).toFixed(0)+'K clean capital.');return;}
  G.clean-=a.cost;
  G.assets=G.assets||[];
  G.assets.push({...a});
  notif('Asset Acquired',a.n+' — $'+(a.value/1000).toFixed(0)+'K added to portfolio');
  // Check if this satisfies dynasty arc land condition
  if(a.type==='land'&&a.theater==='salone')notif('Dynasty Arc','Land in Salone acquired — Dynasty Arc progress updated.');
  save();render();
}

function investBond(id,amount){
  if(G.clean<amount){notif('Insufficient','Need $'+(amount/1000).toFixed(0)+'K');return;}
  G.clean-=amount;
  G.bondPositions=G.bondPositions||{};
  G.bondPositions[id]=(G.bondPositions[id]||0)+amount;
  const b=typeof BONDS!=='undefined'?BONDS.find(x=>x.id===id):null;
  notif('Bond Purchased',b?b.n+' — $'+(amount/1000).toFixed(0)+'K invested':'Bond purchased');
  save();render();
}
function redeemBond(id){
  const amt=(G.bondPositions||{})[id]||0;
  if(!amt)return;
  G.clean+=amt;
  delete G.bondPositions[id];
  notif('Bond Redeemed','$'+(amt/1000).toFixed(0)+'K returned to clean capital');
  save();render();
}
function investFund(id,amount){
  if(G.clean<amount){notif('Insufficient','Need $'+(amount/1000).toFixed(0)+'K');return;}
  G.clean-=amount;
  G.fundPositions=G.fundPositions||{};
  G.fundPositions[id]=(G.fundPositions[id]||0)+amount;
  const f=typeof INFRA_FUNDS!=='undefined'?INFRA_FUNDS.find(x=>x.id===id):null;
  notif('Fund Investment',f?f.n+' — $'+(amount/1000).toFixed(0)+'K committed':'Investment committed');
  save();render();
}
function redeemFund(id){
  const amt=(G.fundPositions||{})[id]||0;
  if(!amt)return;
  G.clean+=Math.round(amt*0.92); // 8% exit fee
  delete G.fundPositions[id];
  notif('Fund Exit','Capital returned (8% exit fee applied)');
  save();render();
}

function acquireOfficialClean(id){
  const o=GOV.find(x=>x.id===id);
  if(!o)return;
  if(G.clean<o.acquire){notif('Insufficient','Need $'+(o.acquire/1000).toFixed(0)+'K');return;}
  G.clean-=o.acquire;
  if(!G.govOwned.includes(id))G.govOwned.push(id);
  notif('Official Acquired',o.n+' is now in your network.');
  G.M.inst=Math.min(100,(G.M.inst||0)+Math.round(o.inf/3));
  G.M.heat=Math.min(100,(G.M.heat||0)+3);
  if(typeof checkNationalInfluence==="function")checkNationalInfluence(G.theater);
  save();render();
}
function acquireOfficialQuiet(id){
  const o=GOV.find(x=>x.id===id);
  if(!o)return;
  G.tab='narrative';
  move('[GRAY] Quietly approach '+o.n+': build a relationship through intermediaries. No direct contact. Establish leverage before any financial arrangement.');
}
function deployOfficial(id){
  const o=GOV.find(x=>x.id===id);
  if(!o)return;
  G.tab='narrative';
  move('[GRAY] Deploy '+o.n+': use this relationship to advance a specific strategic objective. What needs to happen, and how far can this contact be pushed?');
}

// ── STOCK PRICE FLUCTUATION ────────────────────────────────────────────────────
function fluctuateStocks(){
  if(!G.stockPositions)return;
  // Every session, owned stocks fluctuate slightly based on game events
  const ownedIds=Object.keys(G.stockPositions).filter(id=>G.stockPositions[id].shares>0);
  if(!ownedIds.length)return;
  const allStocks=[...(typeof STOCKS!=='undefined'?STOCKS:[]),...(typeof STOCKS_EXTRA!=='undefined'?STOCKS_EXTRA:[])];
  ownedIds.forEach(id=>{
    const st=allStocks.find(x=>x.id===id);
    if(!st)return;
    // Base fluctuation: ±3%
    const delta=(Math.random()-.45)*.06; // Slight upward bias
    // Theater-specific boost: if player has presence in stock's theater
    const theaterBonus=(G.thUnlocked||[]).includes(st.theater)?0.01:0;
    // Monopoly boost: if player dominates the sector
    const ctrl=typeof getIndustryControl==="function"?getIndustryControl(st.sector):{pct:0};
    const monopolyBonus=ctrl.pct>50?0.02:0;
    st.price=Math.max(0.01,st.price*(1+delta+theaterBonus+monopolyBonus));
    st.price=Math.round(st.price*100)/100;
  });
}

function getStockTickerHTML(){
  const allStocks=[...(typeof STOCKS!=='undefined'?STOCKS:[]),...(typeof STOCKS_EXTRA!=='undefined'?STOCKS_EXTRA:[])];
  const positions=G.stockPositions||{};
  const owned=allStocks.filter(s=>positions[s.id]&&positions[s.id].shares>0);
  if(!owned.length)return'<span style="font-family:Space Mono,monospace;font-size:8px;color:var(--t3);">No positions held — buy stocks to track them here.</span>';
  return owned.map(s=>{
    const pos=positions[s.id];
    const pnl=Math.round((s.price-pos.avgCost)*pos.shares);
    const pnlPct=Math.round(((s.price-pos.avgCost)/pos.avgCost)*100);
    const pnlColor=pnl>=0?'var(--green)':'var(--red)';
    const arrow=pnl>=0?'▲':'▼';
    return`<span style="font-family:Space Mono,monospace;font-size:8px;margin-right:16px;white-space:nowrap;">
      <span style="color:var(--t1);">${s.ticker}</span>
      <span style="color:var(--t2);margin:0 4px;">$${s.price.toFixed(2)}</span>
      <span style="color:${pnlColor};">${arrow}${Math.abs(pnlPct)}%</span>
      <span style="color:var(--t3);font-size:7px;margin-left:3px;">${pos.shares}sh</span>
    </span>`;
  }).join('');
}

</script>
