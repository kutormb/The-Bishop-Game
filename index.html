<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>THE BISHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #080808;
  --s1: #101010;
  --s2: #161616;
  --b1: #1e1e1e;
  --b2: #2a2a2a;
  --t0: #eeeeee;
  --t1: #cccccc;
  --t2: #888888;
  --t3: #444444;
  --gold: #c8922a;
  --gold2: #e8b84b;
  --gold3: #8a6420;
  --red: #c44444;
  --green: #4a9a6a;
  --blue: #3a7aaa;
  --orange: #e88a3a;
}

body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  line-height: 1.7;
  min-height: 600px;
}

/* TITLE */
.title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 24px;
  min-height: 600px;
  background: radial-gradient(ellipse at 45% 30%, #1c1005 0%, #080808 65%);
  position: relative;
}
.title-screen::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold3), transparent);
}
.t-eye { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .5em; color: var(--gold3); margin-bottom: 28px; }
.t-main { font-size: clamp(64px, 14vw, 140px); font-weight: 300; color: var(--t0); line-height: .82; letter-spacing: -.02em; margin-bottom: 10px; }
.t-sub { font-style: italic; font-size: clamp(11px, 1.6vw, 15px); color: var(--gold); letter-spacing: .1em; margin-bottom: 44px; }
.t-quote { font-style: italic; font-size: 13px; color: var(--t3); max-width: 360px; margin: 0 auto 44px; line-height: 1.7; }
.t-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ORIGIN */
.origin-screen { padding: 32px 20px 60px; min-height: 600px; }
.origin-header { margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1px solid var(--b1); }
.origin-title { font-size: clamp(22px, 4vw, 34px); font-weight: 300; color: var(--t0); margin-bottom: 6px; }
.origin-sub { font-style: italic; color: var(--t3); font-size: 13px; }
.origin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 2px; margin-bottom: 24px; }
.oc {
  background: var(--s1); border: 1px solid var(--b1);
  padding: 20px 18px; cursor: pointer;
  transition: all .2s; position: relative; overflow: hidden;
}
.oc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: .3s; }
.oc:hover::before, .oc.sel::before { transform: scaleX(1); }
.oc:hover, .oc.sel { border-color: var(--gold3); background: #0e0b06; }
.oc-num { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .28em; color: var(--gold3); margin-bottom: 9px; }
.oc-icon { font-size: 26px; margin-bottom: 7px; }
.oc-name { font-size: 18px; color: var(--t0); margin-bottom: 4px; }
.oc-tag { font-style: italic; font-size: 11px; color: var(--gold); margin-bottom: 8px; }
.oc-desc { font-size: 12px; color: var(--t3); line-height: 1.6; }
.oc-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--b1); }
.pill { font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: .1em; color: var(--t3); padding: 2px 5px; border: 1px solid var(--b2); }
.diff-tag { position: absolute; top: 10px; right: 10px; font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: .1em; padding: 2px 5px; border: 1px solid; }
.dh { color: var(--red); border-color: #6b1515; }
.dm { color: var(--gold); border-color: var(--gold3); }

/* GAME */
.game-screen { display: flex; flex-direction: column; min-height: 600px; }

.game-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: var(--s1); border-bottom: 1px solid var(--b1);
  position: sticky; top: 0; z-index: 10;
  flex-wrap: wrap; gap: 8px;
}
.game-brand { font-size: 13px; font-weight: 300; color: var(--gold); letter-spacing: .1em; }
.game-stats { display: flex; gap: 14px; flex-wrap: wrap; }
.gs-lbl { font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: .24em; color: var(--t3); display: block; }
.gs-val { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--gold2); font-weight: 700; }
.game-acts { display: flex; gap: 5px; flex-wrap: wrap; }

.game-layout { display: flex; gap: 0; flex: 1; min-height: 0; }

/* status panel */
.status-panel {
  width: 200px; min-width: 200px; flex-shrink: 0;
  background: var(--s1); border-right: 1px solid var(--b1);
  overflow-y: auto;
}
@media (max-width: 700px) { .status-panel { display: none; } }

.ps { padding: 12px; border-bottom: 1px solid var(--b1); }
.pl { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .34em; color: var(--t3); text-transform: uppercase; margin-bottom: 8px; }

.pav-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.pav { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold3); display: flex; align-items: center; justify-content: center; font-size: 18px; background: linear-gradient(135deg, #1a1208, #261a0c); flex-shrink: 0; }

.cap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 4px; }
.cap-box { background: var(--s2); border: 1px solid var(--b1); padding: 6px 8px; }
.cap-lbl { font-family: 'Space Mono', monospace; font-size: 6px; letter-spacing: .12em; color: var(--t3); margin-bottom: 2px; }
.cap-val { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--gold2); font-weight: 700; }
.cap-val.dirty { color: var(--red); }

.mr { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.mn { font-family: 'Space Mono', monospace; font-size: 6px; color: var(--t2); width: 58px; flex-shrink: 0; }
.mt { flex: 1; height: 3px; background: var(--b2); border-radius: 2px; overflow: hidden; }
.mf { height: 100%; border-radius: 2px; transition: width .8s ease; }
.mg { background: var(--gold); } .mgr { background: var(--green); } .mb { background: var(--blue); } .mo { background: var(--orange); } .mrd { background: var(--red); }
.mv { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--t3); width: 18px; text-align: right; flex-shrink: 0; }

.ci { display: flex; align-items: center; gap: 7px; padding: 6px 0; border-bottom: 1px solid #111; cursor: pointer; transition: padding .15s; }
.ci:hover { padding-left: 3px; }
.ci:last-child { border-bottom: none; }
.ca { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.cn { font-size: 11px; color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cr { font-family: 'Space Mono', monospace; font-size: 6px; color: var(--t3); margin-top: 1px; }
.cdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-left: auto; }
.dg { background: var(--green); } .dy { background: var(--gold); } .dr { background: var(--red); }

/* narrative */
.narrative-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.narrative { flex: 1; overflow-y: auto; padding: 20px 22px; }
@media (max-width: 500px) { .narrative { padding: 12px 12px; } }

.scene { margin-bottom: 26px; }
.shdr { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--b1); }
.sloc { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .22em; color: var(--gold3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
.sdiv { flex: 1; height: 1px; background: var(--b1); }
.ssess { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--t3); white-space: nowrap; }
.stitle { font-size: clamp(16px, 3vw, 22px); font-weight: 300; color: var(--t0); margin-bottom: 10px; line-height: 1.2; }
.sbody { font-size: 14px; color: var(--t1); line-height: 1.9; }
.sbody p { margin-bottom: 10px; }

.chblk { display: flex; gap: 10px; margin: 14px 0; padding: 14px; background: var(--s1); border: 1px solid var(--b1); border-left: 3px solid var(--gold3); }
.chport { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; width: 46px; }
.chavat { width: 40px; height: 40px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 18px; border: 1px solid var(--b2); }
.chpn { font-family: 'Space Mono', monospace; font-size: 6px; color: var(--t3); text-align: center; line-height: 1.3; }
.chcnt { flex: 1; min-width: 0; }
.chhdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; gap: 3px; }
.chname { font-size: 13px; color: var(--t0); }
.chstat { font-family: 'Space Mono', monospace; font-size: 6px; color: var(--gold3); letter-spacing: .1em; }
.chspeech { font-style: italic; font-size: 13px; color: var(--t0); line-height: 1.78; border-left: 2px solid var(--gold3); padding-left: 10px; margin-bottom: 6px; }
.chsub { font-size: 11px; color: var(--t3); font-style: italic; line-height: 1.5; }

.pact { display: flex; gap: 8px; padding: 8px 11px; background: #090909; border: 1px solid var(--b1); border-left: 3px solid var(--gold); margin: 8px 0; }
.palbl { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .18em; color: var(--gold); flex-shrink: 0; margin-top: 1px; white-space: nowrap; }
.patxt { font-style: italic; color: var(--t1); font-size: 12px; line-height: 1.6; }

.sflag { display: inline-flex; align-items: center; gap: 6px; border: 1px solid #1a3a1a; background: #080f09; padding: 4px 9px; margin: 4px 2px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .12em; color: var(--green); text-transform: uppercase; }
.ibox { background: var(--s1); border: 1px solid var(--b1); border-left: 3px solid #1a3a5a; padding: 8px 11px; margin: 9px 0; cursor: pointer; }
.ilbl { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .2em; color: var(--blue); margin-bottom: 3px; }
.itxt { font-size: 11px; color: var(--t3); line-height: 1.6; }

.mctag { display: inline-flex; align-items: center; font-family: 'Space Mono', monospace; font-size: 7px; padding: 2px 5px; border-radius: 2px; margin: 2px; }
.mcp { color: var(--green); background: #0a1a0a; border: 1px solid #1a3a1a; }
.mcn { color: var(--red); background: #120808; border: 1px solid #3a1212; }

/* input */
.input-area { border-top: 1px solid var(--b1); background: var(--s1); padding: 10px 14px; }
.choice-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.cbtn {
  background: var(--s2); border: 1px solid var(--b2);
  padding: 7px 10px; cursor: pointer; text-align: left;
  transition: all .2s; font-family: 'Cormorant Garamond', serif;
  display: flex; align-items: flex-start; gap: 7px;
  flex: 1; min-width: 140px; min-height: 44px;
}
.cbtn:hover, .cbtn:active { border-color: var(--gold3); background: #0d0b07; }
.cnum { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--gold3); letter-spacing: .12em; flex-shrink: 0; margin-top: 2px; }
.ctxt { font-size: 12px; color: var(--t2); line-height: 1.5; flex: 1; }
.ctag { font-family: 'Space Mono', monospace; font-size: 6px; padding: 2px 4px; border: 1px solid; flex-shrink: 0; margin-top: 2px; }
.tc { color: var(--green); border-color: #1a3a1a; }
.tg { color: var(--gold); border-color: var(--gold3); }
.td { color: var(--red); border-color: #6b1515; }

.free-row { display: flex; gap: 6px; }
.finput {
  flex: 1; background: #090909; border: 1px solid var(--b2);
  color: var(--t1); font-family: 'Cormorant Garamond', serif;
  font-size: 14px; padding: 9px 10px; outline: none;
  transition: border-color .2s; min-height: 44px;
  border-radius: 0; -webkit-appearance: none;
}
.finput:focus { border-color: var(--gold3); }
.finput::placeholder { color: var(--t3); font-style: italic; }
.movebtn {
  background: var(--gold); border: none; color: #000;
  font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .12em;
  padding: 9px 14px; cursor: pointer; transition: background .2s;
  text-transform: uppercase; white-space: nowrap; min-height: 44px;
}
.movebtn:hover { background: var(--gold2); }
.movebtn:disabled { opacity: .4; cursor: not-allowed; }

.errmsg { color: var(--red); font-family: 'Space Mono', monospace; font-size: 9px; padding: 7px; border: 1px solid #6b1515; margin-top: 6px; display: none; line-height: 1.5; word-break: break-all; }

/* loading */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(7,7,7,.92);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; z-index: 100;
}
.ld-txt { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .26em; color: var(--t3); }
.ld-dots { display: flex; gap: 6px; }
.ldd { width: 5px; height: 5px; background: var(--gold); border-radius: 50%; }

/* modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.88);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 20px; z-index: 200; overflow-y: auto;
}
.modal {
  background: var(--s1); border: 1px solid var(--b2);
  width: 100%; max-width: 480px; padding: 26px 22px;
  position: relative; margin: auto;
}
.modal-x { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--t3); font-size: 18px; cursor: pointer; min-width: 30px; min-height: 30px; display: flex; align-items: center; justify-content: center; }
.modal-x:hover { color: var(--t1); }
.modal-pre { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .32em; color: var(--gold3); margin-bottom: 7px; }
.modal-title { font-size: clamp(17px, 3vw, 22px); font-weight: 300; color: var(--t0); margin-bottom: 13px; line-height: 1.2; }
.modal-body { font-size: 13px; color: var(--t3); line-height: 1.85; }
.modal-body p { margin-bottom: 9px; }
.modal-body strong { color: var(--t1); }

.savedisp { background: #050505; border: 1px solid var(--b1); padding: 10px; font-family: monospace; font-size: 8px; color: var(--t3); line-height: 1.6; white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto; margin-bottom: 10px; }

/* notif */
.notif { position: fixed; bottom: 16px; right: 16px; background: var(--s1); border: 1px solid var(--b2); border-left: 3px solid var(--gold); padding: 9px 13px; max-width: 240px; z-index: 300; }
.nt { font-family: 'Space Mono', monospace; font-size: 7px; letter-spacing: .14em; color: var(--gold); margin-bottom: 2px; }
.nb { font-size: 11px; color: var(--t3); line-height: 1.5; }

/* buttons */
.btn-g { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: #000; background: var(--gold); border: none; padding: 12px 28px; cursor: pointer; transition: all .2s; min-height: 44px; }
.btn-g:hover { background: var(--gold2); }
.btn-g:disabled { opacity: .4; cursor: not-allowed; }
.btn-o { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .14em; text-transform: uppercase; color: var(--t3); background: transparent; border: 1px solid var(--b2); padding: 9px 16px; cursor: pointer; transition: all .2s; min-height: 38px; }
.btn-o:hover { border-color: var(--gold3); color: var(--gold); }

@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1);} }
.ldd:nth-child(1){animation:pulse 1.2s ease 0s infinite;}
.ldd:nth-child(2){animation:pulse 1.2s ease .2s infinite;}
.ldd:nth-child(3){animation:pulse 1.2s ease .4s infinite;}
</style>
</head>

function render() {
  const root = document.getElementById('root');
  if (G.screen === 'title') root.innerHTML = renderTitle();
  else if (G.screen === 'setup') root.innerHTML = renderSetup();
  else if (G.screen === 'origin') root.innerHTML = renderOrigin();
  else if (G.screen === 'game') root.innerHTML = renderGame();

  if (G.loading) {
    root.innerHTML += `<div class="loading-overlay"><div class="ld-txt">The board is moving</div><div class="ld-dots"><div class="ldd"></div><div class="ldd"></div><div class="ldd"></div></div></div>`;

  if (G.modal) root.innerHTML += renderModal(G.modal);
  if (G.notif) root.innerHTML += `<div class="notif"><div class="nt">${G.notif.t}</div><div class="nb">${G.notif.b}</div></div>`;

  attachEvents();
}

// ═══════════════════════════════
// API CALL — EXACT DOCUMENTED PATTERN
// ═══════════════════════════════
async function callAPI(playerAction) {
  G.loading = true;
  G.error = null;
  render();

  const context = buildContext();

  // Build messages array - put context in first user message
  const messages = G.msgs.length === 0
    ? [{ role: "user", content: context + "\n\nPlayer's first action: " + playerAction }]
    : [
        { role: "user", content: context + "\n\nContinue the narrative. Player action: " + playerAction },
        ...G.msgs.slice(-8)
      ];

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": G.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: messages
      })
    });

    const data = await response.json();

    let text = '';
    if (data.content && Array.isArray(data.content)) {
      for (const block of data.content) {
        if (block.type === 'text' && block.text) { text = block.text; break; }
      }
    }

    if (!text) {
      throw new Error(data.error ? data.error.message : 'No text in response: ' + JSON.stringify(data).substring(0,150));
    }

    G.msgs.push({ role: 'user', content: playerAction });
    G.msgs.push({ role: 'assistant', content: text });
    G.session++;

    processResponse(text);

  } catch (err) {
    G.loading = false;
    G.error = err.message || 'Connection error. Please try again.';
    render();
  }
}

    "",
    "---METERS---",
    "INTEGRITY:+0, STREET:+0, INST:+0, INFLUENCE:+0, EXPOSURE:+0, LOYALTY:+0, CLEAN_CAP:+0, DIRTY_CAP:+0",
    "",
    "---CHOICES---",
    "[CLEAN] First choice",
    "[GRAY] Second choice",
    "[DARK] Third choice",
    "",
    "---STRATEGY---",
    "PRINCIPLE: Name | BOOK: Source | NOTE: One sentence",
    "",
    "---INTEL---",
    "FACT: Educational context | SOURCE: Free resource",
    "",
    "RULES: No right answers. Decisions cascade. Dark paths exist with real consequences. World moves regardless. Literary noir. Real.",
    "=== END CONTEXT ==="
  ].join('\n');
}

// ═══════════════════════════════
// PROCESS RESPONSE
// ═══════════════════════════════
function processResponse(text) {
  const metersM  = text.match(/---METERS---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const choicesM = text.match(/---CHOICES---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const stratM   = text.match(/---STRATEGY---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const intelM   = text.match(/---INTEL---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);

  let narrative = text
    .replace(/---METERS---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---CHOICES---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---STRATEGY---[\s\S]*?(?=---[A-Z]|$)/g,'')
    .replace(/---INTEL---[\s\S]*/g,'')
    .replace(/---[A-Z]+---/g,'').trim();

  let html = `<div class="scene">
    <div class="shdr"><div class="sloc">${G.location.toUpperCase()}</div><div class="sdiv"></div><div class="ssess">SESSION ${String(G.session).padStart(2,'0')}</div></div>
    <div class="sbody">${parseCharBlocks(narrative)}</div>
  </div>`;

  // Strategy
  if (stratM) {
    const pm = stratM[1].match(/PRINCIPLE:(.*?)(?:\||$)/);
    if (pm) {
      const bm = stratM[1].match(/BOOK:(.*?)(?:\||$)/);
      const nm = stratM[1].match(/NOTE:(.*?)(?:\||$)/);
      const note = (nm?nm[1].trim():'') + (bm?' — '+bm[1].trim():'');
      const safePrinc = pm[1].trim().replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const safeNote = note.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      html += `<span class="sflag" onclick="G.modal={pre:'Strategy',title:'${safePrinc}',body:'<p>${safeNote}</p>'};render()">♟ ${pm[1].trim()}</span>`;
    }
  }

  // Intel
  if (intelM) {
    const fm = intelM[1].match(/FACT:(.*?)(?:\||$)/);
    if (fm) {
      const sm = intelM[1].match(/SOURCE:(.*?)(?:\||$)/);
      const safeF = fm[1].trim().replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const safeS = sm ? sm[1].trim().replace(/'/g,"\\'").replace(/"/g,'&quot;') : '';
      html += `<div class="ibox" onclick="G.modal={pre:'World Intel',title:'Educational Context',body:'<p>${safeF}</p><p style=\\"color:var(--t3);font-size:12px;margin-top:10px;\\">${safeS}</p>'};render()">
        <div class="ilbl">◉ INTEL — click to read</div>
        <div class="itxt">${fm[1].trim().substring(0,90)}...</div>
      </div>`;
    }
  }

  G.narrativeHTML += html;

  // Apply meters
  const changes = [];
  if (metersM) {
    const mkeys = [
      {k:'integrity',ls:['INTEGRITY']},{k:'street',ls:['STREET','STREET_REP']},
      {k:'inst',ls:['INST','INST_REP']},{k:'influence',ls:['INFLUENCE']},
      {k:'exposure',ls:['EXPOSURE']},{k:'loyalty',ls:['LOYALTY']}
    ];
    mkeys.forEach(({k,ls})=>{
      ls.forEach(l=>{
        const m = metersM[1].match(new RegExp(l+':\\s*([+-]?\\d+)','i'));
        if(m&&parseInt(m[1])!==0){
          const d=parseInt(m[1]);
          G.meters[k]=Math.max(0,Math.min(100,G.meters[k]+d));
          if(Math.abs(d)>=3) changes.push({label:k.toUpperCase(),delta:d});
        }
      });
    });
    const cm=metersM[1].match(/CLEAN_CAP:\s*([+-]?\d+)/i);
    const dm=metersM[1].match(/DIRTY_CAP:\s*([+-]?\d+)/i);
    if(cm&&parseInt(cm[1])!==0) G.cleanCap=Math.max(0,G.cleanCap+parseInt(cm[1]));
    if(dm&&parseInt(dm[1])!==0) G.dirtyCap=Math.max(0,G.dirtyCap+parseInt(dm[1]));
  }

  if (changes.length) {
    const tags = changes.map(c=>`<span class="mctag ${c.delta>0?'mcp':'mcn'}">${c.label} ${c.delta>0?'+':''}${c.delta}</span>`).join('');
    G.narrativeHTML += `<div style="margin:4px 0;">${tags}</div>`;
  }

  // Parse choices
  if (choicesM) {
    const lines = choicesM[1].trim().split(/\r?\n/).filter(l=>l.trim());
    const choices = lines.map(l=>{const m=l.match(/\[(CLEAN|GRAY|DARK)\]\s*(.*)/);return m?{type:m[1],text:m[2].trim()}:null;}).filter(Boolean);
    G.choices = choices.length ? choices : defaultChoices();
  } else {
    G.choices = defaultChoices();
  }

  G.loading = false;
  G.error = null;
  render();
  scrollNarr();
}

function defaultChoices() {
  return [
    {type:'CLEAN', text:'Proceed carefully — gather more information first.'},
    {type:'GRAY',  text:'Move with what you have — accept the uncertainty.'},
    {type:'DARK',  text:'Take the aggressive path — force the outcome.'}
  ];
}

function parseCharBlocks(text) {
  let r = text.replace(/\[CHARACTER:(.*?)\]([\s\S]*?)\[\/CHARACTER\]/g, (m,hdr,body)=>{
    const p = hdr.split('|');
    const speech = body.replace(/^[\s"]+|[\s"]+$/g,'');
    return buildChar(p[0]||'Unknown', p[1]||'👤', p[2]||'#111', speech, '', 'SPEAKING');
  });
  return r.split(/\n\n+/).filter(p=>p.trim()).map(p=>p.includes('chblk')?p:`<p>${p.trim()}</p>`).join('');
}

function buildChar(name, emoji, bg, speech, sub, status) {
  const parts = name.split(' ');
  return `<div class="chblk">
    <div class="chport">
      <div class="chavat" style="background:${bg};">${emoji}</div>
      <div class="chpn">${parts[0]}<br>${parts.slice(1).join(' ')}</div>
    </div>
    <div class="chcnt">
      <div class="chhdr"><div class="chname">${name}</div><div class="chstat">${status}</div></div>
      <div class="chspeech">"${speech}"</div>
      ${sub?`<div class="chsub">${sub}</div>`:''}
    </div>
  </div>`;
}

// ═══════════════════════════════
// CONTACT VIEW
// ═══════════════════════════════
function viewContact(id) {
  const c = G.contacts[id];
  if (!c) return;
  G.modal = {
    pre: 'Contact Profile',
    title: c.name,
    body: `<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--b1);">
      <div style="width:50px;height:50px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid var(--b2);flex-shrink:0;">${c.emoji}</div>
      <div>
        <div style="font-size:17px;color:var(--t0);margin-bottom:2px;">${c.name}</div>
        <div style="font-family:Space Mono,monospace;font-size:6px;color:var(--gold3);letter-spacing:.1em;">${c.basis} / ${c.disposition}</div>
      </div>
    </div>
    <div style="margin:8px 0;">
      <div style="font-family:Space Mono,monospace;font-size:6px;letter-spacing:.22em;color:var(--t3);margin-bottom:4px;">LOYALTY — ${c.loyalty}/100</div>
      <div style="height:3px;background:var(--b2);"><div style="height:100%;width:${c.loyalty}%;background:var(--gold);"></div></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;">${c.tags.map(t=>`<span style="font-family:Space Mono,monospace;font-size:6px;letter-spacing:.08em;padding:2px 6px;border:1px solid var(--b2);color:var(--t3);">${t}</span>`).join('')}</div>
    <p><strong>Profile:</strong> ${c.role}</p>
    <p><strong>Notes:</strong> <em>${c.notes}</em></p>
    ${c.memory&&c.memory.length?`<p><strong>History:</strong> ${c.memory.join('. ')}</p>`:'<p style="color:var(--t3);font-style:italic;">No significant interactions yet.</p>'}`
  };
  render();
}

// ═══════════════════════════════
// SAVE / LOAD / RESTART
// ═══════════════════════════════
function showSave() {
  const state = JSON.stringify({...G, msgs:G.msgs.slice(-8), loading:false, modal:null, notif:null}, null, 2);
  window._ss = state;
  G.modal = {
    pre: 'Save Session',
    title: 'Copy Your Progress',
    body: `<p style="color:var(--t3);font-size:12px;margin-bottom:10px;">Copy this state. Paste it at the start of your next session to continue exactly where you left off.</p>
      <div class="savedisp">${state}</div>
      <button class="btn-g" onclick="navigator.clipboard.writeText(window._ss).then(()=>{G.notif={t:'Saved',b:'State copied to clipboard.'};G.modal=null;render();setTimeout(()=>{G.notif=null;render();},3500)})">COPY STATE</button>`
  };
  render();
}

function showLoad() {
  G.modal = {
    pre: 'Load Session',
    title: 'Resume Your Story',
    body: `<p style="color:var(--t3);font-size:12px;margin-bottom:10px;">Paste your saved session state below.</p>
      <textarea id="load-ta" style="width:100%;height:140px;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:monospace;font-size:8px;padding:10px;resize:vertical;" placeholder="Paste JSON here..."></textarea>
      <button class="btn-g" style="margin-top:10px;" onclick="loadSession()">LOAD</button>`
  };
  render();
}

function loadSession() {
  const ta = document.getElementById('load-ta');
  if (!ta) return;
  try {
    const loaded = JSON.parse(ta.value);
    Object.assign(G, loaded, {loading:false, modal:null, notif:null});
    render();
    scrollNarr();
    showNotif('Loaded', 'Resuming at Session ' + G.session + '.');
  } catch(e) {
    alert('Invalid session state. Check the JSON and try again.');
  }
}

function confirmRestart() {
  if (confirm('Restart? Current progress will be lost.')) {
    G = {screen:'title',origin:null,session:1,phase:'FOUNDATION',location:'DMV',cleanCap:12000,dirtyCap:0,meters:{integrity:80,street:20,inst:35,influence:10,exposure:5,loyalty:70},contacts:{},history:[],msgs:[],past:null,loading:false,modal:null,notif:null,selectedOrigin:null,narrativeHTML:'',choices:[],error:null};
    render();
  }
}

// ═══════════════════════════════
// HELPERS
// ═══════════════════════════════
function scrollNarr() {
  setTimeout(() => {
    const n = document.getElementById('narrative');
    if (n) n.scrollTop = n.scrollHeight;
  }, 100);
}

function showNotif(t, b) {
  G.notif = {t, b};
  render();
  setTimeout(() => { G.notif = null; render(); }, 3500);
}

function attachEvents() {
  // Keyboard on finput
  const fi = document.getElementById('finput');
  if (fi) {
    fi.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFree(); }
    });
  }
}

// ═══════════════════════════════
// BOOT
// ═══════════════════════════════
render();
</script>
</body>
