<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>THE BISHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1c1c1c;
  --b1:#1e1e1e;--b2:#2a2a2a;--b3:#333;
  --t0:#eeeeee;--t1:#cccccc;--t2:#888;--t3:#444;
  --gold:#c8922a;--gold2:#e8b84b;--gold3:#8a6420;--gold4:#2a1a06;
  --red:#c44;--red2:#6b1515;--green:#4a9a6a;--green2:#1a3a2a;
  --blue:#3a7aaa;--blue2:#1a3a5a;--orange:#e88a3a;--purple:#7a4a9a;
}
.light{--bg:#f2ede4;--s1:#e8e0d0;--s2:#ddd6c4;--s3:#d0c8b4;--b1:#c8bca4;--b2:#b8a888;--b3:#a89870;--t0:#120e06;--t1:#2a1e0e;--t2:#5a4a2e;--t3:#9a8a6a;--gold:#7a4e0e;--gold2:#aa7820;--gold3:#5a3a08;--gold4:#f0e8d8;--red:#8b2020;--red2:#c44;--green:#1a5a2a;--green2:#d0ead8;--blue:#1a3a6a;--blue2:#d0dff0;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--t1);font-family:'Cormorant Garamond',Georgia,serif;font-size:15px;line-height:1.75;min-height:100vh;transition:background .3s,color .3s;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:var(--b2);}
.scr{display:none;}.scr.on{display:block;}

/* TITLE */
.title-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);position:relative;}
.light .title-bg{background:radial-gradient(ellipse at 45% 25%,#d8c8a0 0%,var(--bg) 65%);}
.title-bg::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);}
.t-eye{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.5em;color:var(--gold3);margin-bottom:28px;}
.t-main{font-size:clamp(60px,13vw,130px);font-weight:300;color:var(--t0);line-height:.82;letter-spacing:-.02em;margin-bottom:10px;}
.t-sub{font-style:italic;font-size:clamp(11px,1.6vw,15px);color:var(--gold);letter-spacing:.1em;margin-bottom:40px;}
.t-quote{font-style:italic;font-size:13px;color:var(--t3);max-width:340px;margin:0 auto 40px;line-height:1.7;}
.t-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.theme-btn{position:absolute;top:16px;right:16px;background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.14em;padding:6px 11px;cursor:pointer;transition:all .2s;}
.theme-btn:hover{border-color:var(--gold3);color:var(--gold);}

/* SETUP */
.setup-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 45% 25%,#1c1005 0%,var(--bg) 65%);}
.setup-card{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--gold);padding:22px;max-width:460px;width:100%;margin-bottom:14px;}
.setup-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.3em;color:var(--gold3);margin-bottom:8px;}
.setup-txt{font-size:13px;color:var(--t3);line-height:1.65;margin-bottom:6px;}
.api-inp{width:100%;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:'Space Mono',monospace;font-size:11px;padding:10px;outline:none;border-radius:0;-webkit-appearance:none;letter-spacing:.04em;margin:7px 0;}
.api-inp:focus{border-color:var(--gold3);}
.api-inp::placeholder{color:var(--t3);}
.key-err{display:none;color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-bottom:7px;line-height:1.5;}

/* ORIGIN */
.origin-wrap{max-width:1080px;margin:0 auto;padding:36px 18px 60px;}
.origin-hdr{margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--b1);}
.origin-title{font-size:clamp(22px,4.5vw,34px);font-weight:300;color:var(--t0);margin-bottom:5px;}
.origin-sub{font-style:italic;color:var(--t3);font-size:13px;}
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:2px;margin-bottom:20px;}
.oc{background:var(--s1);border:1px solid var(--b1);padding:17px 15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.oc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:.3s;}
.oc:hover::before,.oc.sel::before{transform:scaleX(1);}
.oc:hover,.oc.sel{border-color:var(--gold3);background:var(--gold4);}
.oc-num{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.26em;color:var(--gold3);margin-bottom:8px;}
.oc-icon{font-size:24px;margin-bottom:6px;}
.oc-name{font-size:17px;color:var(--t0);margin-bottom:3px;}
.oc-tag{font-style:italic;font-size:11px;color:var(--gold);margin-bottom:7px;}
.oc-desc{font-size:12px;color:var(--t3);line-height:1.6;}
.oc-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--b1);}
.pill{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.1em;color:var(--t3);padding:2px 5px;border:1px solid var(--b2);}
.diff-tag{position:absolute;top:9px;right:9px;font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.1em;padding:2px 5px;border:1px solid;}
.dh{color:var(--red);border-color:var(--red2);}.dm{color:var(--gold);border-color:var(--gold3);}

/* GAME */
.game-wrap{display:flex;flex-direction:column;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:7px;}
.brand{font-size:13px;font-weight:300;color:var(--gold);letter-spacing:.12em;}
.topstats{display:flex;gap:14px;flex-wrap:wrap;}
.ts-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.22em;color:var(--t3);display:block;}
.ts-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--gold2);font-weight:700;}
.topacts{display:flex;gap:5px;flex-wrap:wrap;}

.game-tabs{display:flex;background:var(--s2);border-bottom:1px solid var(--b1);overflow-x:auto;}
.gtab{flex-shrink:0;padding:9px 10px;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--t3);background:transparent;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;border-bottom:2px solid transparent;white-space:nowrap;}
.gtab.on{color:var(--gold);border-bottom-color:var(--gold);}
.gtab:hover{color:var(--t1);}
.tab-pane{display:none;}.tab-pane.on{display:block;}

/* STATUS */
.game-layout{display:flex;min-height:0;}
.status-col{width:192px;min-width:192px;background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;flex-shrink:0;max-height:calc(100vh - 120px);}
@media(max-width:660px){.status-col{display:none;}}
.ps{padding:10px;border-bottom:1px solid var(--b1);}
.pl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.3em;color:var(--t3);text-transform:uppercase;margin-bottom:7px;}
.pav-wrap{display:flex;align-items:center;gap:8px;}
.pav{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold3);display:flex;align-items:center;justify-content:center;font-size:17px;background:linear-gradient(135deg,#1a1208,#261a0c);flex-shrink:0;}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cap-box{background:var(--s2);border:1px solid var(--b1);padding:5px 7px;}
.cap-lbl{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.1em;color:var(--t3);margin-bottom:1px;}
.cap-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);font-weight:700;}
.cap-val.dirty{color:var(--red);}
.mr{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.mn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);width:54px;flex-shrink:0;}
.mt{flex:1;height:3px;background:var(--b2);border-radius:2px;overflow:hidden;}
.mf{height:100%;border-radius:2px;transition:width .8s ease;}
.mgr{background:var(--green);}.mb{background:var(--blue);}.mo{background:var(--orange);}.mrd{background:var(--red);}.mg{background:var(--gold);}
.mv{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);width:18px;text-align:right;flex-shrink:0;}
.ci{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--s3);cursor:pointer;transition:padding .15s;}
.ci:hover{padding-left:3px;}
.ci:last-child{border-bottom:none;}
.ca{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.cn{font-size:11px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cr{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:1px;}
.cdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-left:auto;}
.dg{background:var(--green);}.dy{background:var(--gold);}.dr{background:var(--red);}

/* NARRATIVE */
.narr-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.narrative{flex:1;overflow-y:auto;padding:18px 20px;-webkit-overflow-scrolling:touch;max-height:calc(100vh - 200px);}
@media(max-width:480px){.narrative{padding:10px;}}
.scene{margin-bottom:20px;}
.shdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1);}
.sloc{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--gold3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px;}
.sdiv{flex:1;height:1px;background:var(--b1);}
.ssess{font-family:'Space Mono',monospace;font-size:7px;color:var(--t3);white-space:nowrap;}
.sbody{font-size:14px;color:var(--t1);line-height:1.85;}
.sbody p{margin-bottom:8px;}

/* CHARACTER BLOCK */
.chblk{display:flex;gap:0;margin:10px 0;background:var(--s1);border:1px solid var(--b1);overflow:hidden;position:relative;}
.chblk::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--gold3);}
.ch-left{display:flex;flex-direction:column;align-items:center;padding:12px 9px;background:var(--s2);border-right:1px solid var(--b1);min-width:62px;flex-shrink:0;}
.chavat{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--b2);margin-bottom:5px;}
.chpn{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);text-align:center;line-height:1.3;}
.ch-right{flex:1;padding:11px 13px;min-width:0;}
.chhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:4px;flex-wrap:wrap;}
.chname{font-size:13px;color:var(--t0);}
.chstat{font-family:'Space Mono',monospace;font-size:6px;color:var(--gold3);letter-spacing:.1em;padding:1px 4px;border:1px solid var(--gold4);}
.chspeech{font-style:italic;font-size:14px;color:var(--t0);line-height:1.75;padding-left:10px;border-left:2px solid var(--gold3);margin-bottom:5px;}
.chsub{font-size:11px;color:var(--t3);font-style:italic;line-height:1.5;margin-bottom:5px;}
.hear-btn{display:inline-flex;align-items:center;gap:5px;background:var(--s3);border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;padding:3px 7px;cursor:pointer;transition:all .2s;}
.hear-btn:hover{border-color:var(--gold3);color:var(--gold);}

.pact{display:flex;gap:8px;padding:7px 10px;background:var(--s3);border:1px solid var(--b1);border-left:3px solid var(--gold);margin:7px 0;}
.palbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.14em;color:var(--gold);flex-shrink:0;margin-top:1px;white-space:nowrap;}
.patxt{font-style:italic;color:var(--t1);font-size:12px;line-height:1.6;}
.sflag{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--green2);background:var(--s3);padding:3px 8px;margin:3px 2px;cursor:pointer;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;color:var(--green);text-transform:uppercase;}
.ibox{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--blue2);padding:7px 10px;margin:7px 0;cursor:pointer;}
.ilbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.18em;color:var(--blue);margin-bottom:2px;}
.itxt{font-size:11px;color:var(--t3);line-height:1.6;}
.mctag{display:inline-flex;align-items:center;font-family:'Space Mono',monospace;font-size:7px;padding:2px 5px;border-radius:2px;margin:2px;}
.mcp{color:var(--green);background:var(--green2);border:1px solid #1a3a1a;}
.mcn{color:var(--red);background:#150808;border:1px solid #3a1515;}

/* TRANSACTION LOG */
.txn{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--s3);font-size:11px;}
.txn:last-child{border-bottom:none;}
.txn-desc{color:var(--t2);flex:1;}
.txn-amt{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;white-space:nowrap;}
.txn-amt.pos{color:var(--green);}
.txn-amt.neg{color:var(--red);}

/* INPUT */
.input-area{border-top:1px solid var(--b1);background:var(--s1);padding:9px 12px;flex-shrink:0;}
.choice-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.cbtn{background:var(--s2);border:1px solid var(--b2);padding:7px 10px;cursor:pointer;text-align:left;transition:all .2s;font-family:'Cormorant Garamond',serif;display:flex;align-items:flex-start;gap:6px;flex:1;min-width:132px;min-height:44px;}
.cbtn:hover,.cbtn:active{border-color:var(--gold3);background:var(--gold4);}
.cnum{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold3);letter-spacing:.1em;flex-shrink:0;margin-top:2px;}
.ctxt{font-size:12px;color:var(--t2);line-height:1.5;flex:1;}
.ctag{font-family:'Space Mono',monospace;font-size:6px;padding:2px 4px;border:1px solid;flex-shrink:0;margin-top:2px;}
.tc{color:var(--green);border-color:var(--green2);}.tg{color:var(--gold);border-color:var(--gold3);}.td{color:var(--red);border-color:var(--red2);}
.free-row{display:flex;gap:5px;}
.finput{flex:1;background:var(--s3);border:1px solid var(--b2);color:var(--t1);font-family:'Cormorant Garamond',serif;font-size:14px;padding:9px 10px;outline:none;transition:border-color .2s;min-height:44px;border-radius:0;-webkit-appearance:none;}
.finput:focus{border-color:var(--gold3);}
.finput::placeholder{color:var(--t3);font-style:italic;}
.movebtn{background:var(--gold);border:none;color:#000;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;padding:9px 13px;cursor:pointer;transition:background .2s;text-transform:uppercase;white-space:nowrap;min-height:44px;}
.movebtn:hover{background:var(--gold2);}
.movebtn:disabled{opacity:.4;cursor:not-allowed;}
.errmsg{color:var(--red);font-family:'Space Mono',monospace;font-size:9px;padding:6px;border:1px solid var(--red2);margin-top:5px;display:none;line-height:1.5;word-break:break-all;}

/* AUDIO */
.audio-bar{display:flex;align-items:center;gap:7px;padding:6px 12px;background:var(--s2);border-bottom:1px solid var(--b1);flex-wrap:wrap;}
.audio-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.16em;color:var(--t3);}
.atoggle{background:transparent;border:1px solid var(--b2);color:var(--t3);font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.08em;padding:3px 8px;cursor:pointer;transition:all .2s;}
.atoggle.on{border-color:var(--green);color:var(--green);}
.atoggle:hover{border-color:var(--gold3);color:var(--gold);}
.speaking{display:none;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}
.speaking.on{display:flex;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--green);}

/* MAP */
.map-wrap{padding:13px;}
.map-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.map-title{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.26em;color:var(--gold3);}
.map-legend{display:flex;gap:9px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:4px;font-family:'Space Mono',monospace;font-size:6px;color:var(--t2);}
.leg-dot{width:7px;height:7px;border-radius:50%;}
.theaters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(275px,1fr));gap:12px;}
.theater-card{background:var(--s1);border:1px solid var(--b1);}
.theater-hdr{padding:9px 11px;border-bottom:1px solid var(--b1);}
.theater-name{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.24em;color:var(--gold3);}
.theater-sub{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-top:2px;}
.theater-map-area{position:relative;height:190px;background:var(--s2);overflow:hidden;}
.theater-map-area svg{width:100%;height:100%;}
.zone-list{padding:4px 0;}
.zone-row{display:flex;align-items:center;justify-content:space-between;padding:4px 11px;border-bottom:1px solid var(--s3);cursor:pointer;transition:all .18s;}
.zone-row:hover{background:var(--s2);padding-left:15px;}
.zone-row:last-child{border-bottom:none;}
.zone-name{font-size:11px;color:var(--t1);}
.zone-ctrl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.06em;}
.zone-ctrl.player{color:var(--gold);}
.zone-ctrl.khalil{color:#c44;}
.zone-ctrl.chen{color:var(--blue);}
.zone-ctrl.cardinal{color:#cc4444;}
.zone-ctrl.koroma{color:var(--purple);}
.zone-ctrl.peninsula{color:var(--green);}
.zone-ctrl.syndicate{color:var(--orange);}
.zone-ctrl.zanele{color:#aa6633;}
.zone-ctrl.offshore{color:#3399aa;}
.zone-ctrl.frontier{color:#aa3399;}
.zone-ctrl.neutral{color:var(--t3);}
.zone-val{font-family:'Space Mono',monospace;font-size:7px;color:var(--green);}

/* EMPIRE TAB */
.empire-wrap{padding:14px;}
.empire-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:14px;}
.empire-card{background:var(--s1);border:1px solid var(--b1);padding:14px;cursor:pointer;transition:border-color .2s;}
.empire-card:hover{border-color:var(--gold3);}
.ec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ec-icon{font-size:20px;margin-right:8px;}
.ec-name{font-size:14px;color:var(--t0);}
.ec-type{font-family:'Space Mono',monospace;font-size:7px;color:var(--gold3);letter-spacing:.1em;}
.ec-status{font-family:'Space Mono',monospace;font-size:7px;padding:2px 6px;border:1px solid;}
.ec-status.owned{color:var(--green);border-color:var(--green2);}
.ec-status.available{color:var(--gold);border-color:var(--gold3);}
.ec-status.locked{color:var(--t3);border-color:var(--b2);}
.ec-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.ec-stat{background:var(--s2);padding:5px 7px;}
.ec-stat-lbl{font-family:'Space Mono',monospace;font-size:6px;color:var(--t3);margin-bottom:1px;}
.ec-stat-val{font-family:'Space Mono',monospace;font-size:9px;color:var(--gold2);}
.ec-desc{font-size:11px;color:var(--t3);line-height:1.55;margin-top:6px;}

/* PORTFOLIO TAB */
.portfolio-wrap{padding:14px;}
.port-section{margin-bottom:18px;}
.port-title{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.26em;color:var(--gold3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1);}
.asset-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--s1);border:1px solid var(--b1);margin-bottom:4px;cursor:pointer;transition:border-color .2s;}
.asset-row:hover{border-color:var(--gold3);}
.asset-icon{font-size:16px;margin-right:8px;flex-shrink:0;}
.asset-info{flex:1;min-width:0;}
.asset-name{font-size:12px;color:var(--t0);}

const A={
  enabled:false, elKey:'', speaking:false, synth:window.speechSynthesis,
  async speak(text,charName){
    if(!this.enabled)return;
    this.stop(); this.speaking=true; this.updateUI();
    if(this.elKey){try{await this.speakEL(text);return;}catch(e){}}
    if(!this.synth){this.speaking=false;this.updateUI();return;}
    const utt=new SpeechSynthesisUtterance(text);
    const voices=this.synth.getVoices();
    const pref=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||(v.lang.includes('en-GB')&&v.name.toLowerCase().includes('female')))||voices.find(v=>v.lang.includes('en-GB'))||voices.find(v=>v.lang.includes('en'))||voices[0];
    utt.voice=pref; utt.rate=G.speechRate||1.0;
    utt.pitch=charName==='The Patriarch'?0.75:charName==='D'?0.85:1.0;
    utt.volume=0.92;
    utt.onend=()=>{this.speaking=false;this.updateUI();};
    utt.onerror=()=>{this.speaking=false;this.updateUI();};
    this.synth.speak(utt);
  },
  async speakEL(text){
    const r=await fetch('https://api.elevenlabs.io/v1/text-to-speech/EXAVITQu4vr4xnSDxMaL',{method:'POST',headers:{'xi-api-key':this.elKey,'Content-Type':'application/json'},body:JSON.stringify({text,model_id:'eleven_monolingual_v1',voice_settings:{stability:.5,similarity_boost:.8}})});
    if(!r.ok)throw new Error('EL failed');
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const audio=new Audio(url);
    audio.onended=()=>{this.speaking=false;this.updateUI();URL.revokeObjectURL(url);};
    audio.onerror=()=>{this.speaking=false;this.updateUI();};
    await audio.play();
  },
  stop(){this.synth&&this.synth.cancel();this.speaking=false;this.updateUI();},
  toggle(){this.enabled=!this.enabled;if(!this.enabled)this.stop();render();},
  updateUI(){document.querySelectorAll('.speaking').forEach(el=>el.classList.toggle('on',this.speaking));}
};
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

function renderEmpire(){

    const items = INDUSTRIES.filter(i=>i.cat===cat);

      return `<div class="empire-card" onclick="openIndustry('${ind.id}')">
        <div class="ec-header">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="ec-icon">${ind.icon}</div>
            <div><div class="ec-name">${ind.name}</div><div class="ec-type">${cat}</div></div>

          <div class="ec-stat"><div class="ec-stat-lbl">ENTRY COST</div><div class="ec-stat-val">$${(ind.cost/1000).toFixed(0)}K</div></div>
          <div class="ec-stat"><div class="ec-stat-lbl">MONTHLY REV</div><div class="ec-stat-val">${ind.monthlyRev>0?'$'+(ind.monthlyRev/1000).toFixed(0)+'K':'—'}</div></div>
          <div class="ec-stat"><div class="ec-stat-lbl">ROI</div><div class="ec-stat-val">${(ind.roi*100).toFixed(0)}%/yr</div></div>
          <div class="ec-stat"><div class="ec-stat-lbl">MIN INFLUENCE</div><div class="ec-stat-val">${ind.minInfluence}</div></div>
        </div>
        <div class="ec-desc">${ind.desc}</div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:18px;"><div style="font-family:Space Mono,monospace;font-size:8px;letter-spacing:.28em;color:var(--gold3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1);">${cat}</div><div class="empire-grid" style="margin-bottom:0;">${cards}</div></div>`;
  }).join('');
  return `<div class="empire-wrap"><div style="font-family:Space Mono,monospace;font-size:8px;letter-spacing:.3em;color:var(--gold3);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--b1);">AVAILABLE INDUSTRIES — CLICK TO INVEST OR ACQUIRE</div>${sections}</div>`;
}

function openIndustry(id){
  const ind=INDUSTRIES.find(i=>i.id===id);
  if(!ind) return;
  const owned=G.assets.find(a=>a.id===id);
  const canAfford=(G.cleanCap+G.dirtyCap)>=ind.cost;
  const hasInfluence=G.meters.influence>=ind.minInfluence;

  let actions='';
  if(owned){
    actions=`<p style="color:var(--green);margin-top:10px;">✓ You own this. Monthly revenue: <strong>$${owned.monthlyRev.toLocaleString()}</strong></p>
    <button class="btn-o" style="margin-top:8px;font-size:8px;" onclick="G.modal=null;G.activeTab='narrative';makeMove('I want to expand my ${ind.name.replace(/'/g,"\\'")} operation — hire more staff, increase capacity, or acquire competitors.')">EXPAND OPERATION</button>`;
  } else if(!canAfford){
    actions=`<p style="color:var(--red);margin-top:10px;">Insufficient capital. Need $${(ind.cost-(G.cleanCap+G.dirtyCap)).toLocaleString()} more.</p>`;
  } else if(!hasInfluence){
    actions=`<p style="color:var(--orange);margin-top:10px;">Need ${ind.minInfluence} influence (currently ${G.meters.influence}). Build more relationships first.</p>`;
  } else {
    actions=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
      <button class="btn-g" style="font-size:8px;padding:9px 16px;" onclick="acquireAsset('${id}','clean')">ACQUIRE WITH CLEAN ($${(ind.cost/1000).toFixed(0)}K)</button>
      ${G.dirtyCap>=ind.cost?`<button class="btn-o" style="font-size:8px;" onclick="acquireAsset('${id}','dirty')">ACQUIRE WITH DIRTY CAPITAL</button>`:''}
      <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;G.activeTab='narrative';makeMove('I want to pursue a silent partner arrangement in ${ind.name.replace(/'/g,"\\'")} — minimal capital, equity stake, let operators run it.')">SILENT PARTNER ONLY</button>
    </div>`;
  }

  G.modal={
    pre:'EMPIRE — ' + ind.cat,
    title: ind.icon + ' ' + ind.name,
    body:`<p><strong>Entry Cost:</strong> $${ind.cost.toLocaleString()}</p>
      <p><strong>Monthly Revenue:</strong> ${ind.monthlyRev>0?'$'+ind.monthlyRev.toLocaleString():' No direct revenue — strategic asset'}</p>
      <p><strong>Annual ROI:</strong> ${(ind.roi*100).toFixed(0)}%</p>
      <p><strong>Minimum Influence Required:</strong> ${ind.minInfluence}</p>
      <p><strong>Requirements:</strong> ${ind.req}</p>
      <p style="margin-top:8px;">${ind.desc}</p>
      ${actions}`
  };
  render();
}

function acquireAsset(id, capitalType){
  const ind=INDUSTRIES.find(i=>i.id===id);
  if(!ind) return;
  const cost=ind.cost;
  if(capitalType==='clean'){
    if(G.cleanCap<cost){showNotif('Insufficient','Not enough clean capital.');return;}
    G.cleanCap-=cost;
  } else {
    if(G.dirtyCap<cost){showNotif('Insufficient','Not enough dirty capital.');return;}
    G.dirtyCap-=cost;
  }
  G.assets.push({id:ind.id,name:ind.name,icon:ind.icon,purchasePrice:cost,monthlyRev:ind.monthlyRev,purchasedSession:G.session,type:ind.cat,capitalType});
  G.transactions.push({desc:`Acquired: ${ind.name}`,amt:-cost,session:G.session,type:'acquisition'});
  G.modal=null;
  showNotif('Acquired',`${ind.icon} ${ind.name} — $${ind.monthlyRev.toLocaleString()}/mo`);
  autoSave();
  render();
  // Trigger narrative
  setTimeout(()=>{
    G.activeTab='narrative';
    makeMove(`[CLEAN] I just acquired ${ind.name} for $${cost.toLocaleString()}. Walk me through what this means for my operation and what the next moves should be.`);
  },500);
}

function openOwnedAsset(id){
  const a=G.assets.find(a=>a.id===id);
  const ind=INDUSTRIES.find(i=>i.id===id);
  if(!a||!ind) return;
  G.modal={
    pre:'PORTFOLIO ASSET',
    title: a.icon+' '+a.name,
    body:`<p><strong>Acquired:</strong> Session ${a.purchasedSession} — $${a.purchasePrice.toLocaleString()} (${a.capitalType} capital)</p>
      <p><strong>Monthly Revenue:</strong> $${a.monthlyRev.toLocaleString()}</p>
      <p><strong>Annual Revenue:</strong> $${(a.monthlyRev*12).toLocaleString()}</p>
      <p style="margin-top:8px;">${ind.desc}</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
        <button class="btn-g" style="font-size:8px;padding:9px 14px;" onclick="G.modal=null;G.activeTab='narrative';makeMove('I want to expand my ${a.name.replace(/'/g,"\\'")} — more staff, increased capacity, or adjacent acquisition.')">EXPAND</button>
        <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;G.activeTab='narrative';makeMove('I want to hire a strong operator to run my ${a.name.replace(/'/g,"\\'")} so I can step back completely.')">HIRE OPERATOR</button>

  };
  render();
}

function sellAsset(id){
  const idx=G.assets.findIndex(a=>a.id===id);
  if(idx===-1) return;
  const a=G.assets[idx];
  const salePrice=Math.round(a.purchasePrice*1.15);
  G.assets.splice(idx,1);
  G.cleanCap+=salePrice;
  G.transactions.push({desc:`Sold: ${a.name}`,amt:salePrice,session:G.session,type:'sale'});
  G.modal=null;
  showNotif('Sold',`${a.icon} ${a.name} — received $${salePrice.toLocaleString()}`);
  autoSave();
  render();
}

function renderMap(){
  const theaters=Object.entries(THEATERS).map(([tid,th])=>{
    const svg=buildSVG(th,tid);
    const zones=th.zones.map(z=>{
      const ctrl=G.zones[z.id]||z.ctrl;
      const isPlayer=ctrl==='player';
      const fac=FACTIONS[ctrl]||FACTIONS.player;
      return `<div class="zone-row" onclick="openZone('${z.id}','${tid}')">
        <div class="zone-name">${z.name}</div>

        <div style="font-family:Space Mono,monospace;font-size:7px;color:var(--t3);">$${(z.rev/1000000).toFixed(1)}M</div>
      </div>`;
    }).join('');
    return `<div class="theater-card">
      <div class="theater-hdr"><div class="theater-name">${th.name}</div><div class="theater-sub">${th.sub}</div></div>
      <div class="theater-map-area">${svg}</div>
      <div class="zone-list">${zones}</div>
    </div>`;
  }).join('');

  const legendItems=[{c:'#c8922a',l:'KUTOR'},{c:'#c44444',l:'KHALIL'},{c:'#3a7aaa',l:'CHEN'},{c:'#cc4444',l:'CARDINAL'},{c:'#7a4a9a',l:'KOROMA'},{c:'#4a9a6a',l:'PENINSULA'},{c:'#e88a3a',l:'SYNDICATE'},{c:'#333',l:'NEUTRAL'}];

  return `<div class="map-wrap">
    <div class="map-hdr"><div class="map-title">WORLD MAP — THEATER CONTROL</div><div class="map-legend">${legendItems.map(l=>`<div class="leg-item"><div class="leg-dot" style="background:${l.c};"></div>${l.l}</div>`).join('')}</div></div>
    <div class="theaters-grid">${theaters}</div>
  </div>`;
}

function buildSVG(theater,tid){
  const zones=theater.zones,total=zones.length;
  const cols=Math.ceil(Math.sqrt(total*1.4)),rows=Math.ceil(total/cols);
  const cw=100/cols,rh=100/rows;
  const colorMap={player:'#3a2210',khalil:'#2a1010',chen:'#101828',cardinal:'#1a0808',peninsula:'#102010',koroma:'#14101a',syndicate:'#1a1208',zanele:'#1a1008',offshore:'#0a1a1a',frontier:'#1a0a1a',irongate:'#141414',dmv_circle:'#141008',neutral:'#1a1a1a'};
  const strokeMap={player:'#c8922a',khalil:'#c44444',chen:'#3a7aaa',cardinal:'#cc4444',peninsula:'#4a9a6a',koroma:'#7a4a9a',syndicate:'#e88a3a',zanele:'#aa6633',offshore:'#3399aa',frontier:'#aa3399',irongate:'#888888',dmv_circle:'#9a7a4a',neutral:'#2a2a2a'};
  const rects=zones.map((z,i)=>{
    const col=i%cols,row=Math.floor(i/cols);
    const x=col*cw,y=row*rh;
    const ctrl=G.zones[z.id]||z.ctrl;
    const fill=colorMap[ctrl]||'#1a1a1a',stroke=strokeMap[ctrl]||'#2a2a2a';
    const letters=z.name.split(' ').map(w=>w[0]).join('').substring(0,3);
    return `<g onclick="openZone('${z.id}','${tid}')" style="cursor:pointer;">
      <rect x="${x+.8}%" y="${y+.8}%" width="${cw-1.6}%" height="${rh-1.6}%" fill="${fill}" stroke="${stroke}" stroke-width="1.2" rx="3"><title>${z.name}</title></rect>
      <text x="${x+cw/2}%" y="${y+rh/2-1}%" font-family="monospace" font-size="7" fill="${stroke}" text-anchor="middle" dominant-baseline="middle">${letters}</text>
      <text x="${x+cw/2}%" y="${y+rh/2+6}%" font-family="monospace" font-size="5" fill="${stroke}" opacity=".7" text-anchor="middle">$${(z.rev/1000000).toFixed(1)}M</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none">${rects}</svg>`;
}

function openZone(zoneId,theaterId){
  const th=THEATERS[theaterId];if(!th)return;
  const z=th.zones.find(z=>z.id===zoneId);if(!z)return;
  const ctrl=G.zones[zoneId]||z.ctrl;
  const fac=FACTIONS[ctrl]||{name:'Unknown',color:'#666'};
  const isPlayer=ctrl==='player';
  const actions=isPlayer
    ?`<p style="color:var(--green);margin-top:10px;">✓ Kutor controls this. Monthly: <strong>$${z.rev.toLocaleString()}</strong> / Year: <strong>$${(z.rev*12).toLocaleString()}</strong></p>`
    :`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
        <button class="btn-g" style="font-size:8px;padding:8px 14px;" onclick="G.modal=null;G.activeTab='narrative';makeMove('[CLEAN] I want to establish legitimate presence in ${z.name.replace(/'/g,"\\'")}.')">MOVE ON ZONE</button>
        <button class="btn-o" style="font-size:8px;" onclick="G.modal=null;G.activeTab='narrative';makeMove('[DARK] I want to disrupt ${fac.name.replace(/'/g,"\\'")} control of ${z.name.replace(/'/g,"\\'")}.')">DISRUPT</button>
      </div>`;
  G.modal={pre:theaterId.toUpperCase()+' — ZONE',title:z.name,body:`<p><strong>Controller:</strong> <span style="color:${fac.color};">${fac.name}</span></p><p><strong>Monthly Value:</strong> $${z.rev.toLocaleString()}</p><p><strong>Annual Value:</strong> $${(z.rev*12).toLocaleString()}</p><p style="margin-top:8px;">${z.desc}</p>${!isPlayer&&fac.desc?`<p style="margin-top:8px;font-style:italic;color:var(--t3);">${fac.desc}</p>`:''}${actions}`};
  render();
}

function renderIntel(){
  const allZones=Object.values(THEATERS).flatMap(t=>t.zones);
  const playerZones=allZones.filter(z=>(G.zones[z.id]||z.ctrl)==='player');
  const totalRev=playerZones.reduce((s,z)=>s+z.rev,0);
  const maxRev=Math.max(...G.revHistory,1),maxInf=Math.max(...G.infHistory,1);
  const revBars=G.revHistory.map((v,i)=>{const h=Math.max(3,(v/maxRev)*85);return `<div class="bar-col"><div class="bar-num">${v>0?'$'+Math.round(v/1000)+'K':'-'}</div><div class="bar-fill" style="height:${h}px;background:var(--gold3);"></div><div class="bar-lbl">S${i+1}</div></div>`;}).join('');
  const infBars=G.infHistory.map((v,i)=>{const h=Math.max(3,(v/maxInf)*85);return `<div class="bar-col"><div class="bar-num">${v}</div><div class="bar-fill" style="height:${h}px;background:var(--blue2);border:1px solid var(--blue);"></div><div class="bar-lbl">S${i+1}</div></div>`;}).join('');
  const meters=[{k:'integrity',l:'INTEGRITY',c:'#4a9a6a'},{k:'street',l:'STREET REP',c:'#e88a3a'},{k:'inst',l:'INST. REP',c:'#3a7aaa'},{k:'influence',l:'INFLUENCE',c:'#c8922a'},{k:'exposure',l:'EXPOSURE',c:'#c44444'},{k:'loyalty',l:'LOYALTY',c:'#4a9a6a'}];
  const meterBars=meters.map(m=>{const v=G.meters[m.k]||0;return `<div class="mc-row"><div class="mc-lbl">${m.l}</div><div class="mc-bar"><div class="mc-fill" style="width:${v}%;background:${m.c};"><span class="mc-num">${v}</span></div></div></div>`;}).join('');
  const facRows=Object.entries(FACTIONS).filter(([k])=>k!=='player').map(([id,f])=>{
    const controlled=allZones.filter(z=>(G.zones[z.id]||z.ctrl)===id).length;
    const rev=allZones.filter(z=>(G.zones[z.id]||z.ctrl)===id).reduce((s,z)=>s+z.rev,0);
    const tc=f.threat==='HIGH'?'t-hi':f.threat==='MED'?'t-me':'t-lo';
    return `<tr><td><div class="fdot" style="background:${f.color};"></div>${f.name}</td><td style="font-family:Space Mono,monospace;font-size:7px;">${controlled}</td><td style="font-family:Space Mono,monospace;font-size:7px;">$${(rev/1000000).toFixed(1)}M/mo</td><td class="thr ${tc}">${f.threat}</td></tr>`;
  }).join('');
  const assetsMonthly=G.assets.reduce((s,a)=>s+a.monthlyRev,0);
  return `<div class="charts-wrap">
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">CAPITAL TREND</div><div class="bars">${revBars}</div></div>
      <div class="chart-card"><div class="chart-title">INFLUENCE GROWTH</div><div class="bars">${infBars}</div></div>
      <div class="chart-card"><div class="chart-title">STATUS OVERVIEW</div>${meterBars}</div>
      <div class="chart-card"><div class="chart-title">REVENUE SUMMARY</div>
        <div style="margin-bottom:10px;">
          <div style="font-family:Space Mono,monospace;font-size:20px;color:var(--green);">$${(totalRev+assetsMonthly).toLocaleString()}<span style="font-size:9px;color:var(--t3);">/mo total</span></div>
          <div style="font-family:Space Mono,monospace;font-size:8px;color:var(--t3);margin-top:3px;">Territory: $${totalRev.toLocaleString()} + Assets: $${assetsMonthly.toLocaleString()}</div>
        </div>
        <div class="cap-grid"><div class="cap-box"><div class="cap-lbl">CLEAN LIQUID</div><div class="cap-val">$${G.cleanCap.toLocaleString()}</div></div><div class="cap-box"><div class="cap-lbl">DIRTY LIQUID</div><div class="cap-val dirty">$${G.dirtyCap.toLocaleString()}</div></div></div>
      </div>
    </div>
    <div class="chart-card"><div class="chart-title">FACTION LANDSCAPE</div>
      <table class="ftable"><thead><tr><th>FACTION</th><th>ZONES</th><th>MONTHLY</th><th>THREAT</th></tr></thead><tbody>${facRows}</tbody></table>
    </div>
  </div>`;
}

// ══════════════════════════════════════
// API
// ══════════════════════════════════════
async function callAPI(playerAction){
  G.loading=true;G.error=null;render();
  const context=buildContext();
  const msgs=G.msgs.length===0
    ?[{role:"user",content:context+"\n\nFirst move: "+playerAction}]
    :[{role:"user",content:context+"\n\nSession "+G.session+". Mr. Kutor: "+playerAction},...G.msgs.slice(-8)];
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":G.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:msgs})
    });
    const data=await resp.json();
    let text='';
    if(data.content&&Array.isArray(data.content)){for(const b of data.content){if(b.type==='text'&&b.text){text=b.text;break;}}}
    if(!text)throw new Error(data.error?data.error.message:'Empty response: '+JSON.stringify(data).substring(0,120));
    G.msgs.push({role:'user',content:playerAction});
    G.msgs.push({role:'assistant',content:text});
    G.session++;
    G.revHistory=[...G.revHistory.slice(1),G.cleanCap+G.dirtyCap];
    G.infHistory=[...G.infHistory.slice(1),G.meters.influence];
    autoSave();
    processResponse(text);
  }catch(err){
    G.loading=false;G.error=err.message||'Connection error. Try again.';render();
  }
}

function buildContext(){
  const m=G.meters;
  const allZones=Object.values(THEATERS).flatMap(t=>t.zones);
  const playerZones=allZones.filter(z=>(G.zones[z.id]||z.ctrl)==='player').map(z=>z.name).join(', ')||'None yet';
  const assetsMonthly=G.assets.reduce((s,a)=>s+a.monthlyRev,0);
  const assetList=G.assets.length?G.assets.map(a=>`${a.name} (+$${a.monthlyRev.toLocaleString()}/mo)`).join(', '):'None yet';
  return [
    "=== THE BISHOP — NARRATIVE ENGINE ===",
    "You are the narrative engine of THE BISHOP, a hyper-realistic life strategy simulation.",
    "",
    "STYLE: Film. Not a novel. MAXIMUM 3 sentences of narration per scene. Dialogue is SHORT and REAL — 1-2 lines, not speeches. Put Kutor IN the scene. Sensory detail. Stakes must be clear. End on tension.",
    "",
    "PLAYER: Mr. Kutor. Male. 29. Sierra Leonean-American. IT Auditor at EY Federal (Tysons VA). $68K salary. TS clearance. Building toward silent ownership of logistics and infrastructure. Origin: "+G.origin+".",
    G.past?"DARK SECRET: "+G.past+" — surfaces dramatically at the right moment.":"",
    "",
    "BROTHERHOOD (STRICTLY CONFIDENTIAL): 12-man investment collective. $47K pooled. Only the 12 know it exists. Never reference it in ways that could expose it. It's the quiet engine behind his capital deployment.",
    "",
    "BUSINESSES OWNED: "+assetList,
    "TERRITORY MONTHLY REV: $"+playerZones+" zones",
    "ASSET MONTHLY REV: $"+assetsMonthly.toLocaleString()+"/mo",
    "TOTAL MONTHLY PASSIVE: $"+(assetsMonthly).toLocaleString()+"/mo",
    "",
    "WORLD: Salone (West Africa, port, minerals), DMV (home, cleared market), Trinidade (Caribbean, election in 6 weeks).",
    "FACTIONS: Khalil Group (HIGH threat, port monopoly), Chen Logistics (HIGH, state-backed), Cardinal Holdings (HIGH, colonial capital), Koroma Network (MED, political family), Peninsula Group (MED, Caribbean trade), Zanele Capital (LOW/partner potential), Street Syndicate (LOW, informal), Offshore Consortium (MED, anonymous).",
    "",
    "SESSION "+G.session+" STATE:",
    "Integrity:"+m.integrity+" Street:"+m.street+" Inst:"+m.inst+" Influence:"+m.influence+" Exposure:"+m.exposure+" Loyalty:"+m.loyalty,
    "Clean: $"+G.cleanCap.toLocaleString()+" | Dirty: $"+G.dirtyCap.toLocaleString(),
    "Contacts: "+Object.values(G.contacts).map(c=>c.name).join(', '),
    "",
    "WHEN INVESTMENTS ARE MADE: State exact dollar amounts, projected returns, and what it means for Kutor's position. Example: 'The cold storage deal closes at $620K. $72K/month hitting the account starting month 3.'",
    "ZONE CONTROL: ZONE_CONTROL: zone_id -> controller",
    "",
    "CHARACTER SPEECH:",
    "[CHARACTER:Full Name|emoji|#hexcolor]",
    "One or two sentences max. Real. Subtext matters.",
    "[/CHARACTER]",
    "",
    "END WITH:",
    "---METERS---",
    "INTEGRITY:+0, STREET:+0, INST:+0, INFLUENCE:+0, EXPOSURE:+0, LOYALTY:+0, CLEAN_CAP:+0, DIRTY_CAP:+0",
    "---CHOICES---",
    "[CLEAN] Specific concrete choice",
    "[GRAY] Specific concrete choice",
    "[DARK] Specific concrete choice",
    "---STRATEGY---",
    "PRINCIPLE: Name | BOOK: Source | NOTE: One line",
    "---INTEL---",
    "FACT: One sentence real-world business context | SOURCE: Name",
    "=== END ==="
  ].filter(Boolean).join('\n');
}

// ══════════════════════════════════════
// PROCESS RESPONSE
// ══════════════════════════════════════
function processResponse(text){
  const metersM=text.match(/---METERS---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const choicesM=text.match(/---CHOICES---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const stratM=text.match(/---STRATEGY---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  const intelM=text.match(/---INTEL---[\r\n]+([\s\S]*?)(?=---[A-Z]|$)/);
  for(const m of text.matchAll(/ZONE_CONTROL:\s*(\w+)\s*->\s*(\w+)/g)){
    G.zones[m[1]]=m[2];
    const zn=Object.values(THEATERS).flatMap(t=>t.zones).find(z=>z.id===m[1])?.name||m[1];
    showNotif('Territory',`${zn} → ${m[2]==='player'?'KUTOR':m[2]}`);
  }
  let narrative=text.replace(/---METERS---[\s\S]*?(?=---[A-Z]|$)/g,'').replace(/---CHOICES---[\s\S]*?(?=---[A-Z]|$)/g,'').replace(/---STRATEGY---[\s\S]*?(?=---[A-Z]|$)/g,'').replace(/---INTEL---[\s\S]*/g,'').replace(/ZONE_CONTROL:.*\n?/g,'').replace(/---[A-Z]+---/g,'').trim();
  let html=`<div class="scene"><div class="shdr"><div class="sloc">${G.location.split(' ')[0].toUpperCase()}</div><div class="sdiv"></div><div class="ssess">SESSION ${String(G.session).padStart(2,'0')}</div></div><div class="sbody">${parseCharBlocks(narrative)}</div></div>`;
  if(stratM){const pm=stratM[1].match(/PRINCIPLE:(.*?)(?:\||$)/);if(pm){const bm=stratM[1].match(/BOOK:(.*?)(?:\||$)/);const nm=stratM[1].match(/NOTE:(.*?)(?:\||$)/);const note=(nm?nm[1].trim():'')+(bm?' — '+bm[1].trim():'');html+=`<span class="sflag" onclick="G.modal={pre:'Strategy',title:'${pm[1].trim().replace(/'/g,"\\'").replace(/"/g,"&quot;")}',body:'<p>${note.replace(/'/g,"\\'").replace(/"/g,"&quot;")}</p>'};render()">♟ ${pm[1].trim()}</span>`;}}
  if(intelM){const fm=intelM[1].match(/FACT:(.*?)(?:\||$)/);if(fm){html+=`<div class="ibox" onclick="G.modal={pre:'Intel',title:'Context',body:'<p>${fm[1].trim().replace(/'/g,"\\'").replace(/"/g,"&quot;")}</p>'};render()"><div class="ilbl">◉ INTEL</div><div class="itxt">${fm[1].trim().substring(0,85)}...</div></div>`;}}
  G.narrativeHTML+=html;
  if(metersM)applyMeters(metersM[1]);
  if(choicesM){const lines=choicesM[1].trim().split(/\r?\n/).filter(l=>l.trim());const choices=lines.map(l=>{const m=l.match(/\[(CLEAN|GRAY|DARK)\]\s*(.*)/);return m?{type:m[1],text:m[2].trim()}:null;}).filter(Boolean);G.choices=choices.length?choices:defaultChoices();}else{G.choices=defaultChoices();}
  G.loading=false;G.error=null;render();scrollNarr();
}

function parseCharBlocks(text){
  let r=text.replace(/\[CHARACTER:(.*?)\]([\s\S]*?)\[\/CHARACTER\]/g,(m,hdr,body)=>{
    const p=hdr.split('|');const name=p[0]||'Unknown',emoji=p[1]||'👤',bg=p[2]||'#111';
    const speech=body.replace(/^[\s"]+|[\s"]+$/g,'');
    return buildChar(name,emoji,bg,speech);
  });
  return r.split(/\n\n+/).filter(p=>p.trim()).map(p=>p.includes('chblk')?p:`<p>${p.trim()}</p>`).join('');
}

function buildChar(name,emoji,bg,speech,sub){
  const pts=name.split(' ');
  const safeSpeech=speech.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  const safeName=name.replace(/'/g,"\\'");
  return `<div class="chblk"><div class="ch-left"><div class="chavat" style="background:${bg};">${emoji}</div><div class="chpn">${pts[0]}<br>${pts.slice(1).join(' ')}</div></div><div class="ch-right"><div class="chhdr"><div class="chname">${name}</div><div class="chstat">SPEAKING</div></div><div class="chspeech">"${speech}"</div>${sub?`<div class="chsub">${sub}</div>`:''}<button class="hear-btn" onclick="A.speak('${safeSpeech}','${safeName}');event.stopPropagation();">🔊 HEAR</button></div></div>`;
}

function applyMeters(text){
  const keys=[{k:'integrity',ls:['INTEGRITY']},{k:'street',ls:['STREET','STREET_REP']},{k:'inst',ls:['INST','INST_REP']},{k:'influence',ls:['INFLUENCE']},{k:'exposure',ls:['EXPOSURE']},{k:'loyalty',ls:['LOYALTY']}];
  const changes=[];
  keys.forEach(({k,ls})=>ls.forEach(l=>{const m=text.match(new RegExp(l+':\\s*([+-]?\\d+)','i'));if(m&&parseInt(m[1])!==0){const d=parseInt(m[1]);G.meters[k]=Math.max(0,Math.min(100,G.meters[k]+d));if(Math.abs(d)>=3)changes.push({label:k.toUpperCase(),delta:d});}}));
  const cm=text.match(/CLEAN_CAP:\s*([+-]?\d+)/i);
  const dm=text.match(/DIRTY_CAP:\s*([+-]?\d+)/i);
  if(cm&&parseInt(cm[1])!==0){G.cleanCap=Math.max(0,G.cleanCap+parseInt(cm[1]));G.transactions.push({desc:'Capital change from narrative',amt:parseInt(cm[1]),session:G.session,type:'narrative'});}
  if(dm&&parseInt(dm[1])!==0)G.dirtyCap=Math.max(0,G.dirtyCap+parseInt(dm[1]));
  if(changes.length){const tags=changes.map(c=>`<span class="mctag ${c.delta>0?'mcp':'mcn'}">${c.label} ${c.delta>0?'+':''}${c.delta}</span>`).join('');G.narrativeHTML+=`<div style="margin:3px 0;">${tags}</div>`;}
}

function makeMove(text){
  G.narrativeHTML+=`<div class="pact"><div class="palbl">KUTOR</div><div class="patxt">${text.replace(/^\[.*?\]\s*/,'')}</div></div>`;
  G.activeTab='narrative';render();scrollNarr();callAPI(text);
}

function sendFree(){const inp=document.getElementById('finput');if(!inp)return;const val=inp.value.trim();if(!val)return;inp.value='';makeMove(val);}

function defaultChoices(){return [{type:'CLEAN',text:'Proceed carefully — gather more information.'},{type:'GRAY',text:'Move now with what you have.'},{type:'DARK',text:'Take the aggressive path.'}];}

function renderOpening(){
  const o=OPENINGS[G.origin];if(!o)return;
  G.location=o.loc;
  const ch=G.contacts[o.char]||CONTACTS[o.char]||{name:'Unknown',emoji:'👤',bg:'#111'};
  let html=`<div class="scene"><div class="shdr"><div class="sloc">${o.loc}</div><div class="sdiv"></div><div class="ssess">SESSION 01 — ORIGIN</div></div><div style="font-size:clamp(15px,2.8vw,20px);font-weight:300;color:var(--t0);margin-bottom:8px;">${o.title}</div><div class="sbody">${o.body}</div></div>`;
  html+=buildChar(ch.name,ch.emoji,ch.bg,o.speech,o.sub);
  html+=`<div class="ibox" onclick="G.modal={pre:'Context',title:'World Intel',body:'<p>${o.intel.replace(/'/g,"\\'").replace(/"/g,"&quot;")}</p>'};render()"><div class="ilbl">◉ WORLD CONTEXT</div><div class="itxt">${o.intel.substring(0,88)}...</div></div>`;
  G.narrativeHTML=html;G.choices=o.choices;G.error=null;render();
}

function viewContact(id){
  const c=G.contacts[id];if(!c)return;
  G.modal={pre:'Contact Profile',title:c.name,body:`<div style="display:flex;align-items:center;gap:11px;margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--b1);"><div style="width:46px;height:46px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:21px;border:2px solid var(--b2);flex-shrink:0;">${c.emoji}</div><div><div style="font-size:16px;color:var(--t0);margin-bottom:1px;">${c.name}</div><div style="font-family:Space Mono,monospace;font-size:6px;color:var(--gold3);letter-spacing:.1em;">${c.basis} / ${c.disposition}</div></div></div><div class="loybar"><div class="lylbl">LOYALTY — ${c.loyalty}/100</div><div class="lytrk"><div class="lyfil" style="width:${c.loyalty}%"></div></div></div><div class="rtags">${c.tags.map(t=>`<div class="rtag">${t}</div>`).join('')}</div><p><strong>Profile:</strong> ${c.role}</p><p><strong>Notes:</strong> <em>${c.notes}</em></p>${c.memory&&c.memory.length?`<p><strong>History:</strong> ${c.memory.join('. ')}</p>`:'<p style="color:var(--t3);font-style:italic;">No significant interactions yet.</p>'}`};
  render();
}

function renderModal(m){return `<div class="modal-bg" onclick="if(event.target===this){G.modal=null;render();}"><div class="modal"><button class="modal-x" onclick="G.modal=null;render()">✕</button><div class="modal-pre">${m.pre||''}</div><div class="modal-title">${m.title||''}</div><div class="modal-body">${m.body||''}</div></div></div>`;}

function showSave(){
  const state=JSON.stringify({...G,loading:false,modal:null,notif:null,apiKey:'[HIDDEN]',el_key:'[HIDDEN]'},null,2);
  window._ss=JSON.stringify({...G,msgs:G.msgs.slice(-8),loading:false,modal:null,notif:null});
  G.modal={pre:'Save Session',title:'Copy Your Progress',body:`<p style="color:var(--t3);font-size:12px;margin-bottom:9px;">Session auto-saves to browser. Copy this for cross-device use.</p><div class="savedisp">${state}</div><button class="btn-g" onclick="navigator.clipboard.writeText(window._ss).then(()=>{G.notif={t:'Saved',b:'Copied.'};G.modal=null;render();setTimeout(()=>{G.notif=null;render();},3500)})">COPY STATE</button>`};
  render();
}

function showLoad(){G.modal={pre:'Load Session',title:'Resume Your Story',body:`<p style="color:var(--t3);font-size:12px;margin-bottom:9px;">Paste your saved session state below.</p><textarea id="load-ta" style="width:100%;height:130px;background:#060606;border:1px solid var(--b2);color:var(--t1);font-family:monospace;font-size:8px;padding:9px;resize:vertical;" placeholder="Paste JSON here..."></textarea><button class="btn-g" style="margin-top:9px;" onclick="loadSession()">LOAD</button>`};render();}

function loadSession(){const ta=document.getElementById('load-ta');if(!ta)return;try{const loaded=JSON.parse(ta.value);Object.assign(G,loaded,{loading:false,modal:null,notif:null});if(!G.apiKey)G.screen='setup';render();scrollNarr();showNotif('Loaded','Session '+G.session+' restored.');}catch(e){alert('Invalid session state.');}}

function resumeAuto(){const saved=autoLoad();if(!saved)return;Object.assign(G,saved,{loading:false,modal:null,notif:null});G.screen='setup';render();}

function confirmRestart(){
  if(confirm('Restart? All progress will be lost.')){
    const key=G.apiKey,el=G.el_key,light=G.lightMode,rate=G.speechRate;
    G={screen:'origin',apiKey:key,el_key:el,origin:null,session:1,phase:'FOUNDATION',location:'DMV',cleanCap:12000,dirtyCap:0,meters:{integrity:80,street:20,inst:35,influence:10,exposure:5,loyalty:70},contacts:{},zones:{},assets:[],brotherhoodFund:47000,brotherhoodKutorShare:47000/12,brotherhoodDeployed:0,brotherhoodReturns:0,employees:[],transactions:[],history:[],msgs:[],past:null,loading:false,modal:null,notif:null,selectedOrigin:null,narrativeHTML:'',choices:[],error:null,activeTab:'narrative',lightMode:light,speechRate:rate,revHistory:[0,0,0,0,0,0,0,0],infHistory:[10,10,10,10,10,10,10,10]};
    localStorage.removeItem('bishop_v10');render();
  }
}

function scrollNarr(){setTimeout(()=>{const n=document.getElementById('narrative');if(n)n.scrollTop=n.scrollHeight;},80);}
function showNotif(t,b){G.notif={t,b};render();setTimeout(()=>{G.notif=null;render();},3500);}
function attachEvents(){const fi=document.getElementById('finput');if(fi)fi.onkeypress=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFree();}};}

function startGame(){
  const o=ORIGINS.find(x=>x.id===G.selectedOrigin);if(!o)return;
  G.origin=o.id;G.cleanCap=o.clean;G.dirtyCap=o.dirty||0;
  G.meters={...o.meters};G.past=o.past||null;
  G.contacts={};G.zones={};G.assets=[];G.transactions=[];
  o.contacts.forEach(cid=>{if(CONTACTS[cid])G.contacts[cid]={...CONTACTS[cid],memory:[]};});
  G.msgs=[];G.session=1;G.narrativeHTML='';G.choices=[];
  G.screen='game';G.activeTab='narrative';
  render();renderOpening();
}

render();
</script>
